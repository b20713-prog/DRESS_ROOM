<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OOTD Atelier Premium</title>
    <style>
        :root {
            --bg-base: #fff5f6;
            --card-bg: #ffffff;
            --accent-soft: #ff7597;
            --accent-hover: #ff4d79;
            --text-dark: #2d3748;
            --text-muted: #718096;
            --border-soft: #ffe3e7;

            --color-sss: #ff0055;
            --color-ss: #ff9900;
            --color-s: #a855f7;
            --color-a: #3b82f6;
            --color-b: #10b981;
            --color-c: #64748b;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Pretendard', -apple-system, sans-serif; 
        }
        
        body { 
            background-color: #f5e6e8; 
            color: var(--text-dark); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .app-container {
            width: 430px;
            height: 880px;
            background: var(--bg-base);
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.18);
            border: 10px solid #ffffff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen { 
            display: none; 
            width: 100%; 
            height: 100%; 
            position: absolute; 
            top: 0; 
            left: 0; 
            padding: 24px; 
            flex-direction: column; 
        }
        
        .screen.active { 
            display: flex; 
        }

        button {
            background: var(--accent-soft); 
            color: white; 
            border: none; 
            padding: 14px 20px; 
            border-radius: 24px;
            font-weight: 800; 
            font-size: 1rem; 
            cursor: pointer; 
            transition: all 0.2s ease-in-out;
            box-shadow: 0 6px 12px rgba(255, 117, 151, 0.25);
        }
        
        button:hover { 
            background: var(--accent-hover); 
            transform: translateY(-2px); 
            box-shadow: 0 8px 16px rgba(255, 77, 121, 0.35);
        }
        
        button:active {
            transform: translateY(0);
        }

        input { 
            background: #ffffff; 
            border: 2px solid #ffd0d6; 
            padding: 14px; 
            border-radius: 18px; 
            margin-bottom: 12px; 
            outline: none; 
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        
        input:focus { 
            border-color: var(--accent-soft); 
        }

        /* 로그인 화면 */
        #screen-login { 
            justify-content: center; 
            background: linear-gradient(180deg, #fffcfc 0%, #ffeef1 100%); 
        }
        
        .brand-logo { 
            text-align: center; 
            margin-bottom: 45px; 
        }
        
        .brand-logo h1 { 
            font-size: 2.5rem; 
            font-weight: 950; 
            color: #ff4d73; 
            letter-spacing: -1px;
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--border-soft); 
            padding-bottom: 14px; 
        }
        
        .balance-tag { 
            background: #fffbeb; 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-weight: 900; 
            color: #b45309; 
            font-size: 0.9rem; 
            border: 1px solid #fde68a;
        }

        /* 캐릭터 뷰포트 영역 */
        .character-view {
            flex: 1; 
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            background: #ffffff; 
            margin: 16px 0; 
            border-radius: 32px; 
            border: 2px solid #ffe3e7; 
            overflow: hidden;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.02);
        }
        
        .canvas-container { 
            position: relative; 
            width: 300px; 
            height: 440px; 
        }
        
        .layer { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        .layer svg { 
            width: 100%; 
            height: 100%; 
        }

        .main-controls { 
            display: flex; 
            gap: 12px; 
        }
        
        .main-controls button { 
            flex: 1; 
            padding: 16px; 
            border-radius: 24px; 
        }

        /* 슬라이드 업 패널 */
        .overlay-view {
            display: none; 
            position: absolute; 
            top: 70px; 
            left: 0; 
            width: 100%; 
            height: calc(100% - 70px);
            background: var(--card-bg); 
            z-index: 10; 
            padding: 24px; 
            flex-direction: column;
            border-top-left-radius: 32px; 
            border-top-right-radius: 32px;
            box-shadow: 0 -10px 30px rgba(255, 117, 151, 0.1); 
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        @keyframes slideUp { 
            from { transform: translateY(100%); } 
            to { transform: translateY(0); } 
        }
        
        .overlay-view.active { 
            display: flex; 
        }
        
        .overlay-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
        }

        /* 아이템 그리드 */
        .item-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            overflow-y: auto; 
            flex: 1; 
            padding-bottom: 20px; 
        }
        
        .item-card { 
            background: #fffcfc; 
            border: 2px solid #fff0f2; 
            border-radius: 22px; 
            padding: 10px; 
            text-align: center; 
            cursor: pointer; 
            position: relative; 
            transition: all 0.2s ease; 
        }
        
        .item-card.equipped { 
            border: 3px solid var(--accent-soft); 
            background: #fff0f3; 
            transform: scale(0.97);
        }
        
        .item-grade-tag { 
            position: absolute; 
            top: 6px; 
            left: 6px; 
            font-size: 0.65rem; 
            font-weight: 900; 
            padding: 2px 6px; 
            border-radius: 10px; 
            color: #ffffff; 
        }
        
        .item-preview-svg { 
            width: 85px; 
            height: 85px; 
            margin: 8px auto; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        .phone-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 16px; 
            margin-top: 15px; 
        }
        
        .app-icon-btn {
            background: #ffffff; 
            border: 2px solid #f1f5f9; 
            border-radius: 28px; 
            padding: 24px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 10px; 
            cursor: pointer; 
            transition: all 0.2s ease;
        }
        
        .app-icon-btn:hover { 
            transform: scale(1.05); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            border-color: #ffd0d6;
        }

        /* 중고나라 리스트 */
        .used-list { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            overflow-y: auto; 
            flex: 1; 
        }
        
        .used-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #fffcfc; 
            padding: 16px; 
            border-radius: 22px; 
            border: 1.5px solid #ffe3e7; 
        }
        
        .price-up { color: #ef4444; font-weight: 900; }
        .price-down { color: #3b82f6; font-weight: 900; }
        
        .probability-info { 
            background: #f8fafc; 
            border: 1.5px solid #e2e8f0; 
            border-radius: 18px; 
            padding: 14px; 
            margin-bottom: 20px; 
            font-size: 0.8rem; 
            max-height: 180px; 
            overflow-y: auto; 
        }
        
        .prob-row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 6px; 
        }

        .grade-SSS { color: var(--color-sss); font-weight: 950; }
        .grade-SS { color: var(--color-ss); font-weight: 950; }
        .grade-S { color: var(--color-s); font-weight: 900; }
        .grade-A { color: var(--color-a); font-weight: 800; }
        .grade-B { color: var(--color-b); font-weight: 800; }
        .grade-C { color: var(--color-c); font-weight: 700; }

        .grade-bg-SSS { background: var(--color-sss); }
        .grade-bg-SS { background: var(--color-ss); }
        .grade-bg-S { background: var(--color-s); }
        .grade-bg-A { background: var(--color-a); }
        .grade-bg-B { background: var(--color-b); }
        .grade-bg-C { background: var(--color-c); }

        .gacha-popup {
            display: none; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            background: #ffffff; 
            border: 4px solid var(--accent-soft); 
            padding: 30px; 
            border-radius: 32px;
            z-index: 100; 
            text-align: center; 
            width: 88%; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- 1. 로그인 화면 -->
    <div id="screen-login" class="screen active">
        <div class="brand-logo">
            <h1>OOTD Atelier</h1>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 6px; font-weight: 700;">실시간 변동식 드레스 마켓</p>
        </div>
        <div class="auth-box" style="display:flex; flex-direction:column;">
            <input type="text" id="login-id" placeholder="아이디">
            <input type="password" id="login-pw" placeholder="비밀번호">
            <button onclick="handleRegister()" style="background: #ffffff; border: 2px solid #ffd0d6; color: var(--text-muted); box-shadow: none; margin-bottom: 8px;">회원가입</button>
            <button onclick="handleLogin()">로그인</button>
        </div>
    </div>

    <!-- 2. 디자이너 정보 셋업 화면 -->
    <div id="screen-setup" class="screen" style="background: #ffffff; justify-content: center;">
        <h2 style="font-size: 1.5rem; font-weight: 950; margin-bottom: 24px; text-align:center; color:#ff4d73;">브랜드 디자이너 등록</h2>
        <input type="text" id="user-name" placeholder="사용할 디자이너 이름">
        <div style="display: flex; gap: 12px; margin-top: 10px;">
            <button id="g-male" style="flex:1; background:#fff; border:2.5px solid #cbd5e1; color:#475569;" onclick="selectGender('male')">남자 캐릭터</button>
            <button id="g-female" style="flex:1; background:#fff; border:2.5px solid #cbd5e1; color:#475569;" onclick="selectGender('female')">여자 캐릭터</button>
        </div>
        <button onclick="completeSetup()" style="margin-top: 30px; padding:16px;">게임 시작하기</button>
    </div>

    <!-- 3. 메인 게임 보드 -->
    <div id="screen-main" class="screen">
        <div class="header">
            <div style="font-weight: 950; font-size: 1.1rem; color: #1e293b;"><span id="display-username" style="color:var(--accent-soft);">디자이너</span>의 드레스룸</div>
            <div class="balance-tag">💎 <span id="user-money">100,000</span>원</div>
        </div>

        <!-- 완벽한 2.5등신 정직하고 예쁜 체형 아바타 로드 바디 -->
        <div class="character-view">
            <div class="canvas-container">
                <div class="layer" id="layer-hair-back" style="z-index: 1;"></div>
                <div class="layer" id="layer-body" style="z-index: 2;"></div>
                <div class="layer" id="layer-socks" style="z-index: 3;"></div>
                <div class="layer" id="layer-shoes" style="z-index: 4;"></div>
                <div class="layer" id="layer-bottom" style="z-index: 5;"></div>
                <div class="layer" id="layer-top" style="z-index: 6;"></div>
                <div class="layer" id="layer-onepiece" style="z-index: 7;"></div>
                <div class="layer" id="layer-hair-front" style="z-index: 8;"></div>
                <div class="layer" id="layer-necklace" style="z-index: 9;"></div>
                <div class="layer" id="layer-earring" style="z-index: 10;"></div>
                <div class="layer" id="layer-hat" style="z-index: 11;"></div>
                <div class="layer" id="layer-bag" style="z-index: 12;"></div>
            </div>
        </div>

        <div class="main-controls">
            <button onclick="toggleOverlay('closet')" style="background: #475569; box-shadow: none;">🚪 옷장 열기</button>
            <button onclick="toggleOverlay('phone')">📱 핸드폰</button>
        </div>

        <!-- 옷장 오버레이 패널 -->
        <div id="overlay-closet" class="overlay-view">
            <div class="overlay-header">
                <h3 style="font-weight:950; color:#ff4d73;">MY CLOSET</h3>
                <button onclick="toggleOverlay('closet')" style="background:#64748b; padding:6px 14px; font-size:0.85rem; box-shadow: none;">닫기</button>
            </div>
            <div class="item-grid" id="closet-grid"></div>
        </div>

        <!-- 핸드폰 오버레이 패널 -->
        <div id="overlay-phone" class="overlay-view" style="background:#f8fafc;">
            <div class="overlay-header">
                <h3 style="color:#0f172a; font-weight:950;">SMART PHONE</h3>
                <button onclick="toggleOverlay('phone')" style="background:#ef4444; padding:6px 14px; font-size:0.85rem; box-shadow: none;">종료</button>
            </div>
            <div class="phone-grid">
                <div class="app-icon-btn" onclick="openApp('ably')"><span style="font-size:2.5rem;">✨</span><span style="font-weight:800; font-size:0.9rem;">에이블리</span></div>
                <div class="app-icon-btn" onclick="openApp('musinsa')"><span style="font-size:2.5rem;">🛹</span><span style="font-weight:800; font-size:0.9rem;">무신사</span></div>
                <div class="app-icon-btn" onclick="openApp('kream')"><span style="font-size:2.5rem;">🔥</span><span style="font-weight:800; font-size:0.9rem;">크림</span></div>
                <div class="app-icon-btn" onclick="openApp('junggonara')" style="background:#f0fdf4; border-color:#bbf7d0;"><span style="font-size:2.5rem;">🤝</span><span style="color:#16a34a; font-weight:900; font-size:0.9rem;">중고나라</span></div>
            </div>
        </div>

        <!-- 어플리케이션 가챠 모달 -->
        <div id="overlay-shop" class="overlay-view" style="z-index:20;">
            <div class="overlay-header">
                <h3 id="shop-title" style="font-weight:950;">SHOP</h3>
                <button onclick="closeApp('shop')" style="background:#64748b; padding:6px 14px; font-size:0.85rem; box-shadow:none;">뒤로</button>
            </div>
            <div style="background:#fff5f6; padding:16px; border-radius:22px; text-align:center; margin-bottom:16px;">
                <p id="shop-desc" style="font-size:0.85rem; color:var(--text-muted); font-weight:600;"></p>
                <h4 id="shop-cost" style="color:var(--accent-soft); font-size:1.35rem; font-weight:950; margin-top:6px;"></h4>
            </div>
            <h5 style="margin-bottom:8px; font-size:0.85rem; font-weight:800; color:#475569;">전체 뽑기 품목 리스트</h5>
            <div class="probability-info" id="shop-prob-list"></div>
            <button onclick="triggerGacha()" style="width:100%; padding:16px; border-radius:24px;">아이템 쇼핑하기</button>
        </div>

        <!-- 실시간 요동치는 중고나라 시세 변동 모달 -->
        <div id="overlay-junggo" class="overlay-view" style="z-index:20;">
            <div class="overlay-header">
                <h3 style="color:#16a34a; font-weight:950;">🤝 중고나라 실시간 시세 (0.8초 갱신)</h3>
                <button onclick="closeApp('junggo')" style="background:#64748b; padding:6px 14px; font-size:0.85rem; box-shadow:none;">뒤로</button>
            </div>
            <p style="font-size:0.8rem; color:var(--text-muted); font-weight:600; margin-bottom:14px; background:#f0fdf4; padding:10px; border-radius:12px;">
                ⚡ 시세가 폭등했을 때 우측 판매 버튼을 눌러 부를 축적하세요!
            </p>
            <div class="used-list" id="junggonara-list"></div>
        </div>

    </div>

    <!-- 획득 가챠 팝업 -->
    <div class="gacha-popup" id="gacha-popup">
        <h3 style="margin-bottom:8px; font-size:1.4rem; color:var(--accent-soft); font-weight:950;">🎉 NEW ITEM GET!</h3>
        <div id="gacha-result-name" style="font-size:1.2rem; font-weight:900; margin-bottom:6px; color:#1e293b;"></div>
        <div id="gacha-result-grade" style="font-size:1.3rem; margin-bottom:20px;"></div>
        <button onclick="closeGachaPopup()" style="width:100%; padding:14px;">보유 옷장에서 착용하기</button>
    </div>

</div>

<script>
    /* ========================================================
       1. 완전히 어깨 라인을 바로잡은 레퍼런스 스타일 백터 그래픽 (SVG)
       ======================================================== */
    const VECTOR_DRAW = {
        'hair-back': (c) => `<path d="M 24,35 C 10,70 10,120 28,128 C 32,100 68,100 72,128 C 90,120 90,70 76,35 Z" fill="${c}" />`,
        'hair-front': (c) => `<path d="M 23,34 C 25,12 75,12 77,34 C 82,45 77,58 74,66 C 71,46 66,32 50,34 C 34,32 29,46 26,66 C 23,58 18,45 23,34 Z" fill="${c}" />`,
        
        // 가슴선과 옆구리핏을 단정히 정리한 완벽한 핏의 스커트/셔츠
        'top': (c, grade) => {
            let decor = (grade==="SSS" || grade==="SS") ? `<path d="M 36,75 L 50,86 L 64,75" stroke="#ffffff" stroke-width="2.5" fill="none"/><circle cx="50" cy="90" r="3.5" fill="#ffd0d6"/>` : '';
            return `<path d="M 29,62 L 71,62 L 67,102 L 33,102 Z" fill="${c}" />
                    <path d="M 29,62 L 15,75 L 21,83 L 33,72 Z" fill="${c}" />
                    <path d="M 71,62 L 85,75 L 79,83 L 67,72 Z" fill="${c}" />${decor}`;
        },
        
        'bottom': (c, grade) => {
            let lines = "";
            if (grade === "SSS" || grade === "SS" || grade === "S") {
                lines = `<path d="M 37,102 L 34,136 M 50,102 L 50,138 M 63,102 L 66,136" stroke="rgba(0,0,0,0.18)" stroke-width="1.5"/>`;
            }
            return `<path d="M 32,102 L 68,102 L 76,136 C 63,141 37,141 24,136 Z" fill="${c}" />${lines}`;
        },
        
        'onepiece': (c, grade) => {
            let skirtFrill = (grade === "SSS") ? `<path d="M 18,135 Q 34,142 50,135 Q 66,142 82,135 L 82,139 Q 66,145 50,139 Q 34,145 18,139 Z" fill="#ffffff" />` : '';
            return `<path d="M 29,62 L 71,62 L 77,105 L 81,137 L 19,137 L 23,105 Z" fill="${c}" />${skirtFrill}`;
        },
        
        'socks': (c) => `<path d="M 34,124 L 44,124 L 44,142 L 34,142 Z M 56,124 L 66,124 L 66,142 L 56,142 Z" fill="${c}" />`,
        'shoes': (c) => `<path d="M 31,140 Q 38,136 45,140 L 45,146 L 31,146 Z M 55,140 Q 62,136 69,140 L 69,146 L 55,146 Z" fill="${c}" /><rect x="32" y="145" width="12" height="2.5" fill="#1e293b"/><rect x="56" y="145" width="12" height="2.5" fill="#1e293b"/>`,
        'hat': (c) => `<path d="M 22,26 C 22,-2 78,-2 78,26 C 85,30 15,30 22,26 Z" fill="${c}" />`,
        'bag': (c) => `<path d="M 11,84 L 27,84 L 27,105 L 11,105 Z" fill="${c}" /><path d="M 19,58 C 4,58 7,84 11,84" stroke="#475569" stroke-width="2.5" fill="none"/>`,
        'necklace': (c) => `<path d="M 37,64 Q 50,76 63,64" stroke="${c}" stroke-width="2.5" fill="none" /><circle cx="50" cy="76" r="4.5" fill="#ff4d73"/>`,
        'earring': (c) => `<circle cx="28" cy="45" r="3.5" fill="${c}" /><circle cx="72" cy="45" r="3.5" fill="${c}" />`
    };

    /* ========================================================
       2. 아이템 가짓수 대량 확장 (정확히 36종 컬렉션 빌드)
       ======================================================== */
    const ITEM_DATABASE = {
        ably: [
            { id: "a1", name: "딸기 마카롱 리본 드레스", category: "onepiece", grade: "SSS", originalPrice: 280000, color: "#ffb3c6" },
            { id: "a2", name: "테디 베어 숄더 파우치 백", category: "bag", grade: "SS", originalPrice: 160000, color: "#b48a78" },
            { id: "a3", name: "트윈 로즈 벨벳 쵸커", category: "necklace", grade: "S", originalPrice: 80000, color: "#ff4d73" },
            { id: "a4", name: "체리 블러썸 리본 치마", category: "bottom", grade: "S", originalPrice: 75000, color: "#ffccd5" },
            { id: "a5", name: "샤이닝 스타 쉬폰 프릴 베스트", category: "top", grade: "A", originalPrice: 52000, color: "#fff0f3" },
            { id: "a6", name: "롤리팝 핑크 보닛햇", category: "hat", grade: "A", originalPrice: 48000, color: "#ff85a1" },
            { id: "a7", name: "샤이닝 하트 크리스탈 귀걸이", category: "earring", grade: "B", originalPrice: 32000, color: "#ffa6c9" },
            { id: "a8", name: "바닐라 무스 레이스 삭스", category: "socks", grade: "B", originalPrice: 19000, color: "#fffaf0" },

    /* ========================================================
       3. 실시간 주식형 중고시장 가격 요동 시뮬레이터 (0.8초 주기)
       ======================================================== */
    function initMarketPrices() {
        const fullList = [...ITEM_DATABASE.ably, ...ITEM_DATABASE.musinsa, ...ITEM_DATABASE.kream, ...DEFAULT_ITEMS];
        fullList.forEach(item => { 
            marketPrices[item.id] = (Math.random() * 0.4) + 0.8; 
        });

        setInterval(() => {
            fullList.forEach(item => {
                let vol = 0.12; 
                if(item.grade === "SSS") vol = 0.45;
                else if(item.grade === "SS") vol = 0.32;
                else if(item.grade === "S") vol = 0.22;

                const isUp = Math.random() > 0.44;
                let delta = Math.random() * vol * (isUp ? 1 : -1);
                
                let next = marketPrices[item.id] + delta;
                if(next < 0.20) next = 0.20;
                if(next > 2.50) next = 2.50;

                marketPrices[item.id] = next;
            });
            updateJunggonaraUI();
        }, 800);
    }

    function handleRegister() {

        if(usersDb[id]) return alert("이미 가입되어있는 동일 아이디가 존재합니다.");

        usersDb[id] = { password: pw, setupCompleted: false };
        localStorage.setItem("ootd_premium_v5", JSON.stringify(usersDb));
        alert("성공적으로 회원가입을 완료했습니다! 로그인을 시도하세요.");
    }

    function handleLogin() {
        const id = document.getElementById("login-id").value.trim();

        if(!usersDb[id] || usersDb[id].password !== pw) return alert("정보가 일치하지 않습니다. 가입 상태를 확인하세요.");

        currentUser = id;

       ======================================================== */
    function renderCloset() {
        const grid = document.getElementById("closet-grid");
        grid.innerHTML = "";
        const d = usersDb[currentUser];

        if(!d.closet || d.closet.length === 0) {
            grid.innerHTML = `<p style="grid-column: span 3; text-align:center; padding:40px 0; color:var(--text-muted); font-size:0.85rem;">옷장이 완전히 비어 있습니다.</p>`;
            return;
        }

        d.closet.forEach(item => {
            // 정확히 인스턴스 ID가 현재 무장된 상태 리스트에 잡혀있는지 판별
            const isEquipped = Object.values(d.equipped).includes(item.instanceId);
            
            const card = document.createElement("div");
            card.className = `item-card ${isEquipped ? 'equipped' : ''}`;
            card.onclick = () => {
                toggleEquip(item);
            };

            let previewSvg = "";
            if (item.category === 'hair') {
                previewSvg = `<svg viewBox="20 10 60 130" style="width:100%;height:100%;">${VECTOR_DRAW['hair-back'](item.color)}${VECTOR_DRAW['hair-front'](item.color)}</svg>`;
            } else if (VECTOR_DRAW[item.category]) {
                previewSvg = `<svg viewBox="10 10 80 130" style="width:100%;height:100%;">${VECTOR_DRAW[item.category](item.color, item.grade)}</svg>`;
            }

            card.innerHTML = `
                <div class="item-grade-tag grade-bg-${item.grade}">${item.grade}</div>
                <div class="item-preview-svg">${previewSvg}</div>
                <p style="font-size:0.8rem; font-weight:800; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#1e293b;">${item.name}</p>
            `;
            grid.appendChild(card);
        });
    }

    function toggleEquip(item) {
        const d = usersDb[currentUser];
        const eq = d.equipped;
        const targetInstId = item.instanceId;

        // 이미 착용한 상태라면 "해제(null)" 처리 진행
        const isAlreadyWorn = (eq[item.category] === targetInstId);

        if (item.category === "onepiece") {
            if (isAlreadyWorn) {
                eq.onepiece = null;
            } else {
                eq.onepiece = targetInstId;
                eq.top = null;
                eq.bottom = null;
            }
        } else if (item.category === "top" || item.category === "bottom") {
            eq.onepiece = null;
            if (isAlreadyWorn) {
                eq[item.category] = null;
            } else {
                eq[item.category] = targetInstId;
            }
        } else {
            if (isAlreadyWorn) {
                eq[item.category] = null;
            } else {
                eq[item.category] = targetInstId;
            }
        }

        localStorage.setItem("ootd_premium_v5", JSON.stringify(usersDb));
        refreshMainUI();
        renderCloset();
    }

    function toggleOverlay(id) {
        const overlay = document.getElementById("overlay-" + id);
        if(overlay.classList.contains("active")) {
            overlay.classList.remove("active");
        } else {
            document.querySelectorAll(".overlay-view").forEach(o => o.classList.remove("active"));
            overlay.classList.add("active");
            if(id === "closet") renderCloset();
        }
    }

        if(appName === "junggonara") { 
            document.getElementById("overlay-junggo").classList.add("active"); 
            updateJunggonaraUI(); 
            return;

        activeShop = appName;
        const meta = SHOP_META[appName];
        document.getElementById("shop-title").innerText = meta.title;
        document.getElementById("shop-desc").innerText = meta.desc;
        document.getElementById("shop-cost").innerText = `1회 쇼핑비: ${meta.cost.toLocaleString()}원`;

        const pBox = document.getElementById("shop-prob-list");
        pBox.innerHTML = "";
        
        ITEM_DATABASE[appName].forEach(item => {
            pBox.innerHTML += `
                <div class="prob-row">
                    <span class="grade-${item.grade}">[${item.grade}] ${item.name}</span>
                    <span style="font-weight:800; color:#475569;">${meta.probs[item.grade]}%</span>
                </div>`;
        });
        document.getElementById("overlay-shop").classList.add("active");
    }

        document.getElementById("overlay-" + appName).classList.remove("active");
    }

    function triggerGacha() {
        const meta = SHOP_META[activeShop];
        const d = usersDb[currentUser];
        if(d.money < meta.cost) {
            return alert("잔액이 부족합니다! 중고나라에 소장 의류를 판매해 쇼핑 자금을 마련해보세요.");
        }

        d.money -= meta.cost;
        const rand = Math.random() * 100;
        let cumulative = 0;
        let selectedGrade = "C";
        const gradeList = ["SSS", "SS", "S", "A", "B", "C"];

        for(let g of gradeList) {
            cumulative += meta.probs[g];
            if(rand <= cumulative) { 
                selectedGrade = g; 
                break; 
            }
        }

        const filteredPool = ITEM_DATABASE[activeShop].filter(item => item.grade === selectedGrade);
        const rolledTemplate = filteredPool[Math.floor(Math.random() * filteredPool.length)];

        // 고유 타임스탬프와 가챠 ID 조합으로 절대 충돌하지 않는 유니크 인스턴스 ID 부여
        const newGachaItem = { 
            ...rolledTemplate, 
            instanceId: `${activeShop}_${rolledTemplate.id}_${Date.now()}` 
        };
        
        d.closet.push(newGachaItem);

        localStorage.setItem("ootd_premium_v5", JSON.stringify(usersDb));
        refreshMainUI();

        // 결과 모달 세팅
        document.getElementById("gacha-result-name").innerText = rolledTemplate.name;
        const rGrade = document.getElementById("gacha-result-grade");
        rGrade.className = "grade-" + rolledTemplate.grade;
        rGrade.innerText = `[${rolledTemplate.grade} 등급]`;
        
        document.getElementById("gacha-popup").style.display = "block";
    }

    function closeGachaPopup() { 
        document.getElementById("gacha-popup").style.display = "none"; 
    }

    /* ========================================================
       8. 리얼타임 초고속 0.8초 변동 중고마켓 매도 인터페이스
       ======================================================== */
    function updateJunggonaraUI() {
        const container = document.getElementById("junggonara-list");
        if(!container || !currentUser || !document.getElementById("overlay-junggo").classList.contains("active")) return;
        
        container.innerHTML = "";
        const d = usersDb[currentUser];
        
        // 디폴트 의상 3종은 판매 목록에서 완전 배제하여 의상 고갈로 인한 무한 렌더러 파손 방지
        const sellableItems = d.closet.filter(item => !item.instanceId.startsWith("def_"));

        if(sellableItems.length === 0) {
            container.innerHTML = `<p style="text-align:center; color:var(--text-muted); margin-top:40px; font-weight:700;">중고나라에 위탁 판매할 의류가 없습니다.</p>`;
            return;
        }

        sellableItems.forEach(item => {
            const scale = marketPrices[item.id] || 1.0;
            const liveSellingPrice = Math.floor(item.originalPrice * scale);
            const isHotBubble = scale >= 1.25;

            const row = document.createElement("div");
            row.className = "used-item";
            row.innerHTML = `
                <div style="max-width: 65%;">
                    <span class="grade-${item.grade}" style="font-size:0.9rem;">[${item.grade}] ${item.name}</span>
                    <div style="font-size:0.75rem; color:var(--text-muted); margin-top:4px; font-weight:600;">
                        출고정가: ${item.originalPrice.toLocaleString()}원 (${(scale*100).toFixed(0)}%)
                    </div>
                </div>
                <div style="text-align:right;">
                    <div class="${isHotBubble ? 'price-up' : 'price-down'}" style="font-size:1rem; font-weight:900; margin-bottom:6px;">
                        ${isHotBubble ? '📈' : '📉'} ${liveSellingPrice.toLocaleString()}원
                    </div>
                    <button onclick="sellItemToMarket('${item.instanceId}', ${liveSellingPrice})" style="background:#16a34a; padding:6px 12px; font-size:0.8rem; border-radius:12px; box-shadow:none;">판매하기</button>
                </div>
            `;
            container.appendChild(row);
        });
    }

    function sellItemToMarket(instId, confirmedPrice) {
        const d = usersDb[currentUser];
        const itemIdx = d.closet.findIndex(item => item.instanceId === instId);
        if(itemIdx === -1) return;

        // 팔고자 하는 아이템을 장착하고 있는 상태였다면, 해제(null) 조치 처리
        for (let categoryKey in d.equipped) {
            if (d.equipped[categoryKey] === instId) {
                d.equipped[categoryKey] = null;
            }
        }

        d.closet.splice(itemIdx, 1);
        d.money += confirmedPrice;

        localStorage.setItem("ootd_premium_v5", JSON.stringify(usersDb));
        refreshMainUI();
        updateJunggonaraUI();
    }
</script>
