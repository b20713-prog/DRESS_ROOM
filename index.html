<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OOTD Atelier - Premium Realtime Market</title>
    <style>
        :root {
            --bg-base: #fff5f6;
            --card-bg: #ffffff;
            --accent-soft: #ff7597;
            --accent-hover: #ff4d79;
            --text-dark: #2d3748;
            --text-muted: #718096;
            --border-soft: #ffe3e7;

            --color-sss: #ff0055;
            --color-ss: #ff9900;
            --color-s: #a855f7;
            --color-a: #3b82f6;
            --color-b: #10b981;
            --color-c: #64748b;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Pretendard', -apple-system, sans-serif; 
        }
        
        body { 
            background-color: #f5e6e8; 
            color: var(--text-dark); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .app-container {
            width: 430px;
            height: 880px;
            background: var(--bg-base);
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.18);
            border: 10px solid #ffffff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen { 
            display: none; 
            width: 100%; 
            height: 100%; 
            position: absolute; 
            top: 0; 
            left: 0; 
            padding: 24px; 
            flex-direction: column; 
        }
        
        .screen.active { 
            display: flex; 
        }

        button {
            background: var(--accent-soft); 
            color: white; 
            border: none; 
            padding: 14px 20px; 
            border-radius: 24px;
            font-weight: 800; 
            font-size: 1rem; 
            cursor: pointer; 
            transition: all 0.2s ease-in-out;
            box-shadow: 0 6px 12px rgba(255, 117, 151, 0.25);
        }
        
        button:hover { 
            background: var(--accent-hover); 
            transform: translateY(-2px); 
            box-shadow: 0 8px 16px rgba(255, 77, 121, 0.35);
        }

        input { 
            background: #ffffff; 
            border: 2px solid #ffd0d6; 
            padding: 14px; 
            border-radius: 18px; 
            margin-bottom: 12px; 
            outline: none; 
            font-size: 0.95rem;
        }

        #screen-login { 
            justify-content: center; 
            background: linear-gradient(180deg, #fffcfc 0%, #ffeef1 100%); 
        }
        
        .brand-logo { 
            text-align: center; 
            margin-bottom: 45px; 
        }
        
        .brand-logo h1 { 
            font-size: 2.5rem; 
            font-weight: 950; 
            color: #ff4d73; 
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--border-soft); 
            padding-bottom: 14px; 
        }
        
        .balance-tag { 
            background: #fffbeb; 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-weight: 900; 
            color: #b45309; 
            font-size: 0.9rem; 
            border: 1px solid #fde68a;
        }

        .character-view {
            flex: 1; 
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            background: #ffffff; 
            margin: 16px 0; 
            border-radius: 32px; 
            border: 2px solid #ffe3e7; 
            overflow: hidden;
        }
        
        .canvas-container { 
            position: relative; 
            width: 300px; 
            height: 460px; 
        }
        
        .layer { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        .layer svg { 
            width: 100%; 
            height: 100%; 
        }

        .main-controls { 
            display: flex; 
            gap: 12px; 
        }
        
        .main-controls button { 
            flex: 1; 
            padding: 16px; 
            border-radius: 24px; 
        }

        .overlay-view {
            display: none; 
            position: absolute; 
            top: 70px; 
            left: 0; 
            width: 100%; 
            height: calc(100% - 70px);
            background: var(--card-bg); 
            z-index: 10; 
            padding: 24px; 
            flex-direction: column;
            border-top-left-radius: 32px; 
            border-top-right-radius: 32px;
            box-shadow: 0 -10px 30px rgba(255, 117, 151, 0.1); 
        }
        
        .overlay-view.active { 
            display: flex; 
        }
        
        .overlay-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
        }

        .item-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            overflow-y: auto; 
            flex: 1; 
        }
        
        .item-card { 
            background: #fffcfc; 
            border: 2px solid #fff0f2; 
            border-radius: 22px; 
            padding: 10px; 
            text-align: center; 
            cursor: pointer; 
            position: relative; 
        }
        
        .item-card.equipped { 
            border: 3px solid var(--accent-soft); 
            background: #fff0f3; 
        }
        
        .item-grade-tag { 
            position: absolute; 
            top: 6px; 
            left: 6px; 
            font-size: 0.65rem; 
            font-weight: 900; 
            padding: 2px 6px; 
            border-radius: 10px; 
            color: #ffffff; 
        }
        
        .item-preview-svg { 
            width: 80px; 
            height: 80px; 
            margin: 8px auto; 
        }

        .phone-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 16px; 
            margin-top: 15px; 
        }
        
        .app-icon-btn {
            background: #ffffff; 
            border: 2px solid #f1f5f9; 
            border-radius: 28px; 
            padding: 24px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 10px; 
            cursor: pointer; 
        }

        .used-list { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            overflow-y: auto; 
            flex: 1; 
        }
        
        .used-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #fffcfc; 
            padding: 16px; 
            border-radius: 22px; 
            border: 1.5px solid #ffe3e7; 
        }
        
        .price-up { color: #ef4444; font-weight: 900; }
        .price-down { color: #3b82f6; font-weight: 900; }
        
        .probability-info { 
            background: #f8fafc; 
            border: 1.5px solid #e2e8f0; 
            border-radius: 18px; 
            padding: 14px; 
            margin-bottom: 20px; 
            font-size: 0.8rem; 
            max-height: 180px; 
            overflow-y: auto; 
        }
        
        .grade-SSS { color: var(--color-sss); font-weight: 950; }
        .grade-SS { color: var(--color-ss); font-weight: 950; }
        .grade-S { color: var(--color-s); font-weight: 900; }
        .grade-A { color: var(--color-a); font-weight: 800; }
        .grade-B { color: var(--color-b); font-weight: 800; }
        .grade-C { color: var(--color-c); font-weight: 700; }

        .grade-bg-SSS { background: var(--color-sss); }
        .grade-bg-SS { background: var(--color-ss); }
        .grade-bg-S { background: var(--color-s); }
        .grade-bg-A { background: var(--color-a); }
        .grade-bg-B { background: var(--color-b); }
        .grade-bg-C { background: var(--color-c); }

        .gacha-popup {
            display: none; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            background: #ffffff; 
            border: 4px solid var(--accent-soft); 
            padding: 30px; 
            border-radius: 32px;
            z-index: 100; 
            text-align: center; 
            width: 88%; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="screen-login" class="screen active">
        <div class="brand-logo">
            <h1>OOTD Atelier</h1>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 6px; font-weight: 700;">실시간 변동식 드레스 마켓</p>
        </div>
        <div class="auth-box" style="display:flex; flex-direction:column;">
            <input type="text" id="login-id" placeholder="아이디">
            <input type="password" id="login-pw" placeholder="비밀번호">
            <button onclick="handleRegister()" style="background: #ffffff; border: 2px solid #ffd0d6; color: var(--text-muted); box-shadow: none; margin-bottom: 8px;">회원가입</button>
            <button onclick="handleLogin()">로그인</button>
        </div>
    </div>

    <div id="screen-setup" class="screen" style="background: #ffffff; justify-content: center;">
        <h2 style="font-size: 1.5rem; font-weight: 950; margin-bottom: 24px; text-align:center; color:#ff4d73;">브랜드 디자이너 등록</h2>
        <input type="text" id="user-name" placeholder="사용할 디자이너 이름">
        <div style="display: flex; gap: 12px; margin-top: 10px;">
            <button id="g-male" style="flex:1; background:#fff; border:2.5px solid #cbd5e1; color:#475569;" onclick="selectGender('male')">남자 캐릭터</button>
            <button id="g-female" style="flex:1; background:#fff; border:2.5px solid #cbd5e1; color:#475569;" onclick="selectGender('female')">여자 캐릭터</button>
        </div>
        <button onclick="completeSetup()" style="margin-top: 30px; padding:16px;">게임 시작하기</button>
    </div>

    <div id="screen-main" class="screen">
        <div class="header">
            <div style="font-weight: 950; font-size: 1.05rem; color: #1e293b;"><span id="display-username" style="color:var(--accent-soft);">디자이너</span>의 드레스룸</div>
            <div class="balance-tag">💎 <span id="user-money">300,000</span>원</div>
        </div>

        <div class="character-view">
            <div class="canvas-container">
                <div class="layer" id="layer-hair-back" style="z-index: 1;"></div>
                <div class="layer" id="layer-body" style="z-index: 2;"></div>
                <div class="layer" id="layer-socks" style="z-index: 3;"></div>
                <div class="layer" id="layer-shoes" style="z-index: 4;"></div>
                <div class="layer" id="layer-bottom" style="z-index: 5;"></div>
                <div class="layer" id="layer-top" style="z-index: 6;"></div>
                <div class="layer" id="layer-onepiece" style="z-index: 7;"></div>
                <div class="layer" id="layer-hair-front" style="z-index: 8;"></div>
                <div class="layer" id="layer-necklace" style="z-index: 9;"></div>
                <div class="layer" id="layer-earring" style="z-index: 10;"></div>
                <div class="layer" id="layer-hat" style="z-index: 11;"></div>
                <div class="layer" id="layer-bag" style="z-index: 12;"></div>
            </div>
        </div>

        <div class="main-controls">
            <button onclick="toggleOverlay('closet')" style="background: #475569; box-shadow: none;">🚪 옷장 열기</button>
            <button onclick="toggleOverlay('phone')">📱 핸드폰</button>
        </div>

        <div id="overlay-closet" class="overlay-view">
            <div class="overlay-header">
                <h3 style="font-weight:950; color:#ff4d73;">MY CLOSET</h3>
                <button onclick="toggleOverlay('closet')" style="background:#64748b; padding:6px 14px; font-size:0.85rem; box-shadow: none;">닫기</button>
            </div>
            <div class="item-grid" id="closet-grid"></div>
        </div>

        <div id="overlay-phone" class="overlay-view" style="background:#f8fafc;">
            <div class="overlay-header">
                <h3 style="color:#0f172a; font-weight:950;">SMART PHONE</h3>
                <button onclick="toggleOverlay('phone')" style="background:#ef4444; padding:6px 14px; font-size:0.85rem; box-shadow: none;">종료</button>
            </div>
            <div class="phone-grid">
                <div class="app-icon-btn" onclick="openApp('ably')"><span style="font-size:2.5rem;">✨</span><span style="font-weight:800; font-size:0.9rem;">에이블리</span></div>
                <div class="app-icon-btn" onclick="openApp('musinsa')"><span style="font-size:2.5rem;">🛹</span><span style="font-weight:800; font-size:0.9rem;">무신사</span></div>
                <div class="app-icon-btn" onclick="openApp('kream')"><span style="font-size:2.5rem;">🔥</span><span style="font-weight:800; font-size:0.9rem;">크림</span></div>
                <div class="app-icon-btn" onclick="openApp('junggonara')" style="background:#f0fdf4; border-color:#bbf7d0;"><span style="font-size:2.5rem;">🤝</span><span style="color:#16a34a; font-weight:900; font-size:0.9rem;">중고나라</span></div>
            </div>
        </div>

        <div id="overlay-shop" class="overlay-view" style="z-index:20;">
            <div class="overlay-header">
                <h3 id="shop-title" style="font-weight:950;">SHOP</h3>
                <button onclick="closeApp('shop')" style="background:#64748b; padding:6px 14px; font-size:0.85rem; box-shadow:none;">뒤로</button>
            </div>
            <div style="background:#fff5f6; padding:16px; border-radius:22px; text-align:center; margin-bottom:16px;">
                <p id="shop-desc" style="font-size:0.85rem; color:var(--text-muted); font-weight:600;"></p>
                <h4 id="shop-cost" style="color:var(--accent-soft); font-size:1.35rem; font-weight:950; margin-top:6px;"></h4>
            </div>
            <h5 style="margin-bottom:8px; font-size:0.85rem; font-weight:800; color:#475569;">뽑기 품목 확률 정보</h5>
            <div class="probability-info" id="shop-prob-list"></div>
            <button onclick="triggerGacha()" style="width:100%; padding:16px; border-radius:24px;">아이템 쇼핑하기</button>
        </div>

        <div id="overlay-junggo" class="overlay-view" style="z-index:20;">
            <div class="overlay-header">
                <h3 style="color:#16a34a; font-weight:950;">🤝 중고나라 실시간 시세 (0.8초 갱신)</h3>
                <button onclick="closeApp('junggo')" style="background:#64748b; padding:6px 14px; font-size:0.85rem; box-shadow:none;">뒤로</button>
            </div>
            <p style="font-size:0.8rem; color:var(--text-muted); font-weight:600; margin-bottom:14px; background:#f0fdf4; padding:10px; border-radius:12px;">
                ⚡ 가격 지수가 변동할 때 판매하여 수익을 극대화하세요!
            </p>
            <div class="used-list" id="junggonara-list"></div>
        </div>

    </div>

    <div class="gacha-popup" id="gacha-popup">
        <h3 style="margin-bottom:8px; font-size:1.4rem; color:var(--accent-soft); font-weight:950;">🎉 NEW ITEM GET!</h3>
        <div id="gacha-result-name" style="font-size:1.2rem; font-weight:900; margin-bottom:6px; color:#1e293b;"></div>
        <div id="gacha-result-grade" style="font-size:1.3rem; margin-bottom:20px;"></div>
        <button onclick="closeGachaPopup()" style="width:100%; padding:14px;">보유 옷장에서 착용하기</button>
    </div>

</div>

<script>
    /* ========================================================
       1. 이마를 침범해 얼굴을 과하게 가리지 않는 정밀형 SVG 데이터 (직각 어깨선 전용)
       ======================================================== */
    const VECTOR_DRAW = {
        // 뒷머리 베이스 (가르마 스타일에 따라 자연스럽게 깔리는 뒷부분 레이어)
        'hair-back': (c, type) => {
            if (type === 'twin') return `<path d="M 15,35 C 5,60 -5,95 8,125 C 18,100 25,70 30,50 Z M 85,35 C 95,60 105,95 92,125 C 82,100 75,70 70,50 Z" fill="${c}" /><circle cx="20" cy="45" r="8" fill="${c}"/><circle cx="80" cy="45" r="8" fill="${c}"/>`;
            if (type === 'wave') return `<path d="M 20,40 C 5,70 10,120 25,145 C 32,120 30,80 35,50 Z M 80,40 C 95,70 90,120 75,145 C 68,120 70,80 65,50 Z" fill="${c}" />`;
            if (type === 'short') return `<path d="M 22,40 C 15,60 18,85 28,90 C 32,70 32,55 35,48 Z M 78,40 C 85,60 82,85 72,90 C 68,70 68,55 65,48 Z" fill="${c}" />`;
            return `<path d="M 22,40 C 15,65 15,115 25,145 C 32,110 68,110 75,145 C 85,115 85,65 78,40 Z" fill="${c}" />`;
        },
        // 앞머리 & 옆머리 (눈썹과 눈을 가리지 않도록 이마 위쪽 라인을 열어둔 정교한 컷팅 설계)
        'hair-front': (c, type) => {
            let fringe = `<path d="M 25,36 C 30,22 70,22 75,36 C 78,42 75,48 72,52 C 68,36 60,32 50,33 C 40,32 32,36 28,52 C 25,48 22,42 25,36 Z" fill="${c}" />`;
            if (type === 'ribbon') {
                return fringe + `<path d="M 32,23 Q 40,15 46,25 Q 40,30 32,23 Z" fill="#ff4d79"/><path d="M 68,23 Q 60,15 54,25 Q 60,30 68,23 Z" fill="#ff4d79"/><circle cx="50" cy="22" r="4" fill="#ffffff"/>`;
            }
            if (type === 'bang') { 
                return `<path d="M 25,36 C 30,22 70,22 75,36 C 78,55 74,65 71,70 C 68,48 68,39 63,39 C 58,39 56,43 50,43 C 44,43 42,39 37,39 C 32,39 32,48 29,70 C 26,65 22,55 25,36 Z" fill="${c}" />`;
            }
            if (type === 'pure') { 
                return `<path d="M 25,36 C 30,22 70,22 75,36 C 79,55 76,75 73,85 C 70,55 68,40 54,36 C 46,36 30,55 27,85 C 24,75 21,55 25,36 Z" fill="${c}" />`;
            }
            return fringe;
        },
        
        // 반듯하고 가녀린 직각 어깨선 전용 상의
        'top': (c, grade) => {
            let detail = (grade==="SSS" || grade==="SS") ? `<path d="M 42,65 L 50,72 L 58,65" stroke="#ffffff" stroke-width="2" fill="none"/><circle cx="50" cy="76" r="2.5" fill="#ff7597"/>` : '';
            return `
                <path d="M 26,56 L 74,56 L 70,92 L 30,92 Z" fill="${c}" />
                <path d="M 26,56 L 12,65 L 16,73 L 28,66 Z" fill="${c}" />
                <path d="M 74,56 L 88,65 L 84,73 L 72,66 Z" fill="${c}" />
                ${detail}
            `;
        },
        
        'bottom': (c, grade) => {
            let lines = (grade === "SSS" || grade === "SS") ? `<path d="M 36,92 L 33,122 M 50,92 L 50,124 M 64,92 L 67,122" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>` : '';
            return `<path d="M 28,92 L 72,92 L 76,124 L 24,124 Z" fill="${c}" />${lines}`;
        },
        
        // 어깨에서 자연스럽게 떨어져 체형의 세련됨을 살리는 원피스
        'onepiece': (c, grade) => {
            let lace = (grade === "SSS") ? `<path d="M 20,124 Q 35,130 50,124 Q 65,130 80,124 L 82,130 Q 65,136 50,130 Q 35,136 18,130 Z" fill="#ffffff" />` : '';
            return `
                <path d="M 26,56 L 74,56 L 78,126 L 22,126 Z" fill="${c}" />
                <path d="M 26,56 L 10,66 L 15,75 L 28,66 Z" fill="${c}" />
                <path d="M 74,56 L 90,66 L 85,75 L 72,66 Z" fill="${c}" />
                ${lace}
            `;
        },
        
        'socks': (c) => `<path d="M 35,115 L 45,115 L 45,136 L 35,136 Z M 55,115 L 65,115 L 65,136 L 55,136 Z" fill="${c}" />`,
        'shoes': (c) => `<path d="M 33,136 Q 41,133 47,136 L 47,144 L 33,144 Z M 53,136 Q 59,133 67,136 L 67,144 L 53,144 Z" fill="${c}" /><rect x="33" y="142" width="14" height="2" fill="#2d3748"/><rect x="53" y="142" width="14" height="2" fill="#2d3748"/>`,
        'hat': (c) => `<path d="M 22,26 C 22,0 78,0 78,26 C 86,30 14,30 22,26 Z" fill="${c}" />`,
        'bag': (c) => `<path d="M 8,85 L 26,85 L 26,105 L 8,105 Z" fill="${c}" fill-opacity="0.95" stroke="#ff4d79" stroke-width="1.5"/><path d="M 17,56 C 2,56 4,85 8,85" stroke="#475569" stroke-width="2" fill="none"/>`,
        'necklace': (c) => `<path d="M 36,58 Q 50,72 64,58" stroke="${c}" stroke-width="2.5" fill="none" /><circle cx="50" cy="71" r="4.5" fill="#ff4d73"/>`,
        'earring': (c) => `<circle cx="32" cy="46" r="3.5" fill="${c}" /><circle cx="68" cy="46" r="3.5" fill="${c}" />`
    };

    /* ========================================================
       2. 대폭 증가한 총 18종의 프리미엄 헤어 포함 데이터 풀
       ======================================================== */
    const ITEM_DATABASE = {
        ably: [
            // 에이블리 헤어 아이템 6종 완벽 탑재
            { id: "ah1", name: "러블리 핑크 트윈테일 헤어", category: "hair", subType: "twin", grade: "SSS", originalPrice: 220000, color: "#ff9ebe" },
            { id: "ah2", name: "새콤체리 리본 보드레 헤어", category: "hair", subType: "ribbon", grade: "SS", originalPrice: 170000, color: "#ff4d79" },
            { id: "ah3", name: "밀크티 시스루 뱅 롱롤", category: "hair", subType: "bang", grade: "S", originalPrice: 110000, color: "#d7b899" },
            { id: "ah4", name: "살구 크림 반묶음 로맨틱 헤어", category: "hair", subType: "pure", grade: "A", originalPrice: 75000, color: "#fcd34d" },

    /* ========================================================
       3. 중고나라 실시간 시세 변동 모듈 (0.8초 주기 업데이트)
       ======================================================== */
    function initMarketPrices() {
        const fullList = [...ITEM_DATABASE.ably, ...ITEM_DATABASE.musinsa, ...ITEM_DATABASE.kream, ...DEFAULT_ITEMS];
        fullList.forEach(item => { marketPrices[item.id] = 1.0; });

        setInterval(() => {
            fullList.forEach(item => {
                let vol = 0.15; 
                if(item.grade === "SSS") vol = 0.45;
                else if(item.grade === "SS") vol = 0.30;
                
                const isUp = Math.random() > 0.45;
                let delta = Math.random() * vol * (isUp ? 1 : -1);
                let next = (marketPrices[item.id] || 1.0) + delta;
                
                if(next < 0.3) next = 0.3;
                if(next > 2.3) next = 2.3;
                marketPrices[item.id] = next;
            });
            updateJunggonaraUI();
        }, 800);
    }

    function handleRegister() {
        const id = document.getElementById("login-id").value.trim();
        const pw = document.getElementById("login-pw").value.trim();
        if(!id || !pw) return alert("아이디/비밀번호를 바르게 채워주세요.");
        if(usersDb[id]) return alert("이미 등록된 아이디입니다.");

        usersDb[id] = { password: pw, setupCompleted: false };
        localStorage.setItem("ootd_core_v7", JSON.stringify(usersDb));
        alert("회원가입 완료! 로그인을 진행하세요.");
    }

    function handleLogin() {
        const id = document.getElementById("login-id").value.trim();
        const pw = document.getElementById("login-pw").value.trim();
        if(!usersDb[id] || usersDb[id].password !== pw) return alert("계정이 존재하지 않거나 비밀번호가 틀렸습니다.");

        currentUser = id;
        if(usersDb[currentUser].setupCompleted) {
            startGame();
        } else {
            showScreen("screen-setup");
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

        userGender = g;
        document.getElementById("g-male").style.borderColor = (g==='male') ? 'var(--accent-soft)' : '#cbd5e1';
        document.getElementById("g-female").style.borderColor = (g==='female') ? 'var(--accent-soft)' : '#cbd5e1';

    function completeSetup() {
        const name = document.getElementById("user-name").value.trim();
        if(!name) return alert("디자이너 명을 입력해 주세요.");

        const baseCloset = [
            { ...DEFAULT_ITEMS[0], instanceId: "def_hair_inst" },
            { ...DEFAULT_ITEMS[1], instanceId: "def_top_inst" },
            { ...DEFAULT_ITEMS[2], instanceId: "def_bottom_inst" }
        ];

        usersDb[currentUser] = {
            ...usersDb[currentUser],
            nickname: name,
            gender: userGender,
            money: 300000, // 요구조건 완벽 정밀 반영: 초기 자금 30만원 고정 설정 완료!
            closet: baseCloset,
            equipped: { hair: "def_hair_inst", top: "def_top_inst", bottom: "def_bottom_inst", onepiece: null }
        };
        usersDb[currentUser].setupCompleted = true;
        localStorage.setItem("ootd_core_v7", JSON.stringify(usersDb));
        startGame();

        initMarketPrices();
        showScreen("screen-main");

    function renderCharacterCanvas() {
        const d = usersDb[currentUser];
        const eq = d.equipped;

        const bodyLayer = document.getElementById("layer-body");
        bodyLayer.innerHTML = `
            <svg viewBox="0 0 100 150">
                <circle cx="50" cy="34" r="14" fill="#fff2f0" stroke="#fcd5d0" stroke-width="0.8" />
                
                <path d="M 47,47 L 53,47 L 53,56 L 47,56 Z" fill="#fff2f0" />

                <line x1="74" y1="57" x2="85" y2="88" stroke="#fff2f0" stroke-width="4" stroke-linecap="round" />
                
                <line x1="41" y1="96" x2="41" y2="142" stroke="#fff2f0" stroke-width="5" stroke-linecap="round" />
                <line x1="59" y1="96" x2="59" y2="142" stroke="#fff2f0" stroke-width="5" stroke-linecap="round" />
                
                <circle cx="43" cy="33" r="2.5" fill="#2d3748" />
                <circle cx="57" cy="33" r="2.5" fill="#2d3748" />
                <path d="M 48,39 Q 50,41 52,39" stroke="#ff4d79" stroke-width="1.2" fill="none" stroke-linecap="round" />
                <circle cx="40" cy="37" r="2" fill="#ff4d73" opacity="0.35" />
                <circle cx="60" cy="37" r="2" fill="#ff4d73" opacity="0.35" />
            </svg>
        `;

        const getClothedItem = (instId) => {
            if (!instId) return null;
            return d.closet.find(i => i.instanceId === instId);
        };

        const draw = (layerId, targetItem) => {
            const container = document.getElementById(layerId);
            if (!targetItem) { container.innerHTML = ""; return; }
            const key = layerId.replace("layer-", "");
            
            let svgStr = "";
            if (key === "hair-back") {
                svgStr = VECTOR_DRAW["hair-back"](targetItem.color, targetItem.subType);
            } else if (key === "hair-front") {
                svgStr = VECTOR_DRAW["hair-front"](targetItem.color, targetItem.subType);
            } else {
                svgStr = VECTOR_DRAW[key](targetItem.color, targetItem.grade);
            }
            container.innerHTML = `<svg viewBox="0 0 100 150">${svgStr}</svg>`;
        };

        const activeHair = getClothedItem(eq.hair);
        draw("layer-hair-back", activeHair);
        draw("layer-hair-front", activeHair);

        draw("layer-socks", getClothedItem(eq.socks));
        draw("layer-shoes", getClothedItem(eq.shoes));
        draw("layer-bottom", getClothedItem(eq.bottom));
        draw("layer-top", getClothedItem(eq.top));

        const activeOnePiece = getClothedItem(eq.onepiece);
        if (activeOnePiece) {
            document.getElementById("layer-top").innerHTML = "";
            document.getElementById("layer-bottom").innerHTML = "";
            draw("layer-onepiece", activeOnePiece);
        } else {
            document.getElementById("layer-onepiece").innerHTML = "";
        }

        draw("layer-hat", getClothedItem(eq.hat));
        draw("layer-bag", getClothedItem(eq.bag));
        draw("layer-necklace", getClothedItem(eq.necklace));
        draw("layer-earring", getClothedItem(eq.earring));
    }

    /* ========================================================
       6. 옷장 아이템 착용 및 탈착 상호작용 컨트롤러
       ======================================================== */
    function renderCloset() {
        const grid = document.getElementById("closet-grid");
        grid.innerHTML = "";
        const d = usersDb[currentUser];

        d.closet.forEach(item => {
            const isEquipped = Object.values(d.equipped).includes(item.instanceId);
            const card = document.createElement("div");
            card.className = `item-card ${isEquipped ? 'equipped' : ''}`;
            card.onclick = () => toggleEquip(item);

            let previewSvg = "";
            if (item.category === 'hair') {
                previewSvg = `<svg viewBox="15 10 70 130" style="width:100%;height:100%;">${VECTOR_DRAW['hair-back'](item.color, item.subType)}${VECTOR_DRAW['hair-front'](item.color, item.subType)}</svg>`;
            } else if (VECTOR_DRAW[item.category]) {
                previewSvg = `<svg viewBox="10 10 80 130" style="width:100%;height:100%;">${VECTOR_DRAW[item.category](item.color, item.grade)}</svg>`;
            }

            card.innerHTML = `
                <div class="item-grade-tag grade-bg-${item.grade}">${item.grade}</div>
                <div class="item-preview-svg">${previewSvg}</div>
                <p style="font-size:0.75rem; font-weight:800; color:#1e293b; text-overflow:ellipsis; overflow:hidden; white-space:nowrap;">${item.name}</p>
            `;
            grid.appendChild(card);
        });
    }

    function toggleEquip(item) {
        const d = usersDb[currentUser];
        const eq = d.equipped;
        const target = item.instanceId;
        const cat = item.category;

        if (eq[cat] === target) {
            eq[cat] = null;
        } else {
            if (cat === "onepiece") {
                eq.onepiece = target; eq.top = null; eq.bottom = null;
            } else if (cat === "top" || cat === "bottom") {
                eq.onepiece = null; eq[cat] = target;
            } else {
                eq[cat] = target;
            }
        }

        localStorage.setItem("ootd_core_v7", JSON.stringify(usersDb));
        refreshMainUI();
        renderCloset();
    }

    function toggleOverlay(id) {
        const overlay = document.getElementById("overlay-" + id);
        if(overlay.classList.contains("active")) {
            overlay.classList.remove("active");
        } else {
            document.querySelectorAll(".overlay-view").forEach(o => o.classList.remove("active"));
            overlay.classList.add("active");
            if(id === "closet") renderCloset();
        }
    }

    function triggerGacha() {
        const meta = SHOP_META[activeShop];
        const d = usersDb[currentUser];
        if(d.money < meta.cost) return alert("소지하고 계신 잔고가 부족합니다!");

        d.money -= meta.cost;
        const rand = Math.random() * 100;
        let cumulative = 0;
        let selectedGrade = "C";
        const gradeList = ["SSS", "SS", "S", "A", "B", "C"];

        for(let g of gradeList) {
            cumulative += meta.probs[g];
            if(rand <= cumulative) { selectedGrade = g; break; }
        }

        const pool = ITEM_DATABASE[activeShop].filter(item => item.grade === selectedGrade);
        const template = pool[Math.floor(Math.random() * pool.length)];

        const newGachaItem = { 
            ...template, 
            instanceId: `${activeShop}_${template.id}_${Date.now()}` 
        };
        d.closet.push(newGachaItem);

        localStorage.setItem("ootd_core_v7", JSON.stringify(usersDb));
        refreshMainUI();

        document.getElementById("gacha-result-name").innerText = template.name;
        const rGrade = document.getElementById("gacha-result-grade");
        rGrade.className = "grade-" + template.grade;
        rGrade.innerText = `[${template.grade} 등급]`;
        
        document.getElementById("gacha-popup").style.display = "block";
    }

    function closeGachaPopup() { 
        document.getElementById("gacha-popup").style.display = "none"; 
    }

    /* ========================================================
       8. 중고나라 연동 실시간 재판매 연산 모듈
       ======================================================== */
    function updateJunggonaraUI() {
        const container = document.getElementById("junggonara-list");
        if(!container || !currentUser || !document.getElementById("overlay-junggo").classList.contains("active")) return;
        
        container.innerHTML = "";
        const d = usersDb[currentUser];
        const sellableItems = d.closet.filter(item => !item.instanceId.startsWith("def_"));

        if(sellableItems.length === 0) {
            container.innerHTML = `<p style="text-align:center; color:var(--text-muted); padding:30px 0; font-weight:700;">판매 가능한 의류가 없습니다.</p>`;
            return;
        }

        sellableItems.forEach(item => {
            const scale = marketPrices[item.id] || 1.0;
            const livePrice = Math.floor(item.originalPrice * scale);

            const row = document.createElement("div");
            row.className = "used-item";
            row.innerHTML = `
                <div style="max-width: 65%;">
                    <span class="grade-${item.grade}" style="font-size:0.85rem;">[${item.grade}] ${item.name}</span>
                    <div style="font-size:0.7rem; color:var(--text-muted); margin-top:2px;">
                        원가: ${item.originalPrice.toLocaleString()}원 (${(scale*100).toFixed(0)}%)
                    </div>
                </div>
                <div style="text-align:right;">
                    <div class="${scale >= 1.0 ? 'price-up' : 'price-down'}" style="font-size:0.95rem; font-weight:900; margin-bottom:4px;">
                        ${scale >= 1.0 ? '📈' : '📉'} ${livePrice.toLocaleString()}원
                    </div>
                    <button onclick="sellItemToMarket('${item.instanceId}', ${livePrice})" style="background:#16a34a; padding:6px 12px; font-size:0.8rem; border-radius:12px; box-shadow:none;">판매</button>
                </div>
            `;
            container.appendChild(row);
        });
    }

    function sellItemToMarket(instId, price) {
        const d = usersDb[currentUser];
        const idx = d.closet.findIndex(i => i.instanceId === instId);
        if(idx === -1) return;

        for (let key in d.equipped) {
            if (d.equipped[key] === instId) d.equipped[key] = null;
        }

        d.closet.splice(idx, 1);
        d.money += price;

        localStorage.setItem("ootd_core_v7", JSON.stringify(usersDb));
        refreshMainUI();
        updateJunggonaraUI();
    }
</script>
</body>
</html>
