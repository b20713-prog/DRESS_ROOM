<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쁘띠 드레스룸 & 패션 플랫폼 게임</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Jua', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: #FFE3EC;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 스마트폰 외형 UI 프레임 (파스텔톤 핑크 & 화이트 테마) */
        .phone-container {
            width: 430px;
            height: 900px;
            background: #FFFFFF;
            border: 12px solid #FFB6C1;
            border-radius: 45px;
            box-shadow: 0 25px 50px rgba(255, 182, 193, 0.6);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 최상단 고정 헤더 - 유리 효과 마감 */
        .top-header {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #FFE4E1;
            z-index: 100;
        }

        .game-title {
            color: #FF69B4;
            font-size: 1.25rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .currency-badge {
            background: #FFF0F5;
            border: 2px solid #FF69B4;
            padding: 6px 14px;
            border-radius: 20px;
            color: #FF1493;
            font-size: 1.05rem;
            font-weight: bold;
        }

        .content-body {
            flex: 1;
            background: linear-gradient(to bottom, #FFFFFF, #FFF5F7);
            position: relative;
            overflow: hidden;
        }

        .screen-view {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            padding: 20px;
            flex-direction: column;
        }

        .screen-view.active {
            display: flex;
        }

        /* 로그인 / 회원가입 UI */
        .auth-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
        }
        .auth-logo { font-size: 4rem; margin-bottom: 20px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        
        .auth-box {
            width: 100%;
            background: #FFFFFF;
            padding: 25px;
            border-radius: 24px;
            border: 3px solid #FFB6C1;
            box-shadow: 0 10px 20px rgba(255,182,193,0.2);
        }
        .auth-title { color: #FF69B4; text-align: center; margin-bottom: 18px; font-size: 1.5rem; }
        .input-field {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 2px solid #FFE4E1;
            border-radius: 16px;
            outline: none;
            font-size: 1rem;
        }
        .btn-block {
            width: 100%;
            background: #FF69B4;
            color: #FFFFFF;
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 105, 180, 0.3);
            margin-bottom: 8px;
        }
        .btn-block.secondary { background: #FFB6C1; box-shadow: none; }
        
        .gender-select-group { display: flex; gap: 15px; width: 100%; margin-top: 10px; }
        .gender-btn { flex: 1; padding: 15px; border: 3px solid #FFE4E1; background: white; border-radius: 20px; font-size: 1.1rem; cursor: pointer; }
        .gender-btn.selected { border-color: #FF69B4; background: #FFF0F5; color: #FF69B4; }

        /* ================= 👤 고퀄리티 그래픽 아바타 엔진 코딩 ================= */
        .main-room-view {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 30px;
        }

        .avatar-container {
            width: 320px;
            height: 520px;
            background: #FFFFFF;
            border: 3px solid #FFE4E1;
            border-radius: 32px;
            position: relative;
            margin-top: 10px;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.25);
            overflow: hidden;
        }

        /* 정밀 뼈대 결속 구조체 */
        .avatar-blueprint {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        /* 1. 기본 바디 베이스 (피부톤, 팔, 다리, 손, 발 완벽 묘사) */
        .body-base { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 10; }
        .skin-color { background: #FFE5D9; border: 2px solid #FBC4B6; }
        
        .char-head { width: 110px; height: 105px; border-radius: 50% 50% 46% 46%; position: absolute; left: 105px; top: 90px; z-index: 15; }
        .char-neck { width: 22px; height: 25px; position: absolute; left: 149px; top: 180px; z-index: 12; border-radius: 4px; }
        .char-torso { width: 66px; height: 110px; border-radius: 20px; position: absolute; left: 127px; top: 195px; z-index: 11; }
        
        /* 팔 구조 구현 */
        .char-arm { width: 18px; height: 90px; border-radius: 10px; position: absolute; top: 200px; z-index: 13; }
        .char-arm.left { left: 112px; transform: rotate(12deg); transform-origin: top right; }
        .char-arm.right { right: 112px; transform: rotate(-12deg); transform-origin: top left; }
        
        /* 다리 구조 구현 */
        .char-leg { width: 22px; height: 120px; border-radius: 12px; position: absolute; top: 290px; z-index: 10; }
        .char-leg.left { left: 133px; }
        .char-leg.right { right: 133px; }

        /* 2. 얼굴 디테일 레이어 (초롱초롱한 눈망울, 하이라이트광, 치크볼) */
        .face-details { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 16; pointer-events: none; }
        .char-eye { width: 24px; height: 24px; background: #332211; position: absolute; top: 135px; border-radius: 50%; }
        .char-eye.left { left: 125px; }
        .char-eye.right { right: 125px; }
        /* 초롱초롱한 하이라이트광 분수 효과 */
        .char-eye::before { content: ''; position: absolute; width: 8px; height: 8px; background: white; border-radius: 50%; top: 4px; left: 4px; }
        .char-eye::after { content: ''; position: absolute; width: 4px; height: 4px; background: white; border-radius: 50%; bottom: 4px; right: 4px; }
        
        /* 아기자기한 볼터치(Blush) */
        .char-blush { width: 18px; height: 10px; background: rgba(255, 105, 180, 0.4); filter: blur(1px); position: absolute; top: 152px; border-radius: 50%; }
        .char-blush.left { left: 116px; }
        .char-blush.right { right: 116px; }
        .char-mouth { width: 12px; height: 8px; border-bottom: 3px solid #B22222; border-radius: 0 0 10px 10px; position: absolute; left: 154px; top: 162px; }

        /* ================= 🎚️ 동적 아이템 장착용 그래픽 컴포넌트 레이어 ================= */
        /* 기본 지급 1번 아이템: 검은색 긴 생머리 (뒷머리와 앞머리를 분리하여 레이어 깊이 최적화) */
        .hair-back-component { display: none; position: absolute; width: 160px; height: 260px; background: #1A1A1A; border-radius: 40px 40px 20px 20px; left: 80px; top: 75px; z-index: 5; box-shadow: inset 0 -20px 30px rgba(0,0,0,0.5); }
        .hair-front-component { display: none; position: absolute; width: 126px; height: 115px; left: 97px; top: 76px; z-index: 20; pointer-events: none; }
        .hair-front-component .bangs { width: 100%; height: 45px; background: #1A1A1A; border-radius: 30px 30px 0 0; position: absolute; }
        .hair-front-component .side-strand { width: 22px; height: 90px; background: #1A1A1A; position: absolute; border-radius: 0 0 12px 12px; }
        .hair-front-component .side-strand.left { left: 0; border-radius: 0 0 0 15px; }
        .hair-front-component .side-strand.right { right: 0; border-radius: 0 0 15px 0; }
        
        /* 핑크 트윈테일 컴포넌트 */
        .pink-hair-back { display: none; position: absolute; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        .pink-hair-back .tail { width: 45px; height: 150px; background: #FF69B4; position: absolute; border-radius: 30px; top: 110px; box-shadow: inset -5px 0 15px rgba(0,0,0,0.1); }
        .pink-hair-back .tail.left { left: 65px; transform: rotate(15deg); }
        .pink-hair-back .tail.right { right: 65px; transform: rotate(-15deg); }
        .pink-hair-front { display: none; position: absolute; width: 126px; height: 115px; left: 97px; top: 76px; z-index: 20; pointer-events: none; }
        .pink-hair-front .bangs { width: 100%; height: 50px; background: #FF69B4; border-radius: 30px 30px 10px 10px; }

        /* 기본 지급 2번 아이템: 상의 흰티 */
        .top-white-tshirt { display: none; position: absolute; width: 72px; height: 60px; background: #FFFFFF; border: 2px solid #E2E8F0; border-radius: 12px 12px 6px 6px; left: 124px; top: 195px; z-index: 25; }
        .top-white-tshirt::before { content: ''; position: absolute; width: 24px; height: 12px; background: #FFE5D9; border-radius: 0 0 12px 12px; left: 22px; top: -1px; border: 1px solid #FBC4B6; }
        /* 맨투맨 상의 컴포넌트 */
        .top-mantoman { display: none; position: absolute; width: 80px; height: 65px; background: #BEE3F8; border: 2px solid #90CDF4; border-radius: 14px; left: 120px; top: 194px; z-index: 25; }

        /* 기본 지급 3번 아이템: 하의 회색 바지 */
        .bottom-gray-pants { display: none; position: absolute; width: 68px; height: 105px; left: 126px; top: 250px; z-index: 24; }
        .bottom-gray-pants .waist { width: 100%; height: 15px; background: #A0AEC0; border-radius: 4px; }
        .bottom-gray-pants .legs-split { display: flex; justify-content: space-between; width: 100%; height: 90px; }
        .bottom-gray-pants .leg-p { width: 30px; height: 100%; background: #CBD5E0; border-radius: 0 0 6px 6px; border: 1px solid #A0AEC0; }
        /* 카고 데님 하의 컴포넌트 */
        .bottom-denim { display: none; position: absolute; width: 72px; height: 115px; left: 124px; top: 250px; z-index: 24; }
        .bottom-denim .part { width: 100%; height: 15px; background: #2B6CB0; border-radius: 4px; }
        .bottom-denim .legs-split { display: flex; justify-content: space-between; width: 100%; height: 100px; }
        .bottom-denim .leg-p { width: 32px; height: 100%; background: #3182CE; border-radius: 0 0 8px 8px; }

        /* 원피스 컴포넌트 (상하의를 완전히 가리는 레이어 구조) */
        .dress-bear-component { display: none; position: absolute; width: 94px; height: 125px; background: #FFF0F5; border: 3px solid #FFB6C1; border-radius: 24px 24px 40px 40px; left: 113px; top: 195px; z-index: 26; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .dress-bear-component::after { content: '🐻'; position: absolute; font-size: 1.5rem; left: 32px; top: 40px; }
        
        .dress-queen-component { display: none; position: absolute; width: 110px; height: 190px; background: linear-gradient(to bottom, #E9D8FD, #B794F4); border: 2px solid #805AD5; border-radius: 20px 20px 60px 60px; left: 105px; top: 195px; z-index: 26; }

        /* 신발 컴포넌트 */
        .shoes-white-sneakers { display: none; position: absolute; width: 84px; height: 25px; left: 118px; top: 395px; z-index: 28; justify-content: space-between; }
        .shoes-white-sneakers .unit { width: 32px; height: 100%; background: #FFFFFF; border: 2px solid #CBD5E0; border-radius: 8px 12px 6px 6px; }
        
        .shoes-retro-boots { display: none; position: absolute; width: 86px; height: 45px; left: 117px; top: 375px; z-index: 28; justify-content: space-between; }
        .shoes-retro-boots .unit { width: 34px; height: 100%; background: #2D3748; border-radius: 8px 8px 10px 10px; border: 2px solid #1A202C; }

        /* 가방 컴포넌트 */
        .bag-messenger { display: none; position: absolute; width: 55px; height: 45px; background: #4A5568; border-radius: 12px; left: 95px; top: 240px; z-index: 35; border: 2px solid #2D3748; }
        .bag-messenger::before { content: ''; position: absolute; width: 90px; height: 6px; background: #2D3748; top: -25px; left: 15px; transform: rotate(-45deg); transform-origin: top left; }
        
        .bag-luxury { display: none; position: absolute; width: 50px; height: 40px; background: #D69E2E; border: 2px solid #9B2C2C; border-radius: 10px; right: 90px; top: 245px; z-index: 35; }
        
        /* 양말 컴포넌트 */
        .socks-crew { display: none; position: absolute; width: 76px; height: 40px; left: 122px; top: 360px; z-index: 22; justify-content: space-between; }
        .socks-crew .unit { width: 26px; height: 100%; background: #EDF2F7; border-top: 3px double #E53E3E; }

        /* 소품/액세서리 컴포넌트 */
        .acc-necklace { display: none; position: absolute; width: 34px; height: 24px; border: 3px solid #332211; border-radius: 50%; left: 143px; top: 178px; z-index: 27; }
        .acc-necklace::after { content: '❤️'; position: absolute; font-size: 0.6rem; bottom: -6px; left: 9px; }
        
        .acc-earring { display: none; position: absolute; width: 124px; height: 20px; left: 98px; top: 140px; z-index: 27; justify-content: space-between; }
        .acc-earring .unit { width: 8px; height: 18px; background: #ECC94B; border-radius: 4px; position: relative; }
        .acc-earring .unit::after { content: ''; position: absolute; width: 6px; height: 6px; background: #ED64A6; bottom: -3px; left: 1px; border-radius: 50%; }

        /* 하단 메인 액션 버튼 레이아웃 */
        .main-action-group { display: flex; gap: 20px; width: 100%; padding: 0 10px; }
        .btn-main-action {
            flex: 1; background: #FFFFFF; border: 3px solid #FFB6C1; padding: 14px; border-radius: 20px;
            font-size: 1.2rem; color: #FF69B4; cursor: pointer; box-shadow: 0 6px 15px rgba(255,182,193,0.3);
            display: flex; flex-direction: column; align-items: center; gap: 6px; transition: transform 0.1s;
        }
        .btn-main-action:active { transform: scale(0.96); }
        .btn-main-action .icon { font-size: 1.8rem; }

        /* ================= 🗄️ 옷장 서랍 슬라이드 패널 ================= */
        .closet-drawer {
            position: absolute; bottom: -600px; left: 0; width: 100%; height: 560px;
            background: #FFFFFF; border-top: 4px solid #FFB6C1; border-radius: 32px 32px 0 0;
            z-index: 200; transition: bottom 0.3s cubic-bezier(0.1, 0.8, 0.3, 1);
            display: flex; flex-direction: column; padding: 20px; box-shadow: 0 -10px 30px rgba(0,0,0,0.08);
        }
        .closet-drawer.open { bottom: 0; }
        .closet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .closet-title { color: #FF69B4; font-size: 1.3rem; }
        .btn-close-drawer { background: #FFB6C1; border: none; color: white; padding: 6px 14px; border-radius: 12px; cursor: pointer; }

        .closet-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px; }
        .closet-tabs::-webkit-scrollbar { height: 4px; }
        .closet-tabs::-webkit-scrollbar-thumb { background: #FFB6C1; border-radius: 10px; }
        .tab-item { flex-shrink: 0; padding: 8px 14px; background: #FFF0F5; border: 2px solid #FFE4E1; border-radius: 14px; color: #DB7093; cursor: pointer; font-size: 0.9rem; }
        .tab-item.active { background: #FF69B4; color: white; border-color: #FF69B4; }

        .closet-grid { flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; overflow-y: auto; }
        .closet-card { background: #FFFFFF; border: 2px solid #FFE4E1; border-radius: 18px; padding: 12px; display: flex; flex-direction: column; align-items: center; cursor: pointer; position: relative; }
        .closet-card.equipped { border-color: #FF69B4; background: #FFF5F7; }
        .closet-card.equipped::after { content: "장착됨"; position: absolute; top: 4px; right: 4px; background: #FF69B4; color: white; font-size: 0.65rem; padding: 2px 6px; border-radius: 8px; }
        .card-thumb { font-size: 2rem; margin-bottom: 4px; }
        .card-name { font-size: 0.8rem; text-align: center; color: #444; min-height: 34px; display: flex; align-items: center; }
        .card-grade { font-size: 0.7rem; font-weight: bold; padding: 1px 5px; border-radius: 6px; margin-top: 4px; }

        /* ================= 📱 가상 스마트폰 시스템 윈도우 ================= */
        .phone-popup { position: absolute; top: 100%; left: 0; width: 100%; height: 100%; background: #FFF5F7; z-index: 300; transition: top 0.3s cubic-bezier(0.1, 0.8, 0.3, 1); display: flex; flex-direction: column; }
        .phone-popup.open { top: 0; }
        .phone-popup-header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #FFE4E1; }
        .phone-popup-body { flex: 1; position: relative; overflow: hidden; }

        .phone-home { width: 100%; height: 100%; display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); gap: 20px; padding: 30px; }
        .app-icon-btn { background: #FFFFFF; border: 3px solid #FFE4E1; border-radius: 28px; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04); display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; gap: 10px; }
        .app-icon-btn .app-img { font-size: 3.2rem; }
        .app-icon-btn .app-label { font-size: 1.1rem; color: #333; font-weight: bold; }

        .app-panel { display: none; width: 100%; height: 100%; background: #FFFFFF; position: absolute; top: 0; left: 0; flex-direction: column; padding: 15px; overflow-y: auto; }
        .app-panel.active { display: flex; }
        .app-back-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px dashed #FFE4E1; }
        .btn-app-back { background: #FFE4E1; border: none; padding: 6px 12px; border-radius: 10px; cursor: pointer; }

        .gacha-banner { background: #FFF0F5; border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; border: 2px dashed #FFB6C1; }
        .btn-gacha-trigger { width: 100%; background: linear-gradient(135deg, #FF69B4, #FF1493); color: white; border: none; padding: 16px; border-radius: 18px; font-size: 1.2rem; cursor: pointer; box-shadow: 0 5px 15px rgba(255,20,147,0.3); }

        .kream-live-card { background: #F8F9FA; border: 2px solid #E9ECEF; border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .kream-price-display { font-size: 1.9rem; color: #222; margin: 12px 0; font-weight: bold; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .trend-badge { font-size: 0.9rem; padding: 3px 8px; border-radius: 8px; font-weight: bold; }
        .trend-up { background: #FDE8E8; color: #E53E3E; }
        .trend-down { background: #EBF8FF; color: #3182CE; }

        .market-list { display: flex; flex-direction: column; gap: 12px; }
        .market-item-card { background: #FFFFFF; border: 2px solid #FFE4E1; border-radius: 20px; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .market-info-box { display: flex; align-items: center; gap: 15px; }
        .btn-sell-action { background: #4CAF50; color: white; border: none; padding: 10px 16px; border-radius: 12px; cursor: pointer; font-size: 0.95rem; }
        .btn-sell-action:disabled { background: #CCC; cursor: not-allowed; }

        /* 등급별 뱃지 컬러 서식 */
        .g-SSS { background: #f6e05e; color: #744210; }
        .g-SS { background: #e9d8fd; color: #553c9a; }
        .g-S { background: #fed7d7; color: #9b2c2c; }
        .g-A { background: #feebc8; color: #c05621; }
        .g-B { background: #e6fffa; color: #234e52; }
        .g-C { background: #edf2f7; color: #4a5568; }
    </style>
</head>
<body>

<div class="phone-container">
    
    <div class="top-header">
        <div class="game-title" id="global-room-title">✨ 쁘띠 드레스룸</div>
        <div class="currency-badge">💰 <span id="global-gold-txt">100,000</span>원</div>
    </div>

    <div class="content-body">
        
        <div id="view-auth" class="screen-view active">
            <div class="auth-container">
                <div class="auth-logo">👗🌸</div>
                <div class="auth-box" id="box-login">
                    <div class="auth-title">로그인</div>
                    <input type="text" id="input-login-id" class="input-field" placeholder="아이디 입력">
                    <input type="password" id="input-login-pw" class="input-field" placeholder="비밀번호 입력">
                    <button class="btn-block" onclick="handleLogin()">로그인</button>
                    <button class="btn-block secondary" onclick="switchAuthBox('join')">회원가입 하러가기</button>
                </div>

<script>
    const CATEGORIES = [
        { id: 'hair', name: '헤어' },

        { id: 'bottom', name: '하의' },
        { id: 'shoes', name: '신발' },
        { id: 'bag', name: '가방' },
        { id: 'dress', name: '원피스' },

    // 의상 메타데이터베이스 아카이브 구축
    const CLOTHES_DATABASE = {
        // [★요청사항 반영] 고정 기본 지급 의상 3종
        'basic-hair': { id: 'basic-hair', category: 'hair', name: '검은색 긴 생머리', grade: 'C', basePrice: 5000, view: '💇‍♀️', componentId: 'c-hair-front' },

        'basic-bottom': { id: 'basic-bottom', category: 'bottom', name: '회색 바지', grade: 'C', basePrice: 5000, view: '🩳', componentId: 'c-bottom-gray' },
        
        // 에이블리 수집 풀
        'ab-hair1': { id: 'ab-hair1', category: 'hair', name: '트윈 핑크 테일 헤어', grade: 'B', basePrice: 22000, view: '👱‍♀️', componentId: 'c-pink-hair-front' },
        'ab-ear1': { id: 'ab-ear1', category: 'earring', name: '반짝 리본 귀걸이', grade: 'A', basePrice: 42000, view: '💎', componentId: 'c-acc-earring' },
        'ab-dress1': { id: 'ab-dress1', category: 'dress', name: '프릴 베어 드레스', grade: 'S', basePrice: 75000, view: '👗', componentId: 'c-dress-bear' },

        // 무신사 수집 풀
        'ms-top1': { id: 'ms-top1', category: 'top', name: '오버핏 맨투맨 블루', grade: 'B', basePrice: 48000, view: '👚', componentId: 'c-top-manto' },
        'ms-bot1': { id: 'ms-bot1', category: 'bottom', name: '와이드 카고 데님 바지', grade: 'A', basePrice: 68000, view: '👖', componentId: 'c-bottom-denim' },
        'ms-shoes1': { id: 'ms-shoes1', category: 'shoes', name: '클래식 화이트 스니커즈', grade: 'B', basePrice: 55000, view: '👟', componentId: 'c-shoes-sneakers' },
        'ms-bag1': { id: 'ms-bag1', category: 'bag', name: '유틸리티 메신저 백', grade: 'A', basePrice: 72000, view: '🎒', componentId: 'c-bag-messenger' },
        'ms-socks1': { id: 'ms-socks1', category: 'socks', name: '스트리트 크루삭스', grade: 'C', basePrice: 9000, view: '🧦', componentId: 'c-socks-crew' },

        // 크림 프리미엄 풀
        'kr-shoes1': { id: 'kr-shoes1', category: 'shoes', name: '리미티드 레트로 블랙 부츠', grade: 'SS', basePrice: 180000, view: '🥾', componentId: 'c-shoes-boots' },
        'kr-bag1': { id: 'kr-bag1', category: 'bag', name: '럭셔리 모노그램 골드 체인백', grade: 'SSS', basePrice: 380000, view: '👜', componentId: 'c-bag-luxury' },
        'kr-dress1': { id: 'kr-dress1', category: 'dress', name: '로열 퍼플 드레스', grade: 'SSS', basePrice: 450000, view: '💃', componentId: 'c-dress-queen' },
        'kr-neck1': { id: 'kr-neck1', category: 'necklace', name: '하트 팬던트 초커 목걸이', grade: 'S', basePrice: 62000, view: '📿', componentId: 'c-acc-necklace' }
    };

    let appState = {
        registeredUsers: {},
        currentUser: null,
        userName: '',
        gender: 'Female',
        gold: 100000,
        // [★필수] 오직 제공 지시받은 3가지 아이템만 인벤토리에 탑재된 채 개막
        ownedItems: ['basic-hair', 'basic-top', 'basic-bottom'],
        equipped: {
            hair: 'basic-hair', top: 'basic-top', bottom: 'basic-bottom',
            shoes: null, bag: null, dress: null, socks: null, necklace: null, earring: null
        }
    };

    let LIVE_MARKET_PRICES = {};
    let KREAM_CURRENT_GACHA_PRICE = 80000;
    let KREAM_GACHA_TREND = 'up';
    let currentClosetCategory = 'hair';

    window.onload = function() {
        // 실시간 매입 가격 풀 초기화 동기화
        Object.keys(CLOTHES_DATABASE).forEach(k => {
            LIVE_MARKET_PRICES[k] = CLOTHES_DATABASE[k].basePrice;
        });

        // 1초 단위 마스터 금융 순환 인터벌 코어 장착
        setInterval(processOneSecondMarketFluctuation, 1000);
    };

    function switchAuthBox(mode) {
        if(mode === 'join') {
            document.getElementById('box-login').style.display = 'none';
            document.getElementById('box-join').style.display = 'block';
        } else {
            document.getElementById('box-login').style.display = 'block';
            document.getElementById('box-join').style.display = 'none';
        }
    }

    function handleRegister() {
        const id = document.getElementById('input-join-id').value.trim();
        const pw = document.getElementById('input-join-pw').value.trim();
        if(!id || !pw) return alert('아이디와 비밀번호를 채워넣어 주세요.');
        if(appState.registeredUsers[id]) return alert('이미 선점된 식별 정보입니다.');
        
        appState.registeredUsers[id] = pw;
        alert('회원가입 완료! 로그인해 주세요.');
        switchAuthBox('login');
    }

    function handleLogin() {
        const id = document.getElementById('input-login-id').value.trim();
        const pw = document.getElementById('input-login-pw').value.trim();
        if(appState.registeredUsers[id] && appState.registeredUsers[id] === pw) {
            appState.currentUser = id;
            document.getElementById('view-auth').classList.remove('active');
            document.getElementById('view-setup').classList.add('active');
        } else {
            alert('인증 정보가 틀렸습니다.');
        }
    }

    function selectGender(gender) {
        appState.gender = gender;
        document.getElementById('gbtn-female').classList.remove('selected');
        document.getElementById('gbtn-male').classList.remove('selected');
        if(gender === 'Female') document.getElementById('gbtn-female').classList.add('selected');
        else document.getElementById('gbtn-male').classList.add('selected');
    }

    function completeSetup() {
        const name = document.getElementById('input-setup-name').value.trim();
        if(!name) return alert('드레스룸 브랜드 명칭을 입력해 주세요.');
        
        appState.userName = name;
        document.getElementById('global-room-title').innerText = `✨ ${appState.userName}의 드레스룸`;
        
        const torsoNode = document.getElementById('node-torso');
        if(appState.gender === 'Male') {
            torsoNode.style.width = '76px';
            torsoNode.style.left = '122px';
        } else {
            torsoNode.style.width = '66px';
            torsoNode.style.left = '127px';
        }

        updateGoldUI();
        refreshAvatarVisualLayers();

        document.getElementById('view-setup').classList.remove('active');
        document.getElementById('view-main-room').classList.add('active');
    }

    function updateGoldUI() {
        document.getElementById('global-gold-txt').innerText = appState.gold.toLocaleString();
    }

    function openClosetDrawer() {
        document.getElementById('closet-drawer-panel').classList.add('open');
        renderClosetTabs();
        renderClosetGrid();
    }

    function closeClosetDrawer() {
        document.getElementById('closet-drawer-panel').classList.remove('open');
    }

    function renderClosetTabs() {
        const row = document.getElementById('closet-tabs-row');
        row.innerHTML = '';
        CATEGORIES.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `tab-item ${currentClosetCategory === cat.id ? 'active' : ''}`;
            btn.innerText = cat.name;
            btn.onclick = () => {
                currentClosetCategory = cat.id;
                renderClosetTabs();
                renderClosetGrid();
            };
            row.appendChild(btn);
        });
    }

    function renderClosetGrid() {
        const grid = document.getElementById('closet-items-grid');
        grid.innerHTML = '';

        const filtered = appState.ownedItems
            .map(id => CLOTHES_DATABASE[id])
            .filter(item => item && item.category === currentClosetCategory);

        filtered.forEach(item => {
            const isEquipped = appState.equipped[item.category] === item.id;
            const card = document.createElement('div');
            card.className = `closet-card ${isEquipped ? 'equipped' : ''}`;
            card.innerHTML = `
                <div class="card-thumb">${item.view}</div>
                <div class="card-name">${item.name}</div>
                <div class="card-grade g-${item.grade}">${item.grade}등급</div>
            `;
            card.onclick = () => toggleEquipItem(item);
            grid.appendChild(card);
        });
    }

    // [★상·하의 vs 원피스 배타적 착용 logic 탑재]
    function toggleEquipItem(item) {
        const cat = item.category;
        if(appState.equipped[cat] === item.id) {
            appState.equipped[cat] = null;
        } else {
            appState.equipped[cat] = item.id;
            if(cat === 'top' || cat === 'bottom') appState.equipped['dress'] = null;
            if(cat === 'dress') {
                appState.equipped['top'] = null;
                appState.equipped['bottom'] = null;
            }
        }
        renderClosetGrid();
        refreshAvatarVisualLayers();
    }

    // 그래픽 컴포넌트 온/오프 엔진
    function refreshAvatarVisualLayers() {
        // 먼저 모든 아이템 그래픽 요소를 끈다
        Object.values(CLOTHES_DATABASE).forEach(item => {
            const dom = document.getElementById(item.componentId);
            if(dom) dom.style.display = 'none';
        });
        
        // 뒷머리 특수 컴포넌트 예외 처리 오프
        document.getElementById('c-hair-back').style.display = 'none';
        document.getElementById('c-pink-hair-back').style.display = 'none';

        // 현재 착용 상태로 지정된 실체 요소들만 렌더 처리
        Object.keys(appState.equipped).forEach(catKey => {
            const itemId = appState.equipped[catKey];
            if(itemId && CLOTHES_DATABASE[itemId]) {
                const matchedItem = CLOTHES_DATABASE[itemId];
                
                // 메인 컴포넌트 켜기 (Flex 속성 신발 대응 포함)
                const targetDom = document.getElementById(matchedItem.componentId);
                if(targetDom) {
                    if(matchedItem.category === 'shoes' || matchedItem.category === 'socks' || matchedItem.category === 'earring') {
                        targetDom.style.display = 'flex';
                    } else {
                        targetDom.style.display = 'block';
                    }
                }

                // [★긴생머리 복원 디테일] 뒷머리 추가 레이어 렌더링
                if(itemId === 'basic-hair') {
                    document.getElementById('c-hair-back').style.styleText = '';
                    document.getElementById('c-hair-back').style.display = 'block';
                }
                if(itemId === 'ab-hair1') {
                    document.getElementById('c-pink-hair-back').style.display = 'block';
                }
            }
        });
    }

    function openPhonePopup() {
        document.getElementById('phone-popup-panel').classList.add('open');
        backToPhoneHome();
    }

    function closePhonePopup() {
        document.getElementById('phone-popup-panel').classList.remove('remove');
        document.getElementById('phone-popup-panel').classList.remove('open');
    }

    function openAppPanel(appId) {
        document.getElementById('phone-home-view').style.display = 'none';
        document.querySelectorAll('.app-panel').forEach(p => p.classList.remove('active'));
        document.getElementById(`app-${appId}`).classList.add('active');
        if(appId === 'joonggo') renderJoonggoList();
    }

    function backToPhoneHome() {
        document.getElementById('phone-home-view').style.display = 'grid';
        document.querySelectorAll('.app-panel').forEach(p => p.classList.remove('active'));
    }

    // ================= 📊 확률분포표 가챠 시스템 =================
    function triggerGacha(platform) {
        let cost = platform === 'abley' ? 30000 : (platform === 'musinsa' ? 50000 : KREAM_CURRENT_GACHA_PRICE);
        if(appState.gold < cost) return alert('잔재화가 부족합니다. 중고나라에서 의상을 청산하세요.');

        appState.gold -= cost;
        updateGoldUI();

        const seed = Math.random() * 100;
        let grade = 'C';

        if(platform === 'abley') {
            if(seed < 0.5) grade = 'SSS';
            else if(seed < 3.0) grade = 'SS';
            else if(seed < 10.0) grade = 'S';
            else if(seed < 25.0) grade = 'A';
            else if(seed < 55.0) grade = 'B';
            else grade = 'C';
        } else if(platform === 'musinsa') {
            if(seed < 1.5) grade = 'SSS';
            else if(seed < 6.0) grade = 'SS';
            else if(seed < 18.0) grade = 'S';
            else if(seed < 40.0) grade = 'A';
            else if(seed < 75.0) grade = 'B';
            else grade = 'C';
        } else { // 크림 고확률
            if(seed < 4.0) grade = 'SSS';
            else if(seed < 14.0) grade = 'SS';
            else if(seed < 35.0) grade = 'S';
            else if(seed < 65.0) grade = 'A';
            else if(seed < 90.0) grade = 'B';
            else grade = 'C';
        }

        const pool = Object.values(CLOTHES_DATABASE).filter(x => x.grade === grade && !x.id.startsWith('basic-'));
        const finalItem = pool.length > 0 ? pool[Math.floor(Math.random()*pool.length)] : CLOTHES_DATABASE['ms-socks1'];

        appState.ownedItems.push(finalItem.id);
        alert(`🎉 축하합니다!\n[${finalItem.grade}등급] ${finalItem.name} 획득 완료!`);
    }

    // ================= 📊 1초 주기 실시간 연산 인프라 (금융형 메커니즘) =================
    function processOneSecondMarketFluctuation() {
        // 1. 크림 뽑기방 단가 실시간 변동 연산
        const kd = (Math.random() * 18 - 8.8) / 100;
        let nextKream = Math.round(KREAM_CURRENT_GACHA_PRICE * (1 + kd));
        if(nextKream < 35000) nextKream = 35000;
        if(nextKream > 185000) nextKream = 185000;

        KREAM_GACHA_TREND = nextKream >= KREAM_CURRENT_GACHA_PRICE ? 'up' : 'down';
        KREAM_CURRENT_GACHA_PRICE = nextKream;

        const pTxt = document.getElementById('kream-gacha-price-txt');
        const tInd = document.getElementById('kream-trend-indicator');
        if(pTxt && tInd) {
            pTxt.innerText = KREAM_CURRENT_GACHA_PRICE.toLocaleString();
            if(KREAM_GACHA_TREND === 'up') {
                tInd.innerText = "▲ 상승"; tInd.className = "trend-badge trend-up";
            } else {
                tInd.innerText = "▼ 하락"; tInd.className = "trend-badge trend-down";
            }
        }

        // 2. 중고나라 의상 매입 단가 등급별 변동성 차등 업데이트
        Object.keys(CLOTHES_DATABASE).forEach(k => {
            const item = CLOTHES_DATABASE[k];
            let vol = item.grade === 'SSS' || item.grade === 'SS' ? 0.25 : (item.grade === 'S' || item.grade === 'A' ? 0.12 : 0.04);
            let change = (Math.random() * (vol * 2) - vol);
            let nextPrice = Math.round(LIVE_MARKET_PRICES[k] * (1 + change));
            
            if(nextPrice < item.basePrice * 0.4) nextPrice = Math.round(item.basePrice * 0.4);
            if(nextPrice > item.basePrice * 2.5) nextPrice = Math.round(item.basePrice * 2.5);
            LIVE_MARKET_PRICES[k] = nextPrice;
        });

        if(document.getElementById('app-joonggo').classList.contains('active')) {
            renderJoonggoList();
        }
    }

    // ================= 🤝 중고나라 일방향 판매 전용 뷰 피딩 =================
    function renderJoonggoList() {
        const box = document.getElementById('joonggo-sell-list');
        box.innerHTML = '';
        if(appState.ownedItems.length === 0) return;

        appState.ownedItems.forEach((ownedId, idx) => {
            const item = CLOTHES_DATABASE[ownedId];
            if(!item) return;

            const livePrice = LIVE_MARKET_PRICES[ownedId] || item.basePrice;
            const isBasic = ownedId.startsWith('basic-'); // 기본 템 안전 필터

            const card = document.createElement('div');
            card.className = 'market-item-card';
            card.innerHTML = `
                <div class="market-info-box">
                    <span style="font-size:2rem;">${item.view}</span>
                    <div>
                        <div style="font-size:0.95rem; font-weight:bold;">${item.name}</div>
                        <div style="font-size:0.85rem; color:#666;">시세: <span style="color:#FF1493; font-weight:bold;">${livePrice.toLocaleString()}원</span></div>
                    </div>
                </div>
                <button class="btn-sell-action" ${isBasic ? 'disabled' : ''} onclick="executeSell('${ownedId}', ${livePrice}, ${idx}, '${item.category}')">
                    ${isBasic ? '지급품' : '판매'}
                </button>
            `;
            box.appendChild(card);
        });
    }

    function executeSell(ownedId, price, idx, cat) {
        if(appState.equipped[cat] === ownedId) appState.equipped[cat] = null;
        appState.gold += price;
        appState.ownedItems.splice(idx, 1);
        
        updateGoldUI();
        refreshAvatarVisualLayers();
        renderJoonggoList();
    }
</script>
