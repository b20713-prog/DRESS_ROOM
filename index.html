    function formatMoney(num) {
      return Number(num).toLocaleString('ko-KR');

    function initMarketPrices() {
      for (let key in ITEM_DATABASE) {
        AppState.marketPrices[key] = {
          current: ITEM_DATABASE[key].basePrice,
          change: 0,
          trend: 'flat'
        };
      }
    }

    function handleLogin() {
      const id = document.getElementById('login-id').value;
      if (!id) return alert("아이디를 입력해주세요.");
      AppState.user.id = id;
      document.getElementById('screen-login').classList.add('hidden');
      document.getElementById('screen-name').classList.remove('hidden');
    }

    function handleSaveName() {
      const name = document.getElementById('user-nickname').value.trim();
      if (!name) return alert("닉네임을 지정해주세요.");
      AppState.user.name = name;
      document.getElementById('screen-name').classList.add('hidden');
      document.getElementById('screen-gender').classList.remove('hidden');
    }

    function handleSelectGender(gender) {
      AppState.user.gender = gender;
      document.getElementById('display-name').innerText = AppState.user.name;
      document.getElementById('display-gender').innerText = gender === 'female' ? '여' : '남';
      updateUIBalance();

      const defaultHair = spawnItem('hair_c_black');
      const defaultTop = spawnItem('top_c_white');
      const defaultBottom = spawnItem('bottom_c_pants');
      
      equipItem(defaultHair);
      equipItem(defaultTop);
      equipItem(defaultBottom);

      document.getElementById('screen-gender').classList.add('hidden');
      initMarketPrices();
      setInterval(runMarketTicker, 3000); // 3초마다 시세 변동
    }

    function spawnItem(itemId) {
      const baseItem = ITEM_DATABASE[itemId];
      const instanceId = 'inst_' + Math.random().toString(36).substr(2, 9);
      const newInstance = {
        instanceId: instanceId,
        id: itemId,
        purchasePrice: AppState.marketPrices[itemId] ? AppState.marketPrices[itemId].current : baseItem.basePrice
      };
      AppState.user.inventory.push(newInstance);
      return newInstance;
    }

    function updateUIBalance() {
      document.getElementById('display-balance').innerText = formatMoney(AppState.user.balance);
    }

    // --- 5. Pure CSS 캐릭터 옷장 장착 엔진 ---
    function equipItem(itemInstance) {
      const itemData = ITEM_DATABASE[itemInstance.id];
      const category = itemData.category;

      if (category === 'dress') {
        AppState.user.equipped.top = null;
        AppState.user.equipped.bottom = null;
        AppState.user.equipped.dress = itemInstance;
      } else if (category === 'top' || category === 'bottom') {
        AppState.user.equipped.dress = null;
        AppState.user.equipped[category] = itemInstance;
      } else {
        AppState.user.equipped[category] = itemInstance;
      }
      renderAvatar();
    }

    function unequipItem(category) {
      AppState.user.equipped[category] = null;
      renderAvatar();
    }

    // --- 주식 시세 변동 엔진 (가격 변동 폭 수정 완료) ---
    function runMarketTicker() {
      const keys = Object.keys(AppState.marketPrices);
      if (keys.length === 0) return;

      // 무작위로 하나의 가격 변동 타겟 아이템 선택
      const randomKey = keys[Math.floor(Math.random() * keys.length)];
      const currentPrice = AppState.marketPrices[randomKey].current;

      // 변동 폭 설정: 최소 -20%에서 최대 +25%까지 크게 요동치도록 수정
      const changePercent = (Math.random() * 45 - 20) / 100; 
      const changeAmount = Math.round(currentPrice * changePercent);
      let nextPrice = currentPrice + changeAmount;

      // 최소 가격 제한 설정 (최소 500원 이하로 떨어지지 않도록 방어)
      if (nextPrice < 500) nextPrice = 500;

      AppState.marketPrices[randomKey].current = nextPrice;
      AppState.marketPrices[randomKey].change = changePercent * 100;
      AppState.marketPrices[randomKey].trend = changeAmount > 0 ? 'up' : 'down';

      // 상단 티커 알림 애니메이션 표시
      const banner = document.getElementById('ticker-banner');
      const itemDb = ITEM_DATABASE[randomKey];
      
      document.getElementById('ticker-item-name').innerText = `📢 ${itemDb.name}`;
      const trendSymbol = changeAmount > 0 ? '🔺' : '🔻';
      document.getElementById('ticker-item-price').innerText = `${formatMoney(nextPrice)}원 (${trendSymbol} ${Math.abs(changePercent * 100).toFixed(1)}%)`;

      banner.style.opacity = '1';
      setTimeout(() => {
        banner.style.opacity = '0';
      }, 2500);

      // 스마트폰이 켜져있고 중고나라 앱이 실행 중이면 화면 실시간 갱신
      if (!document.getElementById('modal-phone').classList.contains('translate-y-full')) {
        const appTitle = document.getElementById('app-title').innerText;
        if (appTitle === '중고나라(주식)') {
          renderJoonggoApp();
        }
      }
    }

    // 뽑기 시 한 가지 아이템만 나오던 오류 해결: ITEM_DATABASE에서 완전 무작위 추출 처리
    function playGacha() {
      const gachaCost = 15000;
      if (AppState.user.balance < gachaCost) {
        alert("잔액이 부족합니다.");
        return;
      }

      AppState.user.balance -= gachaCost;
      updateUIBalance();

      const allItemKeys = Object.keys(ITEM_DATABASE);
      
      // 균등하고 확실하게 무작위의 아이템 키를 선택
      const randomKey = allItemKeys[Math.floor(Math.random() * allItemKeys.length)];
      const newItemInstance = spawnItem(randomKey);

      // 모달 애니메이션 및 결과 정보 세팅

      modal.classList.remove('hidden');

      spawnItem(itemId);

    // --- 크림 KREAM (개인 인벤토리 판매) ---
    function renderKreamApp() {
      const appBody = document.getElementById('app-body');
      let html = `<h4 class="text-white font-bold text-sm mb-4">내 아이템 즉시 판매</h4>`;
      if (AppState.user.inventory.length === 0) {
        html += `<p class="text-neutral-500 text-xs text-center py-8">소유 중인 아이템이 없습니다.</p>`;
      } else {
        html += `<div class="space-y-2">`;
        AppState.user.inventory.forEach((inst, index) => {
          const item = ITEM_DATABASE[inst.id];
          const curPrice = AppState.marketPrices[inst.id] ? AppState.marketPrices[inst.id].current : item.basePrice;
          html += `
            <div class="bg-neutral-800 rounded-xl p-3 flex justify-between items-center border border-neutral-700">
              <div>
                <span class="text-[9px] text-neutral-400">${item.category.toUpperCase()}</span>

              </div>
              <div class="text-right">
                <div class="text-xs font-bold text-emerald-400">₩ ${formatMoney(curPrice)}</div>
                <button onclick="sellItemKream(${index})" class="text-[10px] bg-emerald-900/40 hover:bg-emerald-800/60 text-emerald-300 font-black px-3 py-1 rounded-full mt-1 border border-emerald-700">판매</button>
              </div>
            </div>
          `;
        });
        html += `</div>`;
      }
      appBody.innerHTML = html;
    }

    function sellItemKream(index) {
      const inst = AppState.user.inventory[index];
      const item = ITEM_DATABASE[inst.id];
      const salePrice = AppState.marketPrices[inst.id] ? AppState.marketPrices[inst.id].current : item.basePrice;

      // 착용 해제 선행
      for (let cat in AppState.user.equipped) {
        if (AppState.user.equipped[cat] && AppState.user.equipped[cat].instanceId === inst.instanceId) {
          AppState.user.equipped[cat] = null;
        }
      }

      AppState.user.balance += salePrice;
      AppState.user.inventory.splice(index, 1);
      updateUIBalance();
      renderAvatar();
      renderKreamApp();
      alert(`${item.name}을(를) ₩ ${formatMoney(salePrice)}에 판매 완료했습니다.`);
    }

          <span class="text-[10px] bg-red-500/20 text-red-400 px-2 py-0.5 rounded-full font-bold animate-pulse">● LIVE</span>
        </div>
        <div class="space-y-2 pb-6">
      `;
      for (let key in AppState.marketPrices) {
        const item = ITEM_DATABASE[key];
        const market = AppState.marketPrices[key];
        const trendSymbol = market.trend === 'up' ? '▲' : market.trend === 'down' ? '▼' : '─';
        const trendColor = market.trend === 'up' ? 'text-red-400' : market.trend === 'down' ? 'text-blue-400' : 'text-neutral-400';
        
        html += `
          <div class="bg-neutral-800/80 rounded-xl p-3 flex justify-between items-center border border-neutral-800">
            <div>
              <div class="text-white text-xs font-bold">${item.name}</div>
              <span class="text-[9px] text-neutral-500">기본가: ₩${formatMoney(item.basePrice)}</span>
            </div>
            <div class="text-right">
              <div class="text-xs font-bold text-white">₩ ${formatMoney(market.current)}</div>
              <span class="text-[10px] font-mono ${trendColor}">${trendSymbol} ${market.change.toFixed(1)}%</span>
            </div>
          </div>
        `;
      }
      html += `</div>`;
      appBody.innerHTML = html;
    }

    // --- 9. 옷장 모달 & 장착 필터링 제어 ---
    function openWardrobe() {
      document.getElementById('modal-wardrobe').classList.remove('translate-y-full');
      filterWardrobe('all');
    }

    function closeWardrobe() {
      document.getElementById('modal-wardrobe').classList.add('translate-y-full');
    }

    function filterWardrobe(category) {
      AppState.currentWardrobeTab = category;
      
      const tabButtons = document.querySelectorAll('#wardrobe-tabs button');
      tabButtons.forEach(btn => {
        btn.className = "px-3 py-1 bg-pink-50 text-gray-500 text-xs font-bold rounded-full whitespace-nowrap";
      });

      event.currentTarget.className = "px-3 py-1 bg-brandPink text-white text-xs font-bold rounded-full whitespace-nowrap";

      const listContainer = document.getElementById('wardrobe-list');
      listContainer.innerHTML = '';

      let items = AppState.user.inventory;
      if (category !== 'all') {
        items = items.filter(inst => ITEM_DATABASE[inst.id].category === category);
      }

      if (items.length === 0) {
        listContainer.innerHTML = `<p class="col-span-3 text-center py-12 text-xs text-gray-400">옷장이 텅 비어 있습니다.</p>`;
        return;
      }

      items.forEach(inst => {
        const item = ITEM_DATABASE[inst.id];
        const gradeColor = GRADE_COLORS[item.grade] || { bg: 'bg-zinc-400' };
        const isEquipped = Object.values(AppState.user.equipped).some(eq => eq && eq.instanceId === inst.instanceId);

        const card = document.createElement('div');
        card.className = `relative bg-pink-50/50 rounded-2xl p-2 border-2 ${isEquipped ? 'border-pink-500 bg-pink-50' : 'border-transparent'} flex flex-col justify-between items-center text-center group cursor-pointer`;
        card.onclick = () => {
          if (isEquipped) {
            unequipItem(item.category);
          } else {
            equipItem(inst);
          }
          filterWardrobe(AppState.currentWardrobeTab);
        };

        card.innerHTML = `
          <span class="absolute top-1 left-1 text-[8px] text-white px-1 py-0.2 rounded-full font-bold ${gradeColor.bg}">${item.grade}</span>
          <div class="w-16 h-16 relative overflow-hidden my-2 scale-75">
            <div class="scale-125 relative w-[180px] h-[280px] origin-center -translate-x-[55px] -translate-y-24">
              ${item.renderBack ? item.renderBack() : ''}
              ${item.render ? item.render() : ''}
              ${item.renderFront ? item.renderFront() : ''}
            </div>
          </div>
          <div class="text-[10px] font-bold text-gray-700 truncate w-full px-1">${item.name}</div>
          ${isEquipped ? `<span class="text-[9px] text-pink-500 font-extrabold mt-1">E</span>` : ''}
        `;
        listContainer.appendChild(card);
      });
    }
  </script>
</body>
</html>
