<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OOTD Atelier Premium - Ultimate Mega Expansion</title>
    <style>
        :root {
            --bg-base: #fff5f6;
            --card-bg: #ffffff;
            --accent-soft: #ff7597;
            --accent-hover: #ff4d79;
            --text-dark: #2d3748;
            --text-muted: #718096;
            --border-soft: #ffe3e7;

            --color-sss: #ff0055;
            --color-ss: #ff9900;
            --color-s: #a855f7;
            --color-a: #3b82f6;
            --color-b: #10b981;
            --color-c: #64748b;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Pretendard', -apple-system, sans-serif; 
        }
        
        body { 
            background-color: #f5e6e8; 
            color: var(--text-dark); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .app-container {
            width: 430px;
            height: 880px;
            background: var(--bg-base);
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.18);
            border: 10px solid #ffffff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen { 
            display: none; 
            width: 100%; 
            height: 100%; 
            position: absolute; 
            top: 0; 
            left: 0; 
            padding: 24px; 
            flex-direction: column; 
        }
        
        .screen.active { 
            display: flex; 
        }

        button {
            background: var(--accent-soft); 
            color: white; 
            border: none; 
            padding: 14px 20px; 
            border-radius: 24px;
            font-weight: 800; 
            font-size: 1rem; 
            cursor: pointer; 
            transition: all 0.2s ease-in-out;
            box-shadow: 0 6px 12px rgba(255, 117, 151, 0.25);
        }
        
        button:hover { 
            background: var(--accent-hover); 
            transform: translateY(-2px); 
            box-shadow: 0 8px 16px rgba(255, 77, 121, 0.35);
        }
        
        button:active {
            transform: translateY(0);
        }

        input { 
            background: #ffffff; 
            border: 2px solid #ffd0d6; 
            padding: 14px; 
            border-radius: 18px; 
            margin-bottom: 12px; 
            outline: none; 
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        
        input:focus { 
            border-color: var(--accent-soft); 
        }

        #screen-login { 
            justify-content: center; 
            background: linear-gradient(180deg, #fffcfc 0%, #ffeef1 100%); 
        }
        
        .brand-logo { 
            text-align: center; 
            margin-bottom: 45px; 
        }
        
        .brand-logo h1 { 
            font-size: 2.5rem; 
            font-weight: 950; 
            color: #ff4d73; 
            letter-spacing: -1px;
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--border-soft); 
            padding-bottom: 14px; 
        }
        
        .balance-tag { 
            background: #fffbeb; 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-weight: 900; 
            color: #b45309; 
            font-size: 0.9rem; 
            border: 1px solid #fde68a;
        }

        .character-view {
            flex: 1; 
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            background: #ffffff; 
            margin: 16px 0; 
            border-radius: 32px; 
            border: 2px solid #ffe3e7; 
            overflow: hidden;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.02);
        }
        
        .canvas-container { 
            position: relative; 
            width: 300px; 
            height: 440px; 
        }
        
        .layer { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        .layer svg { 
            width: 100%; 
            height: 100%; 
        }

        .main-controls { 
            display: flex; 
            gap: 12px; 
        }
        
        .main-controls button { 
            flex: 1; 
            padding: 16px; 
            border-radius: 24px; 
        }

        .overlay-view {
            display: none; 
            position: absolute; 
            top: 70px; 
            left: 0; 
            width: 100%; 
            height: calc(100% - 70px);
            background: var(--card-bg); 
            z-index: 10; 
            padding: 24px; 
            flex-direction: column;
            border-top-left-radius: 32px; 
            border-top-right-radius: 32px;
            box-shadow: 0 -10px 30px rgba(255, 117, 151, 0.1); 
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        @keyframes slideUp { 
            from { transform: translateY(100%); } 
            to { transform: translateY(0); } 
        }
        
        .overlay-view.active { 
            display: flex; 
        }
        
        .overlay-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
        }

        .item-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            overflow-y: auto; 
            flex: 1; 
            padding-bottom: 20px; 
        }
        
        .item-card { 
            background: #fffcfc; 
            border: 2px solid #fff0f2; 
            border-radius: 22px; 
            padding: 10px; 
            text-align: center; 
            cursor: pointer; 
            position: relative; 
            transition: all 0.2s ease; 
        }
        
        .item-card.equipped { 
            border: 3px solid var(--accent-soft); 
            background: #fff0f3; 
            transform: scale(0.97);
        }
        
        .item-grade-tag { 
            position: absolute; 
            top: 6px; 
            left: 6px; 
            font-size: 0.65rem; 
            font-weight: 900; 
            padding: 2px 6px; 
            border-radius: 10px; 
            color: #ffffff; 
        }
        
        .item-preview-svg { 
            width: 85px; 
            height: 85px; 
            margin: 8px auto; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        .phone-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 16px; 
            margin-top: 15px; 
        }
        
        .app-icon-btn {
            background: #ffffff; 
            border: 2px solid #f1f5f9; 
            border-radius: 28px; 
            padding: 24px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 10px; 
            cursor: pointer; 
            transition: all 0.2s ease;
        }
        
        .app-icon-btn:hover { 
            transform: scale(1.05); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            border-color: #ffd0d6;
        }

        .used-list { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            overflow-y: auto; 
            flex: 1; 
        }
        
        .used-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #fffcfc; 
            padding: 16px; 
            border-radius: 22px; 
            border: 1.5px solid #ffe3e7; 
        }
        
        .price-up { color: #ef4444; font-weight: 900; }
        .price-down { color: #3b82f6; font-weight: 900; }
        
        .probability-info { 
            background: #f8fafc; 
            border: 1.5px solid #e2e8f0; 
            border-radius: 18px; 
            padding: 14px; 
            margin-bottom: 20px; 
            font-size: 0.8rem; 
            max-height: 180px; 
            overflow-y: auto; 
        }
        
        .prob-row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 6px; 
        }

        .grade-SSS { color: var(--color-sss); font-weight: 950; }
        .grade-SS { color: var(--color-ss); font-weight: 950; }
        .grade-S { color: var(--color-s); font-weight: 900; }
        .grade-A { color: var(--color-a); font-weight: 800; }
        .grade-B { color: var(--color-b); font-weight: 800; }
        .grade-C { color: var(--color-c); font-weight: 700; }

        .grade-bg-SSS { background: var(--color-sss); }
        .grade-bg-SS { background: var(--color-ss); }
        .grade-bg-S { background: var(--color-s); }
        .grade-bg-A { background: var(--color-a); }
        .grade-bg-B { background: var(--color-b); }
        .grade-bg-C { background: var(--color-c); }

        .gacha-popup {
            display: none; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            background: #ffffff; 
            border: 4px solid var(--accent-soft); 
            padding: 30px; 
            border-radius: 32px;
            z-index: 100; 
            text-align: center; 
            width: 88%; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- 1. 로그인 화면 -->
    <div id="screen-login" class="screen active">
        <div class="brand-logo">
            <h1>OOTD Atelier</h1>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 6px; font-weight: 700;">실시간 변동식 드레스 마켓</p>
        </div>
        <div class="auth-box" style="display:flex; flex-direction:column;">
            <input type="text" id="login-id" placeholder="아이디">
            <input type="password" id="login-pw" placeholder="비밀번호">
            <button onclick="handleRegister()" style="background: #ffffff; border: 2px solid #ffd0d6; color: var(--text-muted); box-shadow: none; margin-bottom: 8px;">회원가입</button>
            <button onclick="handleLogin()">로그인</button>
        </div>
    </div>

    <!-- 2. 디자이너 정보 셋업 화면 -->
    <div id="screen-setup" class="screen" style="background: #ffffff; justify-content: center;">
        <h2 style="font-size: 1.5rem; font-weight: 950; margin-bottom: 24px; text-align:center; color:#ff4d73;">브랜드 디자이너 등록</h2>
        <input type="text" id="user-name" placeholder="사용할 디자이너 이름">
        <div style="display: flex; gap: 12px; margin-top: 10px;">
            <button id="g-male" style="flex:1; background:#fff; border:2.5px solid #cbd5e1; color:#475569;" onclick="selectGender('male')">남자 캐릭터</button>
            <button id="g-female" style="flex:1; background:#fff; border:2.5px solid #cbd5e1; color:#475569;" onclick="selectGender('female')">여자 캐릭터</button>
        </div>
        <button onclick="completeSetup()" style="margin-top: 30px; padding:16px;">게임 시작하기</button>
    </div>

    <!-- 3. 메인 게임 보드 -->
    <div id="screen-main" class="screen">
        <div class="header">
            <div style="font-weight: 950; font-size: 1.1rem; color: #1e293b;"><span id="display-username" style="color:var(--accent-soft);">디자이너</span>의 드레스룸</div>
            <div class="balance-tag">💎 <span id="user-money">300,000</span>원</div>
        </div>

        <!-- 캐릭터 아바타 영역 -->
        <div class="character-view">
            <div class="canvas-container">
                <div class="layer" id="layer-hair-back" style="z-index: 1;"></div>
                <div class="layer" id="layer-body" style="z-index: 2;"></div>
                <div class="layer" id="layer-socks" style="z-index: 3;"></div>
                <div class="layer" id="layer-shoes" style="z-index: 4;"></div>
                <div class="layer" id="layer-bottom" style="z-index: 5;"></div>
                <div class="layer" id="layer-top" style="z-index: 6;"></div>
                <div class="layer" id="layer-onepiece" style="z-index: 7;"></div>
                <div class="layer" id="layer-hair-front" style="z-index: 8;"></div>
                <div class="layer" id="layer-necklace" style="z-index: 9;"></div>
                <div class="layer" id="layer-earring" style="z-index: 10;"></div>
                <div class="layer" id="layer-hat" style="z-index: 11;"></div>
                <div class="layer" id="layer-bag" style="z-index: 12;"></div>
            </div>
        </div>

        <div class="main-controls">
            <button onclick="toggleOverlay('closet')" style="background: #475569; box-shadow: none;">🚪 옷장 열기</button>
            <button onclick="toggleOverlay('phone')">📱 핸드폰</button>
        </div>

        <!-- 옷장 오버레이 패널 -->
        <div id="overlay-closet" class="overlay-view">
            <div class="overlay-header">
                <h3 style="font-weight:950; color:#ff4d73;">MY CLOSET</h3>
                <button onclick="toggleOverlay('closet')" style="background:#64748b; padding:6px 14px; font-size:0.85rem; box-shadow: none;">닫기</button>
            </div>
            <div class="item-grid" id="closet-grid"></div>
        </div>

        <!-- 핸드폰 오버레이 패널 -->
        <div id="overlay-phone" class="overlay-view" style="background:#f8fafc;">
            <div class="overlay-header">
                <h3 style="color:#0f172a; font-weight:950;">SMART PHONE</h3>
                <button onclick="toggleOverlay('phone')" style="background:#ef4444; padding:6px 14px; font-size:0.85rem; box-shadow: none;">종료</button>
            </div>
            <div class="phone-grid">
                <div class="app-icon-btn" onclick="openApp('ably')"><span style="font-size:2.5rem;">✨</span><span style="font-weight:800; font-size:0.9rem;">에이블리</span></div>
                <div class="app-icon-btn" onclick="openApp('musinsa')"><span style="font-size:2.5rem;">🛹</span><span style="font-weight:800; font-size:0.9rem;">무신사</span></div>
                <div class="app-icon-btn" onclick="openApp('kream')"><span style="font-size:2.5rem;">🔥</span><span style="font-weight:800; font-size:0.9rem;">크림</span></div>
                <div class="app-icon-btn" onclick="openApp('junggonara')" style="background:#f0fdf4; border-color:#bbf7d0;"><span style="font-size:2.5rem;">🤝</span><span style="color:#16a34a; font-weight:900; font-size:0.9rem;">중고나라</span></div>
            </div>
        </div>

        <!-- 쇼핑 어플리케이션 가챠 모달 -->
        <div id="overlay-shop" class="overlay-view" style="z-index:20;">
            <div class="overlay-header">
                <h3 id="shop-title" style="font-weight:950;">SHOP</h3>
                <button onclick="closeApp('shop')" style="background:#64748b; padding:6px 14px; font-size:0.85rem; box-shadow:none;">뒤로</button>
            </div>
            <div style="background:#fff5f6; padding:16px; border-radius:22px; text-align:center; margin-bottom:16px;">
                <p id="shop-desc" style="font-size:0.85rem; color:var(--text-muted); font-weight:600;"></p>
                <h4 id="shop-cost" style="color:var(--accent-soft); font-size:1.35rem; font-weight:950; margin-top:6px;"></h4>
            </div>
            <h5 style="margin-bottom:8px; font-size:0.85rem; font-weight:800; color:#475569;">뽑기 품목 확률 정보</h5>
            <div class="probability-info" id="shop-prob-list"></div>
            <button onclick="triggerGacha()" style="width:100%; padding:16px; border-radius:24px;">아이템 쇼핑하기</button>
        </div>

        <!-- 중고나라 실시간 거래처 모달 -->
        <div id="overlay-junggo" class="overlay-view" style="z-index:20;">
            <div class="overlay-header">
                <h3 style="color:#16a34a; font-weight:950;">🤝 중고나라 실시간 시세 (0.8초 갱신)</h3>
                <button onclick="closeApp('junggo')" style="background:#64748b; padding:6px 14px; font-size:0.85rem; box-shadow:none;">뒤로</button>
            </div>
            <p style="font-size:0.8rem; color:var(--text-muted); font-weight:600; margin-bottom:14px; background:#f0fdf4; padding:10px; border-radius:12px;">
                ⚡ 가격 지수가 높게 요동칠 때 판매하여 수익을 극대화하세요!
            </p>
            <div class="used-list" id="junggonara-list"></div>
        </div>

    </div>

    <!-- 가챠 당첨 팝업 -->
    <div class="gacha-popup" id="gacha-popup">
        <h3 style="margin-bottom:8px; font-size:1.4rem; color:var(--accent-soft); font-weight:950;">🎉 NEW ITEM GET!</h3>
        <div id="gacha-result-name" style="font-size:1.2rem; font-weight:900; margin-bottom:6px; color:#1e293b;"></div>
        <div id="gacha-result-grade" style="font-size:1.3rem; margin-bottom:20px;"></div>
        <button onclick="closeGachaPopup()" style="width:100%; padding:14px;">보유 옷장에서 착용하기</button>
    </div>

</div>

<script>
    /* ========================================================
       1. 수정된 슬림하고 세련된 일자 어깨선 연동 SVG 렌더러 정의
       ======================================================== */
    const VECTOR_DRAW = {
        'hair-back': (c) => `<path d="M 25,32 C 10,65 10,110 25,120 C 32,95 68,95 75,120 C 90,110 90,65 75,32 Z" fill="${c}" />`,
        'hair-front': (c) => `<path d="M 24,31 C 25,10 75,10 76,31 C 81,42 76,55 73,63 C 70,43 65,29 50,31 C 35,29 30,43 27,63 C 24,55 19,42 24,31 Z" fill="${c}" />`,
        
        'top': (c, grade) => {
            let decor = (grade==="SSS" || grade==="SS") ? `<path d="M 40,65 L 50,75 L 60,65" stroke="#ffffff" stroke-width="2.5" fill="none"/><circle cx="50" cy="80" r="3" fill="#ffd0d6"/>` : '';
            return `
                <path d="M 30,55 L 70,55 L 67,90 L 33,90 Z" fill="${c}" />
                <path d="M 30,55 L 18,68 L 23,74 L 33,65 Z" fill="${c}" />
                <path d="M 70,55 L 82,68 L 77,74 L 67,65 Z" fill="${c}" />
                ${decor}
            `;
        },
        
        'bottom': (c, grade) => {
            let lines = "";
            if (grade === "SSS" || grade === "SS" || grade === "S") {
                lines = `<path d="M 37,88 L 34,118 M 50,88 L 50,120 M 63,88 L 66,118" stroke="rgba(0,0,0,0.15)" stroke-width="1.5"/>`;
            }
            return `<path d="M 32,88 L 68,88 L 72,120 L 28,120 Z" fill="${c}" />${lines}`;
        },
        
        'onepiece': (c, grade) => {
            let skirtFrill = (grade === "SSS") ? `<path d="M 25,123 Q 37,128 50,123 Q 63,128 75,123 L 75,127 Q 63,132 50,127 Q 37,132 25,127 Z" fill="#ffffff" />` : '';
            return `
                <path d="M 30,55 L 70,55 L 74,125 L 26,125 Z" fill="${c}" />
                <path d="M 30,55 L 18,68 L 23,74 L 33,65 Z" fill="${c}" />
                <path d="M 70,55 L 82,68 L 77,74 L 67,65 Z" fill="${c}" />
                ${skirtFrill}
            `;
        },
        
        'socks': (c) => `<path d="M 36,115 L 44,115 L 44,135 L 36,135 Z M 56,115 L 64,115 L 64,135 L 56,135 Z" fill="${c}" />`,
        'shoes': (c) => `<path d="M 35,135 Q 41,131 46,135 L 46,143 L 35,143 Z M 54,135 Q 59,131 65,135 L 65,143 L 54,143 Z" fill="${c}" /><rect x="35" y="141" width="11" height="2" fill="#1e293b"/><rect x="54" y="141" width="11" height="2" fill="#1e293b"/>`,
        'hat': (c) => `<path d="M 24,24 C 24,-3 76,-3 76,24 C 83,28 17,28 24,24 Z" fill="${c}" />`,
        'bag': (c) => `<path d="M 12,82 L 28,82 L 28,102 L 12,102 Z" fill="${c}" /><path d="M 20,56 C 5,56 8,82 12,82" stroke="#475569" stroke-width="2.2" fill="none"/>`,
        'necklace': (c) => `<path d="M 38,58 Q 50,70 62,58" stroke="${c}" stroke-width="2.5" fill="none" /><circle cx="50" cy="70" r="4" fill="#ff4d73"/>`,
        'earring': (c) => `<circle cx="35" cy="44" r="3" fill="${c}" /><circle cx="65" cy="44" r="3" fill="${c}" />`
    };

    /* ========================================================
       2. [볼륨 대확장] 에이블리, 무신사, 크림 각 32종 총 96종 완벽한 데이터베이스 수록
       ======================================================== */
    const ITEM_DATABASE = {
        ably: [
            // SSS (3)
            { id: "a1", name: "딸기 마카롱 리본 드레스", category: "onepiece", grade: "SSS", originalPrice: 280000, color: "#ffb3c6" },
            { id: "a2", name: "로코코 레이스 프릴 보닛햇", category: "hat", grade: "SSS", originalPrice: 240000, color: "#ffe3e7" },
            { id: "a3", name: "글리터 블러썸 글래스 구두", category: "shoes", grade: "SSS", originalPrice: 260000, color: "#ffd0d6" },
            // SS (4)
            { id: "a4", name: "테디 베어 숄더 파우치 백", category: "bag", grade: "SS", originalPrice: 160000, color: "#b48a78" },
            { id: "a5", name: "엔젤 하트 윙 진주 귀걸이", category: "earring", grade: "SS", originalPrice: 150000, color: "#ff85a1" },
            { id: "a6", name: "메이플 퍼플 트위드 투피스", category: "onepiece", grade: "SS", originalPrice: 175000, color: "#e9d5ff" },
            { id: "a7", name: "퓨어 체리 실크 하이삭스", category: "socks", grade: "SS", originalPrice: 130000, color: "#fca5a5" },
            // S (5)
            { id: "a8", name: "트윈 로즈 벨벳 쵸커", category: "necklace", grade: "S", originalPrice: 80000, color: "#ff4d73" },

       ======================================================== */
    function initMarketPrices() {
        const fullList = [...ITEM_DATABASE.ably, ...ITEM_DATABASE.musinsa, ...ITEM_DATABASE.kream, ...DEFAULT_ITEMS];
        fullList.forEach(item => { 
            marketPrices[item.id] = (Math.random() * 0.4) + 0.8; 
        });

        setInterval(() => {
            fullList.forEach(item => {
                let vol = 0.12; 
                if(item.grade === "SSS") vol = 0.45;
                else if(item.grade === "SS") vol = 0.32;
                else if(item.grade === "S") vol = 0.22;

                const isUp = Math.random() > 0.44;
                let delta = Math.random() * vol * (isUp ? 1 : -1);
                
                let next = marketPrices[item.id] + delta;
                if(next < 0.20) next = 0.20;
                if(next > 2.50) next = 2.50;

                marketPrices[item.id] = next;
            });
            updateJunggonaraUI();
        }, 800);
    }

    function handleRegister() {
        const id = document.getElementById("login-id").value.trim();
        const pw = document.getElementById("login-pw").value.trim();
        if(!id || !pw) return alert("아이디와 비밀번호를 모두 입력해주세요.");
        if(usersDb[id]) return alert("동일한 아이디가 이미 가입되어 있습니다.");

        usersDb[id] = { password: pw, setupCompleted: false };
        localStorage.setItem("ootd_ultimate_v6", JSON.stringify(usersDb));
        alert("성공적으로 회원가입을 마쳤습니다! 로그인을 진행해 주세요.");
    }

    function handleLogin() {
        const id = document.getElementById("login-id").value.trim();
        const pw = document.getElementById("login-pw").value.trim();
        if(!usersDb[id] || usersDb[id].password !== pw) return alert("계정 정보가 올바르지 않습니다.");

        currentUser = id;
        if(usersDb[currentUser].setupCompleted) {
            startGame();
        } else {
            showScreen("screen-setup");
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

                top: "def_top_inst", 
                bottom: "def_bottom_inst", 
                onepiece: null, 
                socks: null, 
                shoes: null, 
                hat: null, 
                bag: null, 
                necklace: null, 
                earring: null 
            },
            setupCompleted: true
        };
        
        localStorage.setItem("ootd_ultimate_v6", JSON.stringify(usersDb));
        startGame();
    }

    function startGame() {
        initMarketPrices();
        showScreen("screen-main");
        
        const d = usersDb[currentUser];
        if (!d.closet || d.closet.length === 0) {
            d.closet = [
                { ...DEFAULT_ITEMS[0], instanceId: "def_hair_inst" },
                { ...DEFAULT_ITEMS[1], instanceId: "def_top_inst" },
                { ...DEFAULT_ITEMS[2], instanceId: "def_bottom_inst" }
            ];
            d.equipped = { hair: "def_hair_inst", top: "def_top_inst", bottom: "def_bottom_inst" };
            localStorage.setItem("ootd_ultimate_v6", JSON.stringify(usersDb));
        }
        
        refreshMainUI();
    }

    function refreshMainUI() {
        const d = usersDb[currentUser];
        document.getElementById("display-username").innerText = d.nickname;
        document.getElementById("user-money").innerText = d.money.toLocaleString();
        renderCharacterCanvas();
    }

    /* ========================================================
       5. [어깨 버그 해결] 가녀리고 이쁜 직각 일자 어깨선 아바타 렌더러
       ======================================================== */
    function renderCharacterCanvas() {
        const d = usersDb[currentUser];
        const eq = d.equipped;

        const bodyLayer = document.getElementById("layer-body");
        bodyLayer.innerHTML = `
            <svg viewBox="0 0 100 150">
                <!-- 동글통통 베이비 페이스 머리통 -->
                <circle cx="50" cy="32" r="13" fill="#fff1ef" stroke="#fbd5d0" stroke-width="0.8" />
                
                <!-- 가늘고 이쁜 목 -->
                <path d="M 47,45 L 53,45 L 53,55 L 47,55 Z" fill="#fff1ef" stroke="#fbd5d0" stroke-width="0.5" />
                
                <!-- [어깨라인 완전 개선] 직각 형태의 정돈되고 슬림한 피팅용 어깨선 -->
                <path d="M 30,55 L 70,55 L 65,100 L 35,100 Z" fill="#fff1ef" stroke="#fbd5d0" stroke-width="0.8" />
                
                <!-- 정교하게 대칭되는 슬림 일자 팔라인 -->
                <line x1="30" y1="56" x2="22" y2="90" stroke="#fff1ef" stroke-width="4.5" stroke-linecap="round" />
                <line x1="70" y1="56" x2="78" y2="90" stroke="#fff1ef" stroke-width="4.5" stroke-linecap="round" />
                
                <!-- 다리 라인 정렬 -->
                <line x1="40" y1="100" x2="40" y2="140" stroke="#fff1ef" stroke-width="5.5" stroke-linecap="round" />
                <line x1="60" y1="100" x2="60" y2="140" stroke="#fff1ef" stroke-width="5.5" stroke-linecap="round" />
                
                <!-- 디테일 페이스 (이목구비) -->
                <circle cx="44" cy="31" r="3" fill="#2d3748" />
                <circle cx="56" cy="31" r="3" fill="#2d3748" />
                
                <!-- 생기를 주는 안구 내 광원 스폿 -->
                <circle cx="45" cy="30" r="1" fill="#ffffff" />
                <circle cx="57" cy="30" r="1" fill="#ffffff" />
                
                <!-- 앙증맞은 코 점 지표 -->
                <circle cx="50" cy="33" r="0.7" fill="#f4a261" />
                
                <!-- 귀엽고 앙증맞은 라운드 마우스 -->
                <path d="M 48,36.5 Q 50,38.5 52,36.5" stroke="#e63946" stroke-width="1.3" fill="none" stroke-linecap="round" />
                
                <!-- 러블리 볼터치 치크 스폿 -->
                <circle cx="41" cy="35" r="2.2" fill="#ff4d73" opacity="0.3" />
                <circle cx="59" cy="35" r="2.2" fill="#ff4d73" opacity="0.3" />
            </svg>
        `;

        const getClothedItem = (instId) => {
            if (!instId) return null;
            return d.closet.find(i => i.instanceId === instId);
        };

        // 레이어 렌더러 안전 분할 처리
        const draw = (layerId, targetItem) => {
            const container = document.getElementById(layerId);
            if (!targetItem) { 
                container.innerHTML = ""; 
                return; 
            }
            const key = layerId.replace("layer-", "");
            
            let svgStr = "";
            if (key === "hair-back") {
                svgStr = VECTOR_DRAW["hair-back"](targetItem.color);
            } else if (key === "hair-front") {
                svgStr = VECTOR_DRAW["hair-front"](targetItem.color);
            } else {
                svgStr = VECTOR_DRAW[key](targetItem.color, targetItem.grade);
            }
            
            container.innerHTML = `<svg viewBox="0 0 100 150">${svgStr}</svg>`;
        };

        // 헤어 레이어 듀얼 드로잉
        const activeHair = getClothedItem(eq.hair);
        draw("layer-hair-back", activeHair);
        draw("layer-hair-front", activeHair);

        // 신체 파츠 드로잉
        draw("layer-socks", getClothedItem(eq.socks));
        draw("layer-shoes", getClothedItem(eq.shoes));
        draw("layer-bottom", getClothedItem(eq.bottom));
        draw("layer-top", getClothedItem(eq.top));

        // [원피스 버그 방지] 장착 우선 레이어 스위칭
        const activeOnePiece = getClothedItem(eq.onepiece);
        if (activeOnePiece) {
            document.getElementById("layer-top").innerHTML = "";
            document.getElementById("layer-bottom").innerHTML = "";
            draw("layer-onepiece", activeOnePiece);
        } else {
            document.getElementById("layer-onepiece").innerHTML = "";
        }

        draw("layer-hat", getClothedItem(eq.hat));
        draw("layer-bag", getClothedItem(eq.bag));
        draw("layer-necklace", getClothedItem(eq.necklace));
        draw("layer-earring", getClothedItem(eq.earring));
    }

    /* ========================================================
       6. [착용 및 해제 버그 완전 박멸] 옷장 UI와 고유 ID 연산기
       ======================================================== */
    function renderCloset() {
        const grid = document.getElementById("closet-grid");
        grid.innerHTML = "";
        const d = usersDb[currentUser];

        if(!d.closet || d.closet.length === 0) {
            grid.innerHTML = `<p style="grid-column: span 3; text-align:center; padding:40px 0; color:var(--text-muted); font-size:0.85rem;">소장하고 계신 옷이 완전히 비어있습니다.</p>`;
            return;
        }

        d.closet.forEach(item => {
            const isEquipped = Object.values(d.equipped).includes(item.instanceId);
            
            const card = document.createElement("div");
            card.className = `item-card ${isEquipped ? 'equipped' : ''}`;
            card.onclick = () => {
                toggleEquip(item);
            };

            let previewSvg = "";
            if (item.category === 'hair') {
                previewSvg = `<svg viewBox="20 10 60 130" style="width:100%;height:100%;">${VECTOR_DRAW['hair-back'](item.color)}${VECTOR_DRAW['hair-front'](item.color)}</svg>`;
            } else if (VECTOR_DRAW[item.category]) {
                previewSvg = `<svg viewBox="10 10 80 130" style="width:100%;height:100%;">${VECTOR_DRAW[item.category](item.color, item.grade)}</svg>`;
            }

            card.innerHTML = `
                <div class="item-grade-tag grade-bg-${item.grade}">${item.grade}</div>
                <div class="item-preview-svg">${previewSvg}</div>
                <p style="font-size:0.8rem; font-weight:800; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#1e293b;">${item.name}</p>
            `;
            grid.appendChild(card);
        });
    }

    function toggleEquip(item) {
        const d = usersDb[currentUser];
        const eq = d.equipped;
        const targetInstId = item.instanceId;
        const category = item.category;

        // 동일한 아바타 파트 클릭 시 정상적인 입고 벗기 조건문 제어
        if (eq[category] === targetInstId) {
            eq[category] = null;
        } else {
            if (category === "onepiece") {
                eq.onepiece = targetInstId;
                eq.top = null;
                eq.bottom = null;
            } else if (category === "top" || category === "bottom") {
                eq.onepiece = null;
                eq[category] = targetInstId;
            } else {
                eq[category] = targetInstId;
            }
        }

        localStorage.setItem("ootd_ultimate_v6", JSON.stringify(usersDb));
        refreshMainUI();
        renderCloset();
    }

    /* ========================================================
       7. 모바일 어플리케이션 인터랙션 및 리얼 가챠 모듈
       ======================================================== */
    function toggleOverlay(id) {
        const overlay = document.getElementById("overlay-" + id);
        if(overlay.classList.contains("active")) {
            overlay.classList.remove("active");
        } else {
            document.querySelectorAll(".overlay-view").forEach(o => o.classList.remove("active"));
            overlay.classList.add("active");
            if(id === "closet") renderCloset();
        }
    }

    function openApp(appName) {
        if(appName === "junggonara") { 
            document.getElementById("overlay-junggo").classList.add("active"); 
            updateJunggonaraUI(); 
            return; 
        }

        activeShop = appName;
        const meta = SHOP_META[appName];
        document.getElementById("shop-title").innerText = meta.title;
        document.getElementById("shop-desc").innerText = meta.desc;
        document.getElementById("shop-cost").innerText = `1회 쇼핑비: ${meta.cost.toLocaleString()}원`;

        const pBox = document.getElementById("shop-prob-list");
        pBox.innerHTML = "";
        
        ITEM_DATABASE[appName].forEach(item => {
            pBox.innerHTML += `
                <div class="prob-row">
                    <span class="grade-${item.grade}">[${item.grade}] ${item.name}</span>
                    <span style="font-weight:800; color:#475569;">${meta.probs[item.grade]}%</span>
                </div>`;
        });
        document.getElementById("overlay-shop").classList.add("active");
    }

    function closeApp(appName) {
        document.getElementById("overlay-" + appName).classList.remove("active");
    }

    function triggerGacha() {
        const meta = SHOP_META[activeShop];
        const d = usersDb[currentUser];
        if(d.money < meta.cost) {
            return alert("잔액이 부족합니다! 안 쓰는 옷을 중고나라에 판매해 잔고를 채워보세요.");
        }

        d.money -= meta.cost;
        const rand = Math.random() * 100;
        let cumulative = 0;
        let selectedGrade = "C";
        const gradeList = ["SSS", "SS", "S", "A", "B", "C"];

        for(let g of gradeList) {
            cumulative += meta.probs[g];
            if(rand <= cumulative) { 
                selectedGrade = g; 
                break; 
            }
        }

        const filteredPool = ITEM_DATABASE[activeShop].filter(item => item.grade === selectedGrade);
        const rolledTemplate = filteredPool[Math.floor(Math.random() * filteredPool.length)];

        // 고유 타임스탬프 + 가챠 스펙을 결합하여 완벽한 instanceId 바인딩
        const newGachaItem = { 
            ...rolledTemplate, 
            instanceId: `${activeShop}_${rolledTemplate.id}_${Date.now()}` 
        };
        
        d.closet.push(newGachaItem);

        localStorage.setItem("ootd_ultimate_v6", JSON.stringify(usersDb));
        refreshMainUI();

        document.getElementById("gacha-result-name").innerText = rolledTemplate.name;
        const rGrade = document.getElementById("gacha-result-grade");
        rGrade.className = "grade-" + rolledTemplate.grade;
        rGrade.innerText = `[${rolledTemplate.grade} 등급]`;
        
        document.getElementById("gacha-popup").style.display = "block";
    }

    function closeGachaPopup() { 
        document.getElementById("gacha-popup").style.display = "none"; 
    }

    /* ========================================================
       8. 리얼타임 시세 연동 중고시장 제어 모듈
       ======================================================== */
    function updateJunggonaraUI() {
        const container = document.getElementById("junggonara-list");
        if(!container || !currentUser || !document.getElementById("overlay-junggo").classList.contains("active")) return;
        
        container.innerHTML = "";
        const d = usersDb[currentUser];
        
        // 기본 3종 아바타 최소 보호 조건 유지
        const sellableItems = d.closet.filter(item => !item.instanceId.startsWith("def_"));

        if(sellableItems.length === 0) {
            container.innerHTML = `<p style="text-align:center; color:var(--text-muted); margin-top:40px; font-weight:700;">중고나라에 위탁 판매할 의류가 없습니다.</p>`;
            return;
        }

        sellableItems.forEach(item => {
            const scale = marketPrices[item.id] || 1.0;
            const liveSellingPrice = Math.floor(item.originalPrice * scale);
            const isHotBubble = scale >= 1.25;

            const row = document.createElement("div");
            row.className = "used-item";
            row.innerHTML = `
                <div style="max-width: 65%;">
                    <span class="grade-${item.grade}" style="font-size:0.9rem;">[${item.grade}] ${item.name}</span>
                    <div style="font-size:0.75rem; color:var(--text-muted); margin-top:4px; font-weight:600;">
                        출고가: ${item.originalPrice.toLocaleString()}원 (${(scale*100).toFixed(0)}%)
                    </div>
                </div>
                <div style="text-align:right;">
                    <div class="${isHotBubble ? 'price-up' : 'price-down'}" style="font-size:1rem; font-weight:900; margin-bottom:6px;">
                        ${isHotBubble ? '📈' : '📉'} ${liveSellingPrice.toLocaleString()}원
                    </div>
                    <button onclick="sellItemToMarket('${item.instanceId}', ${liveSellingPrice})" style="background:#16a34a; padding:6px 12px; font-size:0.8rem; border-radius:12px; box-shadow:none;">판매</button>
                </div>
            `;
            container.appendChild(row);
        });
    }

    function sellItemToMarket(instId, confirmedPrice) {
        const d = usersDb[currentUser];
        const itemIdx = d.closet.findIndex(item => item.instanceId === instId);
        if(itemIdx === -1) return;

        // 입혀져있던 리스트에서 동적 해제 안전 가드
        for (let key in d.equipped) {
            if (d.equipped[key] === instId) {
                d.equipped[key] = null;
            }
        }

        d.closet.splice(itemIdx, 1);
        d.money += confirmedPrice;

        localStorage.setItem("ootd_ultimate_v6", JSON.stringify(usersDb));
        refreshMainUI();
        updateJunggonaraUI();
    }
</script>
