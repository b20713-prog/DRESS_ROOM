<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiffon Atelier - High-End Dressroom</title>
    <style>
        :root {
            --bg-base: #ffeef2;
            --card-bg: #ffffff;
            --accent-pink: #ffa3b1;
            --accent-hot: #ff6584;
            --border-soft: #ffe3e8;
            --text-dark: #4a3e40;
            --text-muted: #8c7e80;
            --panel-round: 28px;

            --color-sss: #ff4d79;
            --color-ss: #ff9f1c;
            --color-s: #b5179e;
            --color-a: #4361ee;
            --color-b: #2ec4b6;
            --color-c: #7f8c8d;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Pretendard', -apple-system, sans-serif; 
        }
        
        body { 
            background-color: #ffdce3; 
            color: var(--text-dark); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .app-container {
            width: 430px;
            height: 880px;
            background: var(--bg-base);
            border-radius: 36px;
            box-shadow: 0 25px 50px rgba(180, 80, 100, 0.25);
            border: 8px solid #ffffff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen { 
            display: none; 
            width: 100%; 
            height: 100%; 
            position: absolute; 
            top: 0; 
            left: 0; 
            padding: 24px; 
            flex-direction: column; 
        }
        
        .screen.active { 
            display: flex; 
        }

        button {
            background: var(--accent-hot); 
            color: white; 
            border: none; 
            padding: 14px 20px; 
            border-radius: 20px;
            font-weight: 800; 
            font-size: 1rem; 
            cursor: pointer; 
            transition: all 0.2s ease-in-out;
            box-shadow: 0 6px 12px rgba(255, 101, 132, 0.2);
        }
        
        button:hover { 
            background: #e04f6e; 
            transform: translateY(-2px); 
            box-shadow: 0 8px 16px rgba(255, 101, 132, 0.3);
        }

        input { 
            background: #ffffff; 
            border: 2px solid #ffd5dc; 
            padding: 14px; 
            border-radius: 16px; 
            margin-bottom: 12px; 
            outline: none; 
            font-size: 0.95rem;
            color: var(--text-dark);
            text-align: center;
        }

        #screen-login { 
            justify-content: center; 
            background: linear-gradient(180deg, #ffffff 0%, #fff0f3 100%); 
        }
        
        .brand-logo { 
            text-align: center; 
            margin-bottom: 45px; 
        }
        
        .brand-logo h1 { 
            font-size: 2.6rem; 
            font-weight: 900; 
            color: var(--accent-hot); 
            text-shadow: 0 4px 8px rgba(255, 101, 132, 0.15);
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px dashed var(--border-soft); 
            padding-bottom: 14px; 
        }
        
        .balance-tag { 
            background: #fff0f2; 
            padding: 8px 16px; 
            border-radius: 16px; 
            font-weight: 900; 
            color: var(--accent-hot); 
            font-size: 0.95rem; 
            border: 1.5px solid #ffccd5;
        }

        .character-view {
            flex: 1; 
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            background: #ffffff; 
            margin: 16px 0; 
            border-radius: 28px; 
            border: 2px solid #ffccd5; 
            overflow: hidden;
            box-shadow: inset 0 4px 12px rgba(255, 163, 177, 0.1);
        }
        
        .canvas-container { 
            position: relative; 
            width: 320px; 
            height: 480px; 
        }
        
        .layer { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        .layer svg { 
            width: 100%; 
            height: 100%; 
        }

        .main-controls { 
            display: flex; 
            gap: 12px; 
        }
        
        .main-controls button { 
            flex: 1; 
            padding: 16px; 
            border-radius: 20px; 
        }

        .overlay-view {
            display: none; 
            position: absolute; 
            top: 70px; 
            left: 0; 
            width: 100%; 
            height: calc(100% - 70px);
            background: var(--card-bg); 
            z-index: 10; 
            padding: 24px; 
            flex-direction: column;
            border-top-left-radius: 32px; 
            border-top-right-radius: 32px;
            box-shadow: 0 -12px 30px rgba(255, 163, 177, 0.2); 
            border-top: 3px solid #ffccd5;
        }
        
        .overlay-view.active { 
            display: flex; 
        }
        
        .overlay-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
        }

        .item-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            overflow-y: auto; 
            flex: 1; 
            padding-right: 4px;
        }
        
        .item-card { 
            background: #fffbfb; 
            border: 2px solid #fff0f2; 
            border-radius: 20px; 
            padding: 10px; 
            text-align: center; 
            cursor: pointer; 
            position: relative; 
            transition: all 0.2s;
        }
        
        .item-card.equipped { 
            border: 3.5px solid var(--accent-hot); 
            background: #fff3f5; 
            transform: scale(0.97);
        }
        
        .item-grade-tag { 
            position: absolute; 
            top: 6px; 
            left: 6px; 
            font-size: 0.65rem; 
            font-weight: 900; 
            padding: 2px 6px; 
            border-radius: 8px; 
            color: #ffffff; 
            z-index: 2;
        }
        
        .item-preview-svg { 
            width: 84px; 
            height: 84px; 
            margin: 4px auto; 
        }

        .phone-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 16px; 
            margin-top: 15px; 
        }
        
        .app-icon-btn {
            background: #ffffff; 
            border: 2px solid #ffdce3; 
            border-radius: 24px; 
            padding: 24px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 10px; 
            cursor: pointer; 
            box-shadow: 0 4px 10px rgba(255, 163, 177, 0.1);
            transition: transform 0.2s;
        }

        .app-icon-btn:hover {
            transform: translateY(-4px);
        }

        .used-list { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            overflow-y: auto; 
            flex: 1; 
        }
        
        .used-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #fffcfc; 
            padding: 16px; 
            border-radius: 20px; 
            border: 1.5px solid #ffe3e8; 
        }
        
        .price-up { color: #f43f5e; font-weight: 900; }
        .price-down { color: #3b82f6; font-weight: 900; }
        
        .probability-info { 
            background: #fff9fa; 
            border: 1.5px solid #ffd5dc; 
            border-radius: 18px; 
            padding: 14px; 
            margin-bottom: 20px; 
            font-size: 0.8rem; 
            max-height: 180px; 
            overflow-y: auto; 
        }
        
        .grade-SSS { color: var(--color-sss); font-weight: 950; }
        .grade-SS { color: var(--color-ss); font-weight: 950; }
        .grade-S { color: var(--color-s); font-weight: 900; }
        .grade-A { color: var(--color-a); font-weight: 800; }
        .grade-B { color: var(--color-b); font-weight: 800; }
        .grade-C { color: var(--color-c); font-weight: 700; }

        .grade-bg-SSS { background: var(--color-sss); }
        .grade-bg-SS { background: var(--color-ss); }
        .grade-bg-S { background: var(--color-s); }
        .grade-bg-A { background: var(--color-a); }
        .grade-bg-B { background: var(--color-b); }
        .grade-bg-C { background: var(--color-c); }

        .gacha-popup {
            display: none; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            background: #ffffff; 
            border: 4px solid var(--accent-hot); 
            padding: 24px; 
            border-radius: 32px;
            z-index: 100; 
            text-align: center; 
            width: 88%; 
            box-shadow: 0 20px 50px rgba(180, 80, 100, 0.4);
        }

        .gacha-image-container {
            width: 140px;
            height: 140px;
            margin: 15px auto;
            border: 2px dashed #ffccd5;
            border-radius: 20px;
            background: #fff8f9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 스크롤바 디자인 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #fff0f2;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #ffccd5;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="screen-login" class="screen active">
        <div class="brand-logo">
            <h1>Chiffon</h1>
            <p style="color: var(--text-muted); font-size: 0.95rem; margin-top: 6px; font-weight: 700; letter-spacing: 1px;">PREMIUM DRESSUP GAME</p>
        </div>
        <div class="auth-box" style="display:flex; flex-direction:column;">
            <input type="text" id="login-id" placeholder="아이디">
            <input type="password" id="login-pw" placeholder="비밀번호">
            <button onclick="handleRegister()" style="background: #ffffff; border: 2px solid #ffd5dc; color: var(--text-muted); box-shadow: none; margin-bottom: 8px;">회원가입</button>
            <button onclick="handleLogin()">로그인</button>
        </div>
    </div>

    <div id="screen-setup" class="screen" style="background: #ffffff; justify-content: center;">
        <h2 style="font-size: 1.6rem; font-weight: 900; margin-bottom: 24px; text-align:center; color: var(--accent-hot);">아틀리에 등록</h2>
        <p style="text-align:center; font-size:0.85rem; color: var(--text-muted); margin-bottom: 20px;">디자이너명과 마음에 드는 성별 아바타를 골라주세요.</p>
        <input type="text" id="user-name" placeholder="디자이너 이름 입력">
        <div style="display: flex; gap: 12px; margin-top: 10px;">
            <button id="g-male" style="flex:1; background:#fff; border:2.5px solid #cbd5e1; color:#475569;" onclick="selectGender('male')">보이 룸</button>
            <button id="g-female" style="flex:1; background:#fff; border:2.5px solid #cbd5e1; color:#475569;" onclick="selectGender('female')">걸 룸</button>
        </div>
        <button onclick="completeSetup()" style="margin-top: 30px; padding:16px;">부티크 입장하기</button>
    </div>

    <div id="screen-main" class="screen">
        <div class="header">
            <div style="font-weight: 900; font-size: 1.1rem; color: var(--text-dark);"><span id="display-username" style="color:var(--accent-hot);">디자이너</span> 룸</div>
            <div class="balance-tag">💖 <span id="user-money">100,000</span>원</div>
        </div>

        <div class="character-view">
            <div class="canvas-container">
                <div class="layer" id="layer-hair-back" style="z-index: 1;"></div>
                <div class="layer" id="layer-body" style="z-index: 2;"></div>
                <div class="layer" id="layer-socks" style="z-index: 3;"></div>
                <div class="layer" id="layer-shoes" style="z-index: 4;"></div>
                <div class="layer" id="layer-bottom" style="z-index: 5;"></div>
                <div class="layer" id="layer-top" style="z-index: 6;"></div>
                <div class="layer" id="layer-onepiece" style="z-index: 7;"></div>
                <div class="layer" id="layer-hair-front" style="z-index: 8;"></div>
                <div class="layer" id="layer-necklace" style="z-index: 9;"></div>
                <div class="layer" id="layer-earring" style="z-index: 10;"></div>
                <div class="layer" id="layer-hat" style="z-index: 11;"></div>
                <div class="layer" id="layer-bag" style="z-index: 12;"></div>
            </div>
        </div>

        <div class="main-controls">
            <button onclick="toggleOverlay('closet')" style="background: #5d5052; box-shadow: none;">👗 마이 드레스룸</button>
            <button onclick="toggleOverlay('phone')">📱 스마트 스토어</button>
        </div>

        <div id="overlay-closet" class="overlay-view">
            <div class="overlay-header">
                <h3 style="font-weight:900; color:var(--accent-hot); font-size:1.2rem;">🎀 내 옷장</h3>
                <button onclick="toggleOverlay('closet')" style="background:#8c7e80; padding:6px 14px; font-size:0.85rem; box-shadow: none; border-radius:12px;">닫기</button>
            </div>
            <div class="item-grid" id="closet-grid"></div>
        </div>

        <div id="overlay-phone" class="overlay-view" style="background:#fffafb;">
            <div class="overlay-header">
                <h3 style="color:var(--text-dark); font-weight:900;">🛒 마켓 플레이스</h3>
                <button onclick="toggleOverlay('phone')" style="background:#ff6584; padding:6px 14px; font-size:0.85rem; box-shadow: none; border-radius:12px;">끄기</button>
            </div>
            <div class="phone-grid">
                <div class="app-icon-btn" onclick="openApp('ably')"><span style="font-size:2.4rem;">🧸</span><span style="font-weight:800; font-size:0.9rem; color:var(--text-dark);">에이블리</span></div>
                <div class="app-icon-btn" onclick="openApp('musinsa')"><span style="font-size:2.4rem;">👒</span><span style="font-weight:800; font-size:0.9rem; color:var(--text-dark);">무신사</span></div>
                <div class="app-icon-btn" onclick="openApp('kream')"><span style="font-size:2.4rem;">🎀</span><span style="font-weight:800; font-size:0.9rem; color:var(--text-dark);">크림</span></div>
                <div class="app-icon-btn" onclick="openApp('junggonara')" style="background:#fdf4f5; border-color:#ffccd5;"><span style="font-size:2.4rem;">🤝</span><span style="color:var(--accent-hot); font-weight:900; font-size:0.9rem;">중고나라</span></div>
            </div>
        </div>

        <div id="overlay-shop" class="overlay-view" style="z-index:20;">
            <div class="overlay-header">
                <h3 id="shop-title" style="font-weight:900;">SHOP</h3>
                <button onclick="closeApp('shop')" style="background:#8c7e80; padding:6px 14px; font-size:0.85rem; box-shadow:none; border-radius:12px;">뒤로</button>
            </div>
            <div style="background:#fff4f6; padding:16px; border-radius:20px; text-align:center; margin-bottom:16px; border:1px solid #ffd5dc;">
                <p id="shop-desc" style="font-size:0.85rem; color:var(--text-muted); font-weight:600;"></p>
                <h4 id="shop-cost" style="color:var(--accent-hot); font-size:1.3rem; font-weight:900; margin-top:6px;"></h4>
            </div>
            <h5 style="margin-bottom:8px; font-size:0.85rem; font-weight:800; color:#4a3e40;">뽑기 가능한 디자이너 의상 리스트</h5>
            <div class="probability-info" id="shop-prob-list"></div>
            <button onclick="triggerGacha()" style="width:100%; padding:16px; border-radius:20px;">디자이너 박스 오픈하기</button>
        </div>

        <div id="overlay-junggo" class="overlay-view" style="z-index:20;">
            <div class="overlay-header">
                <h3 style="color:var(--accent-hot); font-weight:900; font-size:1.1rem;">🤝 중고 패션 리셀 시장 (실시간 0.8초 변동)</h3>
                <button onclick="closeApp('junggo')" style="background:#8c7e80; padding:6px 14px; font-size:0.85rem; box-shadow:none; border-radius:12px;">뒤로</button>
            </div>
            <p style="font-size:0.8rem; color:var(--text-muted); font-weight:600; margin-bottom:14px; background:#fff3f5; padding:10px; border-radius:12px; border: 1px dashed #ffd5dc;">
                📈 시세 그래프가 최고점(%)에 달했을 때 아이템을 되팔아 자본금을 불리세요!
            </p>
            <div class="used-list" id="junggonara-list"></div>
        </div>

    </div>

    <div class="gacha-popup" id="gacha-popup">
        <h3 style="margin-bottom:4px; font-size:1.35rem; color:var(--accent-hot); font-weight:900;">🎉 NEW ITEM GET!</h3>
        <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:10px;">스토어 전용 한정판 의상 획득!</p>
        <div class="gacha-image-container" id="gacha-preview-container"></div>
        <div id="gacha-result-name" style="font-size:1.15rem; font-weight:900; margin-bottom:4px; color:var(--text-dark);"></div>
        <div id="gacha-result-grade" style="font-size:1.1rem; margin-bottom:20px;"></div>
        <button onclick="closeGachaPopup()" style="width:100%; padding:14px; border-radius:16px;">옷장으로 이동하기</button>
    </div>

</div>

<script>
    /* ========================================================
       1. 레퍼런스 스타일: 프릴, 프릴칼라, 이중 레이스, 리본 완벽 구현 SVG 데이터
       ======================================================== */
    const VECTOR_DRAW = {
        // 풍성하고 사랑스러운 프릴형 뒷머리 라인
        'hair-back': (c, type) => {
            if (type === 'twin') {
                // 부드럽게 뒤로 묶인 풍성한 귀여운 트윈테일 묶음
                return `
                    <path d="M 24,35 Q 0,45 8,95 Q 22,95 28,52 Z" fill="${c}" />
                    <path d="M 76,35 Q 100,45 92,95 Q 78,95 72,52 Z" fill="${c}" />
                    <circle cx="21" cy="40" r="10" fill="${c}"/>
                    <circle cx="79" cy="40" r="10" fill="${c}"/>
                    <path d="M 12,32 Q 21,38 21,43 Q 11,44 12,32 Z" fill="#ff6584" />
                    <path d="M 88,32 Q 79,38 79,43 Q 89,44 88,32 Z" fill="#ff6584" />
                `;
            }
            if (type === 'wave') {
                // 부드러운 여신물결 웨이브 컷
                return `
                    <path d="M 24,40 C 6,70 14,125 32,135 C 28,110 32,80 34,52 Z" fill="${c}" />
                    <path d="M 76,40 C 94,70 86,125 68,135 C 72,110 68,80 66,52 Z" fill="${c}" />
                    <path d="M 30,30 Q 50,22 70,30 Q 82,60 76,82 Q 24,82 30,30 Z" fill="${c}" />
                `;
            }
            if (type === 'short') {
                // 사랑스럽고 동글동글한 소프트 러블리 단발
                return `
                    <path d="M 22,35 C 12,58 16,88 32,92 C 34,70 32,55 35,48 Z" fill="${c}" />
                    <path d="M 78,35 C 88,58 84,88 68,92 C 66,70 68,55 65,48 Z" fill="${c}" />
                `;
            }
            // 일반 롱 헤어
            return `<path d="M 23,38 C 12,65 10,125 25,138 C 32,110 68,110 75,138 C 88,125 86,65 77,38 Z" fill="${c}" />`;
        },

        // 절대 얼굴을 과하게 가리지 않고 이마를 예쁘게 노출시키는 풍성한 앞머리&옆머리
        'hair-front': (c, type) => {
            // 이마라인을 절대 덮지 않는 아치형 뱅
            let baseFront = `<path d="M 24,35 Q 50,18 76,35 Q 78,45 74,52 C 66,42 60,35 50,36 C 40,35 34,42 26,52 Q 22,45 24,35 Z" fill="${c}" />`;
            
            if (type === 'ribbon') {
                // 귀여운 헤어 액세서리 리본 밴드 추가
                return baseFront + `
                    <path d="M 32,23 Q 50,16 68,23 Z" stroke="#ff6584" stroke-width="4" fill="none"/>
                    <path d="M 28,15 Q 38,10 38,22 Q 28,24 28,15 Z" fill="#ff6d8e"/>
                    <path d="M 72,15 Q 62,10 62,22 Q 72,24 72,15 Z" fill="#ff6d8e"/>
                    <circle cx="50" cy="19" r="4" fill="#ffffff" />
                `;
            }
            if (type === 'bang') { 
                // 시스루 뱅과 길고 아름답게 정돈된 앞가르마 애교머리
                return `
                    <path d="M 24,35 Q 50,18 76,35 Q 82,58 76,78 C 72,50 68,40 56,38 C 44,38 40,50 36,78 Q 30,58 24,35 Z" fill="${c}" />
                    <path d="M 43,30 Q 50,33 57,30 L 57,36 Q 50,39 43,36 Z" fill="${c}" opacity="0.85"/>
                `;
            }
            if (type === 'pure') { 
                // 단정하고 맑은 느낌의 청순가련 옆머리 슬릭 연출
                return `
                    <path d="M 24,35 Q 50,18 76,35 Q 82,60 78,82 C 73,50 68,40 50,36 C 32,40 27,50 22,82 Q 18,60 24,35 Z" fill="${c}" />
                `;
            }
            return baseFront;
        },
        
        // 퍼프 소매와 프릴 카라가 강조된 고급스러운 상의
        'top': (c, grade) => {
            let detail = (grade==="SSS" || grade==="SS") ? `
                <path d="M 40,65 L 50,72 L 60,65" stroke="#ffffff" stroke-width="2" fill="none"/>
                <circle cx="50" cy="74" r="3" fill="#ff6584"/>
                <path d="M 43,58 Q 50,62 57,58" stroke="#ffccd5" stroke-width="1.5" fill="none" />` : '';
            return `
                <path d="M 38,56 Q 50,64 62,56 Q 64,68 50,68 Q 36,68 38,56 Z" fill="#ffffff" stroke="#ffcbd5" stroke-width="1.5"/>
                <path d="M 28,58 C 28,58 35,56 50,56 C 65,56 72,58 72,58 L 68,90 C 68,90 58,92 50,92 C 42,92 32,90 32,90 Z" fill="${c}" />

       ======================================================== */
    function initMarketPrices() {
        const fullList = [...ITEM_DATABASE.ably, ...ITEM_DATABASE.musinsa, ...ITEM_DATABASE.kream, ...DEFAULT_ITEMS];
        fullList.forEach(item => { marketPrices[item.id] = 1.0; });

        setInterval(() => {
            fullList.forEach(item => {
                let vol = 0.15; 
                if(item.grade === "SSS") vol = 0.45;
                else if(item.grade === "SS") vol = 0.30;
                
                const isUp = Math.random() > 0.46;
                let delta = Math.random() * vol * (isUp ? 1 : -1);
                let next = (marketPrices[item.id] || 1.0) + delta;
                
                if(next < 0.3) next = 0.3;
                if(next > 2.3) next = 2.3;
                marketPrices[item.id] = next;
            });
            updateJunggonaraUI();
        }, 800);
    }

    function handleRegister() {

        if(!id || !pw) return alert("아이디와 비밀번호를 알맞게 입력해 주세요.");
        if(usersDb[id]) return alert("이미 사용 중인 계정 이름입니다.");

        usersDb[id] = { password: pw, setupCompleted: false };
        localStorage.setItem("chiffon_core_v8", JSON.stringify(usersDb));
        alert("성공적으로 가입되었습니다. 가입한 계정으로 로그인해 주세요!");
    }

    function handleLogin() {
        const id = document.getElementById("login-id").value.trim();
        const pw = document.getElementById("login-pw").value.trim();
        if(!usersDb[id] || usersDb[id].password !== pw) return alert("계정 정보가 올바르지 않습니다.");

        currentUser = id;
        if(usersDb[currentUser].setupCompleted) {
            startGame();
        } else {
            showScreen("screen-setup");
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

    }

    }

        const name = document.getElementById("user-name").value.trim();
        if(!name) return alert("아틀리에 이름을 작성해 주세요.");

        const baseCloset = [
            { ...DEFAULT_ITEMS[0], instanceId: "def_hair_inst" },
            { ...DEFAULT_ITEMS[1], instanceId: "def_top_inst" },
            { ...DEFAULT_ITEMS[2], instanceId: "def_bottom_inst" }
        ];

        usersDb[currentUser] = {
            ...usersDb[currentUser],
            nickname: name,
            gender: userGender,

            equipped: { hair: "def_hair_inst", top: "def_top_inst", bottom: "def_bottom_inst", onepiece: null }
        };
        usersDb[currentUser].setupCompleted = true;
        localStorage.setItem("chiffon_core_v8", JSON.stringify(usersDb));
        startGame();
    }

        draw("layer-bottom", getClothedItem(eq.bottom));
        draw("layer-top", getClothedItem(eq.top));

        const activeOnePiece = getClothedItem(eq.onepiece);
        if (activeOnePiece) {
            document.getElementById("layer-top").innerHTML = "";
            document.getElementById("layer-bottom").innerHTML = "";
            draw("layer-onepiece", activeOnePiece);
        } else {
            document.getElementById("layer-onepiece").innerHTML = "";
        }

        draw("layer-hat", getClothedItem(eq.hat));
        draw("layer-bag", getClothedItem(eq.bag));
        draw("layer-necklace", getClothedItem(eq.necklace));
        draw("layer-earring", getClothedItem(eq.earring));
    }

    /* ========================================================
       6. 옷장 아이템 착용 및 탈착 상호작용
       ======================================================== */
    function renderCloset() {
        const grid = document.getElementById("closet-grid");
        grid.innerHTML = "";
        const d = usersDb[currentUser];

        d.closet.forEach(item => {
            const isEquipped = Object.values(d.equipped).includes(item.instanceId);
            const card = document.createElement("div");
            card.className = `item-card ${isEquipped ? 'equipped' : ''}`;
            card.onclick = () => toggleEquip(item);

            let previewSvg = "";
            if (item.category === 'hair') {
                previewSvg = `<svg viewBox="15 10 70 130" style="width:100%;height:100%;">${VECTOR_DRAW['hair-back'](item.color, item.subType)}${VECTOR_DRAW['hair-front'](item.color, item.subType)}</svg>`;
            } else if (VECTOR_DRAW[item.category]) {
                previewSvg = `<svg viewBox="10 10 80 130" style="width:100%;height:100%;">${VECTOR_DRAW[item.category](item.color, item.grade)}</svg>`;
            }

            card.innerHTML = `
                <div class="item-grade-tag grade-bg-${item.grade}">${item.grade}</div>
                <div class="item-preview-svg">${previewSvg}</div>
                <p style="font-size:0.75rem; font-weight:800; color:var(--text-dark); text-overflow:ellipsis; overflow:hidden; white-space:nowrap; margin-top: 4px;">${item.name}</p>
            `;
            grid.appendChild(card);
        });
    }

    function toggleEquip(item) {
        const d = usersDb[currentUser];
        const eq = d.equipped;
        const target = item.instanceId;
        const cat = item.category;

        if (eq[cat] === target) {
            eq[cat] = null;
        } else {
            if (cat === "onepiece") {
                eq.onepiece = target; eq.top = null; eq.bottom = null;
            } else if (cat === "top" || cat === "bottom") {
                eq.onepiece = null; eq[cat] = target;
            } else {
                eq[cat] = target;
            }
        }

        localStorage.setItem("chiffon_core_v8", JSON.stringify(usersDb));
        refreshMainUI();
        renderCloset();
    }

    /* ========================================================
       7. 오버레이 패널 제어 및 한정 가챠 상점
       ======================================================== */
    function toggleOverlay(id) {
        const overlay = document.getElementById("overlay-" + id);
        if(overlay.classList.contains("active")) {
            overlay.classList.remove("active");
        } else {
            document.querySelectorAll(".overlay-view").forEach(o => o.classList.remove("active"));
            overlay.classList.add("active");
            if(id === "closet") renderCloset();
        }
    }

    function openApp(appName) {
        if(appName === "junggonara") { 
            document.getElementById("overlay-junggo").classList.add("active"); 
            updateJunggonaraUI(); 
            return; 
        }

        activeShop = appName;
        const meta = SHOP_META[appName];
        document.getElementById("shop-title").innerText = meta.title;
        document.getElementById("shop-desc").innerText = meta.desc;
        document.getElementById("shop-cost").innerText = `1회 제작비: ${meta.cost.toLocaleString()}원`;

        const pBox = document.getElementById("shop-prob-list");
        pBox.innerHTML = "";
        
        ITEM_DATABASE[appName].forEach(item => {
            pBox.innerHTML += `
                <div class="prob-row" style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span class="grade-${item.grade}">[${item.grade}] ${item.name}</span>
                    <span style="font-weight:800; color:var(--text-dark);">${meta.probs[item.grade]}%</span>
                </div>`;
        });
        document.getElementById("overlay-shop").classList.add("active");
    }

    function closeApp(appName) {
        document.getElementById("overlay-" + appName).classList.remove("active");
    }

    function triggerGacha() {
        const meta = SHOP_META[activeShop];
        const d = usersDb[currentUser];
        if(d.money < meta.cost) return alert("자금이 부족합니다! 중고나라 마켓에서 가지고 계신 의상을 가치 분배하여 재정비하세요.");

        d.money -= meta.cost;
        const rand = Math.random() * 100;
        let cumulative = 0;
        let selectedGrade = "C";
        const gradeList = ["SSS", "SS", "S", "A", "B", "C"];

        for(let g of gradeList) {
            cumulative += meta.probs[g];
            if(rand <= cumulative) { selectedGrade = g; break; }
        }

        const pool = ITEM_DATABASE[activeShop].filter(item => item.grade === selectedGrade);
        const template = pool[Math.floor(Math.random() * pool.length)];

        const newGachaItem = { 
            ...template, 
            instanceId: `${activeShop}_${template.id}_${Date.now()}` 
        };
        d.closet.push(newGachaItem);

        localStorage.setItem("chiffon_core_v8", JSON.stringify(usersDb));
        refreshMainUI();

        // [최우선 피드백 해결] 가챠 결과에서 밋밋한 텍스트 대신 실제 뽑은 디자인 렌더링 적용!
        const previewContainer = document.getElementById("gacha-preview-container");
        let previewSvg = "";
        if (template.category === 'hair') {
            previewSvg = `<svg viewBox="15 10 70 130" style="width:100%;height:100%;">${VECTOR_DRAW['hair-back'](template.color, template.subType)}${VECTOR_DRAW['hair-front'](template.color, template.subType)}</svg>`;
        } else if (VECTOR_DRAW[template.category]) {
            previewSvg = `<svg viewBox="10 10 80 130" style="width:100%;height:100%;">${VECTOR_DRAW[template.category](template.color, template.grade)}</svg>`;
        }
        previewContainer.innerHTML = previewSvg;

        document.getElementById("gacha-result-name").innerText = template.name;
        const rGrade = document.getElementById("gacha-result-grade");
        rGrade.className = "grade-" + template.grade;
        rGrade.innerText = `[${template.grade} GRADE]`;
        
        document.getElementById("gacha-popup").style.display = "block";
    }

    function closeGachaPopup() { 
        document.getElementById("gacha-popup").style.display = "none"; 
        toggleOverlay('closet');
    }

    /* ========================================================
       8. 중고나라 실시간 정밀 시세 변동 및 의류 매각
       ======================================================== */
    function updateJunggonaraUI() {
        const container = document.getElementById("junggonara-list");
        if(!container || !currentUser || !document.getElementById("overlay-junggo").classList.contains("active")) return;
        
        container.innerHTML = "";
        const d = usersDb[currentUser];
        const sellableItems = d.closet.filter(item => !item.instanceId.startsWith("def_"));

        if(sellableItems.length === 0) {
            container.innerHTML = `<p style="text-align:center; color:var(--text-muted); padding:30px 0; font-weight:700;">되팔 수 있는 수집 의류가 존재하지 않습니다.</p>`;
            return;
        }

        sellableItems.forEach(item => {
            const scale = marketPrices[item.id] || 1.0;
            const livePrice = Math.floor(item.originalPrice * scale);

            const row = document.createElement("div");
            row.className = "used-item";
            row.innerHTML = `
                <div style="max-width: 65%;">
                    <span class="grade-${item.grade}" style="font-size:0.85rem; font-weight:800;">[${item.grade}] ${item.name}</span>
                    <div style="font-size:0.75rem; color:var(--text-muted); margin-top:3px;">
                        구입 원가: ${item.originalPrice.toLocaleString()}원 (${(scale*100).toFixed(0)}%)
                    </div>
                </div>
                <div style="text-align:right;">
                    <div class="${scale >= 1.0 ? 'price-up' : 'price-down'}" style="font-size:0.95rem; font-weight:900; margin-bottom:4px;">
                        ${scale >= 1.0 ? '📈' : '📉'} ${livePrice.toLocaleString()}원
                    </div>
                    <button onclick="sellItemToMarket('${item.instanceId}', ${livePrice})" style="background:var(--accent-hot); padding:6px 12px; font-size:0.8rem; border-radius:12px; box-shadow:none;">리셀 판매</button>
                </div>
            `;
            container.appendChild(row);
        });
    }

    function sellItemToMarket(instId, price) {
        const d = usersDb[currentUser];
        const idx = d.closet.findIndex(i => i.instanceId === instId);
        if(idx === -1) return;

        for (let key in d.equipped) {
            if (d.equipped[key] === instId) d.equipped[key] = null;
        }

        d.closet.splice(idx, 1);
        d.money += price;

        localStorage.setItem("chiffon_core_v8", JSON.stringify(usersDb));
        refreshMainUI();
        updateJunggonaraUI();
    }
</script>
</body>
