<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>드레스룸 & 중고나라 주식 게임</title>
    <style>
        /* --- 테마 및 변수 정의 --- */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #ec4899;
            --accent-hover: #db2777;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border-color: #334155;
            
            /* 등급별 색상 */
            --color-sss: #ff3e3e;
            --color-ss: #ff8000;
            --color-s: #a335ee;
            --color-a: #0070dd;
            --color-b: #1eff00;
            --color-c: #9d9d9d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- 공통 카드 스타일 및 레이아웃 --- */
        .app-container {
            width: 420px;
            height: 840px;
            background: var(--card-bg);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 4px solid #334155;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            padding: 24px;
            flex-direction: column;
        }

        .screen.active {
            display: flex;
        }

        /* --- 공통 버튼 스타일 --- */
        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        input {
            background: #0f172a;
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 12px;
            outline: none;
        }

        /* --- 1. 로그인 / 회원가입 화면 --- */
        #screen-login {
            justify-content: center;
        }
        .brand-logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .brand-logo h1 {
            font-size: 2rem;
            background: linear-gradient(to right, #ec4899, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-box {
            display: flex;
            flex-direction: column;
        }

        /* --- 2. 이름 입력 & 성별 선택 화면 --- */
        #screen-setup {
            justify-content: center;
            text-align: center;
        }
        .gender-select {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }
        .gender-btn {
            flex: 1;
            padding: 30px;
            border-radius: 16px;
            background: #1e293b;
            border: 2px solid var(--border-color);
            color: white;
            font-size: 1.2rem;
        }
        .gender-btn.selected {
            border-color: var(--accent-color);
            background: rgba(236, 72, 153, 0.1);
        }

        /* --- 3. 드레스룸 메인 화면 --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }
        .balance-tag {
            background: #0f172a;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            color: #f59e0b;
        }

        /* 캐릭터 및 캔버스 렌더링 */
        .character-view {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a;
            margin: 16px 0;
            border-radius: 20px;
            overflow: hidden;
        }
        .canvas-container {
            position: relative;
            width: 250px;
            height: 380px;
        }
        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* SVG 스타일링을 통한 정교한 아바타 레이어 구성 */
        .layer svg {
            width: 100%;
            height: 100%;
        }

        .main-controls {
            display: flex;
            gap: 12px;
        }
        .main-controls button {
            flex: 1;
            padding: 16px;
            font-size: 1rem;
        }

        /* --- 하부 모달/뷰 시스템 --- */
        .overlay-view {
            display: none;
            position: absolute;
            top: 60px;
            left: 0;
            width: 100%;
            height: calc(100% - 60px);
            background: var(--card-bg);
            z-index: 10;
            padding: 20px;
            flex-direction: column;
        }
        .overlay-view.active {
            display: flex;
        }
        .overlay-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        /* 옷장 아이템 그리드 */
        .item-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            overflow-y: auto;
            flex: 1;
        }
        .item-card {
            background: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            position: relative;
        }
        .item-card.equipped {
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(236, 72, 153, 0.4);
        }
        .item-grade-tag {
            position: absolute;
            top: 4px;
            left: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 4px;
        }

        /* --- 스마트폰 및 쇼핑몰 화면 --- */
        .phone-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 40px;
        }
        .app-icon-btn {
            background: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .app-icon-btn span {
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* 가챠(쇼핑몰) 상점 내부 */
        .shop-banner {
            background: #0f172a;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 16px;
        }
        .probability-info {
            background: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 0.8rem;
            max-height: 180px;
            overflow-y: auto;
        }
        .prob-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        /* --- 실시간 주식 중고나라 --- */
        .used-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            flex: 1;
        }
        .used-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f172a;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .price-up { color: #ef4444; }
        .price-down { color: #3b82f6; }

        /* --- 팝업 연출 --- */
        .gacha-popup {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.95);
            border: 2px solid var(--accent-color);
            padding: 30px;
            border-radius: 20px;
            z-index: 100;
            text-align: center;
            width: 80%;
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.5);
        }

        /* 등급 텍스트 색상 클래스 */
        .grade-SSS { color: var(--color-sss); text-shadow: 0 0 8px rgba(255,62,62,0.6); }
        .grade-SS { color: var(--color-ss); text-shadow: 0 0 8px rgba(255,128,0,0.6); }
        .grade-S { color: var(--color-s); }
        .grade-A { color: var(--color-a); }
        .grade-B { color: var(--color-b); }
        .grade-C { color: var(--color-c); }

        .grade-bg-SSS { background: var(--color-sss); color: #000; }
        .grade-bg-SS { background: var(--color-ss); color: #000; }
        .grade-bg-S { background: var(--color-s); color: #fff; }
        .grade-bg-A { background: var(--color-a); color: #fff; }
        .grade-bg-B { background: var(--color-b); color: #000; }
        .grade-bg-C { background: var(--color-c); color: #fff; }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- 1. 로그인 / 회원가입 화면 -->
    <div id="screen-login" class="screen active">
        <div class="brand-logo">
            <h1>🎰 패션 카지노</h1>
            <p style="color: var(--text-sub); font-size: 0.9rem; margin-top: 8px;">드레스룸 x 실시간 중고 주식</p>
        </div>
        <div class="auth-box">
            <input type="text" id="login-id" placeholder="아이디를 입력하세요">
            <input type="password" id="login-pw" placeholder="비밀번호를 입력하세요">
            <button onclick="handleLogin()" style="margin-bottom: 8px;">로그인</button>
            <button onclick="handleRegister()" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-sub);">회원가입</button>
        </div>
    </div>

    <!-- 2. 초기 셋업 화면 (이름 및 성별 선택) -->
    <div id="screen-setup" class="screen">
        <h2 style="margin-bottom: 20px;">정보 등록</h2>
        <input type="text" id="user-name" placeholder="닉네임(이름)을 입력해주세요">
        <p style="color: var(--text-sub); margin-top: 20px;">성별 선택</p>
        <div class="gender-select">
            <button class="gender-btn" id="g-male" onclick="selectGender('male')">남자</button>
            <button class="gender-btn" id="g-female" onclick="selectGender('female')">여자</button>
        </div>
        <button onclick="completeSetup()" style="margin-top: 40px; width: 100%;">드레스룸 들어가기</button>
    </div>

    <!-- 3. 메인 게임 및 드레스룸 화면 -->
    <div id="screen-main" class="screen">
        <div class="header">
            <div>
                <span id="display-username" style="font-weight: bold; font-size: 1.1rem;">플레이어</span>의 드레스룸
            </div>
            <div class="balance-tag">💰 <span id="user-money">100,000</span>원</div>
        </div>

        <!-- 캐릭터 렌더링 영역 (z-index 디테일 구현) -->
        <div class="character-view">
            <div class="canvas-container">
                <!-- z-index 레이어 순서 엄격 준수 -->
                <div class="layer" id="layer-skin" style="z-index: 1;"></div>
                <div class="layer" id="layer-socks" style="z-index: 2;"></div>
                <div class="layer" id="layer-shoes" style="z-index: 3;"></div>
                <div class="layer" id="layer-bottom" style="z-index: 4;"></div>
                <div class="layer" id="layer-top" style="z-index: 5;"></div>
                <div class="layer" id="layer-onepiece" style="z-index: 6;"></div>
                <div class="layer" id="layer-hair" style="z-index: 7;"></div>
                <div class="layer" id="layer-acc" style="z-index: 8;"></div>
            </div>
        </div>

        <div class="main-controls">
            <button onclick="toggleOverlay('closet')" style="background: #475569;">🚪 옷장 열기</button>
            <button onclick="toggleOverlay('phone')" style="background: #0284c7;">📱 스마트폰</button>
        </div>

        <!-- O1. 옷장 오버레이 -->
        <div id="overlay-closet" class="overlay-view">
            <div class="overlay-header">
                <h3>내 옷장</h3>
                <button onclick="toggleOverlay('closet')" style="padding: 4px 10px; background: #ef4444;">닫기</button>
            </div>
            <div class="item-grid" id="closet-grid">
                <!-- 내 아이템 리스트 실시간 바인딩 -->
            </div>
        </div>

        <!-- O2. 스마트폰 오버레이 -->
        <div id="overlay-phone" class="overlay-view" style="background: #0b0f19;">
            <div class="overlay-header">
                <h3 style="color: #38bdf8;">SMARTPHONE</h3>
                <button onclick="toggleOverlay('phone')" style="padding: 4px 10px; background: #ef4444;">X</button>
            </div>
            <div class="phone-grid">
                <div class="app-icon-btn" onclick="openApp('ably')">
                    <span style="font-size: 2rem;">🛍️</span>
                    <span>에이블리</span>
                </div>
                <div class="app-icon-btn" onclick="openApp('musinsa')">
                    <span style="font-size: 2rem;">👟</span>
                    <span>무신사</span>
                </div>
                <div class="app-icon-btn" onclick="openApp('kream')">
                    <span style="font-size: 2rem;">🔥</span>
                    <span>크림(KREAM)</span>
                </div>
                <div class="app-icon-btn" onclick="openApp('junggonara')" style="background: #064e3b; border-color: #059669;">
                    <span style="font-size: 2rem;">🤝</span>
                    <span style="color: #34d399;">중고나라</span>
                </div>
                <div class="app-icon-btn" onclick="openApp('encyclopedia')" style="grid-column: span 2; background: #1e1b4b;">
                    <span style="font-size: 1.5rem;">📖 의상 백과 도감</span>
                </div>
            </div>
        </div>

        <!-- 쇼핑몰 앱 상세 모달 (상점 내부) -->
        <div id="overlay-shop" class="overlay-view" style="z-index: 20;">
            <div class="overlay-header">
                <h3 id="shop-title">쇼핑몰</h3>
                <button onclick="closeApp('shop')" style="padding: 4px 10px; background: #ef4444;">뒤로</button>
            </div>
            <div class="shop-banner">
                <p id="shop-desc">귀엽고 아기자기한 아이템이 가득!</p>
                <h4 id="shop-cost" style="color: #f59e0b; margin-top: 8px; font-size: 1.2rem;">1회 뽑기: 30,000원</h4>
            </div>
            <h4 style="margin-bottom: 8px;">획득 가능 리스트 & 확률</h4>
            <div class="probability-info" id="shop-prob-list">
                <!-- 확률 고지 정보 들어가는 곳 -->
            </div>
            <button id="btn-gacha-buy" onclick="triggerGacha()" style="width: 100%; padding: 16px; font-size: 1.1rem; background: #ec4899;">💸 랜덤 뽑기 실행</button>
        </div>

        <!-- 중고나라 앱 상세 모달 -->
        <div id="overlay-junggo" class="overlay-view" style="z-index: 20; background: #022c22;">
            <div class="overlay-header">
                <h3 style="color: #34d399;">🤝 중고나라 주식거래소</h3>
                <button onclick="closeApp('junggo')" style="padding: 4px 10px; background: #ef4444;">뒤로</button>
            </div>
            <p style="font-size: 0.8rem; color: #a7f3d0; margin-bottom: 12px; line-height: 1.4;">
                🚨 주의: 중고 시장 가격은 실시간 급변합니다. 판매시 기본 수수료 및 감가가 적용된 현재 시세로 즉시 체결됩니다!
            </p>
            <div class="used-list" id="junggonara-list">
                <!-- 보유하고 있는 아이템 중 판매 가능한 아이템 목록 -->
            </div>
        </div>

        <!-- 도감(Encyclopedia) 상세 모달 -->
        <div id="overlay-encyclopedia" class="overlay-view" style="z-index: 20; background: #111827;">
            <div class="overlay-header">
                <h3>📖 전체 의상 도감</h3>
                <button onclick="closeApp('encyclopedia')" style="padding: 4px 10px; background: #ef4444;">뒤로</button>
            </div>
            <p id="encyclopedia-stats" style="margin-bottom: 12px; font-weight: bold; color: #a855f7;"></p>
            <div class="item-grid" id="encyclopedia-grid">
                <!-- 전체 아이템 리스트 표시 (획득 여부 구분) -->
            </div>
        </div>

    </div>

    <!-- 가챠 결과 알림 연출 팝업 -->
    <div class="gacha-popup" id="gacha-popup">
        <h2 style="color: #f59e0b; margin-bottom: 15px;">🎉 획득 성공! 🎉</h2>
        <div id="gacha-result-name" style="font-size: 1.3rem; font-weight: bold; margin-bottom: 10px;">아이템명</div>
        <div id="gacha-result-grade" style="font-size: 1.5rem; font-weight: 900; margin-bottom: 20px;">[등급]</div>
        <button onclick="closeGachaPopup()">보관함 확인</button>
    </div>

</div>

<script>
    /* =========================================
       데이터베이스 정의 (아이템 도감 및 확률)
       ========================================= */

        // [크림] 초고가 한정판 라인업
        kream: [

            { id: "k6", name: "스포츠 헤드밴드", category: "acc", grade: "C", originalPrice: 30000, color: "#ff4d4d" }

    };

    // 상점별 가격 및 뽑기 확률 가중치
    const SHOP_META = {
        ably: { cost: 30000, title: "🛍️ 에이블리", desc: "러블리 & 화려한 드레스 코드", probs: { SSS: 1, SS: 4, S: 10, A: 20, B: 30, C: 35 } },
        musinsa: { cost: 50000, title: "👟 무신사", desc: "힙스터 캐주얼 스트릿 브랜드", probs: { SSS: 2, SS: 5, S: 12, A: 21, B: 30, C: 30 } },
        kream: { cost: 80000, title: "🔥 크림 (KREAM)", desc: "프리미엄 슈즈 & 하이엔드 한정판", probs: { SSS: 3, SS: 7, S: 15, A: 25, B: 25, C: 25 } }
    };

    // 기본 제공 시작용 아이템 정의
    const DEFAULT_ITEMS = [
        { id: "def_hair", name: "검정색 긴 생머리", category: "hair", grade: "C", originalPrice: 5000, color: "#111111" },
        { id: "def_top", name: "흰색 반팔 티셔츠", category: "top", grade: "C", originalPrice: 5000, color: "#ffffff" },
        { id: "def_bottom", name: "회색 츄리닝 바지", category: "bottom", grade: "C", originalPrice: 5000, color: "#8c8c8c" }
    ];

    /* =========================================
       게임 구동 전역 상태 관리
       ========================================= */
    let usersDb = JSON.parse(localStorage.getItem("casino_users")) || {};
    let currentUser = null;
    let selectedGender = "male";
    let activeShop = null;

    // 현재 시장 상황 (실시간 시세 변동용 멀티플라이어)
    let marketFluctuations = {};

    // 게임 시작 시 실시간 변동 스레드 작동 시작
    function initMarketFluctuations() {
        const allItems = [...ITEM_DATABASE.ably, ...ITEM_DATABASE.musinsa, ...ITEM_DATABASE.kream, ...DEFAULT_ITEMS];
        allItems.forEach(item => {
            // 초기 중고 판매가 계수는 0.3 ~ 0.5 에서 세팅 (기본 대폭 하락)
            marketFluctuations[item.id] = (Math.random() * 0.2) + 0.3; 
        });

        // 1.5초마다 무자비하게 가격 요동침 (주식 변동성 반영)
        setInterval(() => {
            allItems.forEach(item => {
                // 등급에 따라 극단적 변동률 부여 (SSS급일수록 폭등락 확률이 크고 파멸적)
                let changeFactor = 0.05;
                if (item.grade === "SSS") changeFactor = 0.30; 
                else if (item.grade === "SS") changeFactor = 0.20;
                else if (item.grade === "S") changeFactor = 0.12;

                const upDown = Math.random() > 0.55 ? 1 : -1; // 미세하게 하락 편향 부여 (카지노 엣지)
                let newRate = marketFluctuations[item.id] + (Math.random() * changeFactor * upDown);
                
                // 가격 보정 하한선은 원가의 5% / 상한선은 대박 터지면 원가의 2.2배까지 폭등하도록 설정
                if (newRate < 0.05) newRate = 0.05;
                if (newRate > 2.20) newRate = 2.20;

                marketFluctuations[item.id] = newRate;
            });
            updateJunggonaraUI();
        }, 1500);
    }

    /* =========================================
       1. 로그인 / 회원가입 로직
       ========================================= */
    function handleRegister() {
        const id = document.getElementById("login-id").value.trim();
        const pw = document.getElementById("login-pw").value.trim();
        if(!id || !pw) return alert("아이디와 비밀번호를 적어주세요!");
        if(usersDb[id]) return alert("이미 가입된 아이디입니다!");

        usersDb[id] = { password: pw, setupCompleted: false };
        localStorage.setItem("casino_users", JSON.stringify(usersDb));
        alert("회원가입이 완료되었습니다! 로그인해 주세요.");
    }

    function handleLogin() {
        const id = document.getElementById("login-id").value.trim();
        const pw = document.getElementById("login-pw").value.trim();
        
        if(!usersDb[id] || usersDb[id].password !== pw) {
            return alert("아이디 혹은 비밀번호가 틀렸습니다.");
        }

        currentUser = id;
        const userData = usersDb[currentUser];
        
        if(userData.setupCompleted) {
            startGame();
        } else {
            showScreen("screen-setup");
        }
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    /* =========================================
       2. 초기 캐릭터 셋업 (성별, 닉네임)
       ========================================= */
    function selectGender(gender) {
        selectedGender = gender;
        document.getElementById("g-male").classList.remove("selected");
        document.getElementById("g-female").classList.remove("selected");
        document.getElementById("g-" + gender).classList.add("selected");
    }

    function completeSetup() {
        const name = document.getElementById("user-name").value.trim();
        if(!name) return alert("닉네임을 입력해 주세요!");

        usersDb[currentUser] = {
            ...usersDb[currentUser],
            nickname: name,
            gender: selectedGender,
            money: 100000, // 기본 10만원 지급
            closet: [...DEFAULT_ITEMS], // 기본 3대 템 제공
            equipped: {
                hair: "def_hair",
                top: "def_top",
                bottom: "def_bottom",
                onepiece: null,
                socks: null,
                shoes: null,
                acc: null
            },
            history: ["def_hair", "def_top", "def_bottom"], // 도감 해금용 누적 리스트
            setupCompleted: true
        };
        
        localStorage.setItem("casino_users", JSON.stringify(usersDb));
        startGame();
    }

       3. 메인 게임 시뮬레이션 제어

        initMarketFluctuations();
        showScreen("screen-main");

        document.getElementById("display-username").innerText = data.nickname;
        document.getElementById("user-money").innerText = data.money.toLocaleString();
        
        renderCharacterCanvas();
        renderCloset();

       4. 그래픽 디테일 렌더링 (Z-index 및 레이어 벡터화)

        const onepieceItem = findItem(eq.onepiece);

            document.getElementById("layer-top").innerHTML = "";

    /* =========================================
       5. 스마트폰 / 옷장 / 모달 스위칭

    function toggleOverlay(id) {
        const overlay = document.getElementById("overlay-" + id);
        if(overlay.classList.contains("active")) {
            overlay.classList.remove("active");
        } else {
            // 다른 오버레이 전부 꺼버림
            document.querySelectorAll(".overlay-view").forEach(o => o.classList.remove("active"));
            overlay.classList.add("active");
            if (id === "closet") renderCloset();
        }
    }

            const ov = document.getElementById("overlay-encyclopedia");
            ov.classList.add("active");
            renderEncyclopedia();
            return;

        if (appName === "junggonara") {

        const probBox = document.getElementById("shop-prob-list");

        if(type === 'junggo') document.getElementById("overlay-junggo").classList.remove("active");
        if(type === 'encyclopedia') document.getElementById("overlay-encyclopedia").classList.remove("active");

    /* =========================================
       6. 가챠 룰렛 시뮬레이션 및 획득 (확률과 통계)
       ========================================= */
    function triggerGacha() {
        const meta = SHOP_META[activeShop];
        const data = usersDb[currentUser];

        if(data.money < meta.cost) {
            return alert("잔액이 부족합니다! 중고나라에서 옷을 급처하여 자금을 마련하세요.");
        }

        // 자금 차감
        data.money -= meta.cost;

        // 등급 추첨 알고리즘 (누적 확률 분포 추출)
        const roll = Math.random() * 100; // 0.0 ~ 100.0
        let accum = 0;
        let selectedGrade = "C";

        const gradeKeys = ["SSS", "SS", "S", "A", "B", "C"];
        for(let key of gradeKeys) {
            accum += meta.probs[key];
            if (roll <= accum) {
                selectedGrade = key;
                break;
            }
        }

        // 해당 등급의 상점 전용 아이템 가져오기
        const candidates = ITEM_DATABASE[activeShop].filter(i => i.grade === selectedGrade);
        const prize = candidates[Math.floor(Math.random() * candidates.length)];

        // 고유 인스턴스 ID 발급 (중복 소유 보장용)
        const newItemInstance = {
            ...prize,
            instanceId: activeShop + "_" + prize.id + "_" + Date.now()
        };

        // 내 가방 및 획득 이력(도감용) 기록 업데이트
        data.closet.push(newItemInstance);
        if(!data.history.includes(prize.id)) {
            data.history.push(prize.id);
        }

        localStorage.setItem("casino_users", JSON.stringify(usersDb));
        refreshMainUI();

        // 획득 연출 팝업 동작
        showGachaPopup(newItemInstance);
    }

    function showGachaPopup(item) {
        document.getElementById("gacha-result-name").innerText = item.name;
        const gradeEl = document.getElementById("gacha-result-grade");
        gradeEl.className = "grade-" + item.grade;
        gradeEl.innerText = `[${item.grade} 등급]`;
        document.getElementById("gacha-popup").style.display = "block";
    }

    function closeGachaPopup() {
        document.getElementById("gacha-popup").style.display = "none";
    }

    /* =========================================
       7. 옷장 인벤토리 렌더링 및 탈착
       ========================================= */
    function renderCloset() {
        const grid = document.getElementById("closet-grid");
        grid.innerHTML = "";

        const data = usersDb[currentUser];
        
        data.closet.forEach(item => {
            const isEquipped = Object.values(data.equipped).includes(item.id) || 
                               (item.instanceId && Object.values(data.equipped).includes(item.instanceId));
            
            const card = document.createElement("div");
            card.className = `item-card ${isEquipped ? 'equipped' : ''}`;
            card.onclick = () => toggleEquip(item);
            
            card.innerHTML = `
                <div class="item-grade-tag grade-bg-${item.grade}">${item.grade}</div>
                <div style="font-size: 1.5rem; margin-top:12px;">👕</div>
                <p style="font-size: 0.8rem; margin-top: 6px; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.name}</p>
                <span style="font-size:0.7rem; color:var(--text-sub);">${getCategoryName(item.category)}</span>
            `;
            grid.appendChild(card);
        });
    }

    function getCategoryName(cat) {
        const map = { hair: "헤어", top: "상의", bottom: "하의", onepiece: "원피스", socks: "양말", shoes: "신발", acc: "액세서리" };
        return map[cat] || "기타";
    }

    function toggleEquip(item) {
        const data = usersDb[currentUser];
        const eq = data.equipped;
        const targetId = item.instanceId ? item.instanceId : item.id;

        // 원피스 착용 시, 충돌 우려가 있는 상의/하의 자동 탈착 및 그 반대 연출 제어
        if(item.category === "onepiece") {
            if(eq.onepiece === targetId) {
                eq.onepiece = null; // 이미 입었으면 해제
            } else {
                eq.onepiece = targetId;
                eq.top = null;
                eq.bottom = null;
            }
        } else if(item.category === "top" || item.category === "bottom") {
            eq.onepiece = null; // 상/하의 장착 시 원피스 끔
            eq[item.category] = (eq[item.category] === targetId) ? null : targetId;
        } else {
            eq[item.category] = (eq[item.category] === targetId) ? null : targetId;
        }

        localStorage.setItem("casino_users", JSON.stringify(usersDb));
        refreshMainUI();
    }

    /* =========================================
       8. 실시간 주식시장 : 중고나라 제어부
       ========================================= */
    function updateJunggonaraUI() {
        const listDiv = document.getElementById("junggonara-list");
        if(!listDiv || !currentUser) return;

        listDiv.innerHTML = "";
        const data = usersDb[currentUser];

        // 기본 제공 템은 처분 불가 처리
        const sellables = data.closet.filter(item => !item.id.startsWith("def_"));

        if(sellables.length === 0) {
            listDiv.innerHTML = `<div style="text-align:center; color:var(--text-sub); margin-top:40px;">판매할 중고 옷이 없습니다. 뽑기에서 얻으세요!</div>`;
            return;
        }

        sellables.forEach(item => {
            const currentMultiplier = marketFluctuations[item.id] || 0.4;
            const livePrice = Math.floor(item.originalPrice * currentMultiplier);

            // 주식 가격 등락 화살표 연출
            const arrow = currentMultiplier > 0.5 ? "▲" : "▼";
            const priceClass = currentMultiplier > 0.5 ? "price-up" : "price-down";

            const row = document.createElement("div");
            row.className = "used-item";
            row.innerHTML = `
                <div>
                    <span class="grade-${item.grade}" style="font-weight:bold;">[${item.grade}] ${item.name}</span>
                    <div style="font-size:0.75rem; color:var(--text-sub); margin-top:2px;">
                        구입 원가: ${item.originalPrice.toLocaleString()}원 / 시세 비율: ${(currentMultiplier * 100).toFixed(0)}%
                    </div>
                </div>
                <div style="text-align: right;">
                    <div class="${priceClass}" style="font-weight:bold; font-size:1rem; margin-bottom: 4px;">
                        ${arrow} ${livePrice.toLocaleString()}원
                    </div>
                    <button onclick="sellItem('${item.instanceId}', ${livePrice})" style="background: #10b981; padding: 4px 10px; font-size:0.8rem;">판매</button>
                </div>
            `;
            listDiv.appendChild(row);
        });
    }

    function sellItem(instanceId, salePrice) {
        const data = usersDb[currentUser];
        
        // 내 가방에서 아이템 제거
        const idx = data.closet.findIndex(item => item.instanceId === instanceId);
        if(idx === -1) return;

        const soldItem = data.closet[idx];

        // 현재 착용 중이던 아이템이었다면 장착 해제
        const eq = data.equipped;
        for(let cat in eq) {
            if(eq[cat] === instanceId) {
                eq[cat] = null;
            }
        }

        // 가방에서 방출 및 머니 충전
        data.closet.splice(idx, 1);
        data.money += salePrice;

        localStorage.setItem("casino_users", JSON.stringify(usersDb));
        refreshMainUI();
        updateJunggonaraUI();
        alert(`${soldItem.name}을(를) ${salePrice.toLocaleString()}원에 거래 성공했습니다!`);
    }

    /* =========================================
       9. 전체 의상 백과 도감
       ========================================= */
    function renderEncyclopedia() {
        const grid = document.getElementById("encyclopedia-grid");
        const statsEl = document.getElementById("encyclopedia-stats");
        grid.innerHTML = "";

        const data = usersDb[currentUser];
        const allSystemItems = [
            ...ITEM_DATABASE.ably,
            ...ITEM_DATABASE.musinsa,
            ...ITEM_DATABASE.kream
        ];

        // 도감 수집율 통계 계산
        const totalCount = allSystemItems.length;
        const collectedCount = allSystemItems.filter(item => data.history.includes(item.id)).length;
        const percent = Math.floor((collectedCount / totalCount) * 100);

        statsEl.innerText = `현재 의상 수집율: ${percent}% (${collectedCount} / ${totalCount} 종)`;

        allSystemItems.forEach(item => {
            const hasDiscovered = data.history.includes(item.id);
            const card = document.createElement("div");
            card.className = "item-card";
            
            if(hasDiscovered) {
                card.innerHTML = `
                    <div class="item-grade-tag grade-bg-${item.grade}">${item.grade}</div>
                    <div style="font-size: 1.5rem; margin-top:12px; color: ${item.color};">👗</div>
                    <p style="font-size: 0.8rem; margin-top: 6px; font-weight:bold;">${item.name}</p>
                `;
            } else {
                card.style.opacity = "0.3";
                card.innerHTML = `
                    <div class="item-grade-tag" style="background:#444;">?</div>
                    <div style="font-size: 1.5rem; margin-top:12px;">🔒</div>
                    <p style="font-size: 0.8rem; margin-top: 6px; color:var(--text-sub);">미획득 의상</p>
                `;
            }
            grid.appendChild(card);
        });
    }
</script>
</body>
</html>
