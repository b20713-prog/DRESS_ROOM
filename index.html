<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>드레스룸 게임 (정식 복구 버전)</title>
    <style>
        /* 기본 스타일 및 폰트 설정 */
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Jua', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: #ffe3ec;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 스마트폰 형태의 메인 컨테이너 (제공된 사진의 비율 및 라운딩 참고) */
        .phone-container {
            width: 420px;
            height: 860px;
            background: #ffffff;
            border: 12px solid #ffb6c1;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(255, 182, 193, 0.5);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 로그인 / 계정 상태 표시 상단 바 */
        .login-auth-bar {
            background: #ffecf2;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: #db7093;
            border-bottom: 1px solid #ffd1dc;
        }

        .auth-btn {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 3px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* 메인 헤더 (상단 재화 및 타이틀) */
        .top-header {
            background: #ffffff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed #ffc0cb;
        }

        .game-title {
            color: #ff69b4;
            font-size: 1.3rem;
        }

        .currency-container {
            display: flex;
            gap: 10px;
        }

        .currency-badge {
            background: #fff0f5;
            border: 2px solid #ff69b4;
            padding: 5px 12px;
            border-radius: 20px;
            color: #ff1493;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* 콘텐츠 가변 영역 */
        .content-body {
            flex: 1;
            overflow-y: auto;
            position: relative;
            background: linear-gradient(to bottom, #ffffff, #fff0f5);
            padding: 15px;
        }

        .screen-view {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }

        .screen-view.active {
            display: flex;
        }

        /* --- [복구] 로그인 화면 뷰 --- */
        .login-screen-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
        }

        .login-logo {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: heartBeat 2s infinite;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .login-input-group {
            width: 80%;
            margin-bottom: 12px;
        }

        .login-input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffb6c1;
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
            text-align: center;
        }

        .btn-login-submit {
            width: 80%;
            background: #ff69b4;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(255, 105, 180, 0.2);
        }

        /* --- 1. 마이 드레스룸 화면 --- */
        .avatar-canvas-area {
            width: 100%;
            height: 360px;
            background: #fff;
            border: 3px solid #ffe4e1;
            border-radius: 24px;
            position: relative;
            box-shadow: 0 8px 16px rgba(255, 182, 193, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 목과 얼굴 분리 현상 원천 수정을 위한 부모 컨테이너 고정 구조 */
        .avatar-model {
            width: 200px;
            height: 320px;
            position: relative;
        }

        /* 얼굴과 몸을 단단히 연결하는 내부 절대 좌표 뼈대 설계 */
        .model-body {
            width: 54px;
            height: 120px;
            background: #ffe4e1;
            position: absolute;
            left: 73px;
            top: 135px;
            border-radius: 20px;
            border: 2px solid #ffc0cb;
            z-index: 2;
        }

        /* 목 레이어 고정: 몸과 얼굴의 중심점에 단단히 중첩되도록 배치 */
        .model-neck {
            width: 18px;
            height: 30px;
            background: #ffe4e1;
            position: absolute;
            left: 91px;
            top: 115px;
            border-left: 2px solid #ffc0cb;
            border-right: 2px solid #ffc0cb;
            z-index: 3;
        }

        /* 얼굴 레이어 고정: 목 윗면에 완벽하게 겹치도록 z-index 세부 제어 */
        .model-head {
            width: 100px;
            height: 96px;
            background: #ffe4e1;
            position: absolute;
            left: 50px;
            top: 30px;
            border-radius: 50%;
            border: 2px solid #ffc0cb;
            z-index: 4;
        }

        .model-eyes {
            width: 14px;
            height: 18px;
            background: #5c3a21;
            position: absolute;
            border-radius: 50%;
            top: 45px;
        }
        .model-eyes.left { left: 25px; }
        .model-eyes.right { right: 59px; }

        .model-blush {
            width: 16px;
            height: 8px;
            background: rgba(255, 105, 180, 0.4);
            position: absolute;
            border-radius: 50%;
            top: 62px;
        }
        .model-blush.left { left: 18px; }
        .model-blush.right { right: 64px; }

        .model-mouth {
            width: 12px;
            height: 8px;
            background: #ff69b4;
            position: absolute;
            left: 44px;
            top: 70px;
            border-radius: 0 0 10px 10px;
        }

        /* 장착 의상 아이템 오버레이 레이어 (z-index 순서 정밀 조정) */
        .layer-hair { position: absolute; width: 160px; height: 160px; left: 20px; top: 0px; z-index: 5; pointer-events: none; }
        .layer-dress { position: absolute; width: 140px; height: 160px; left: 30px; top: 115px; z-index: 6; pointer-events: none; }
        .layer-acc { position: absolute; width: 120px; height: 120px; left: 40px; top: 5px; z-index: 7; pointer-events: none; }

        /* 의상 교체 슬롯 파트 */
        .category-tabs {
            display: flex;
            gap: 6px;
            margin: 15px 0 10px 0;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #ffe4e1;
            border: none;
            border-radius: 12px;
            color: #db7093;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .tab-btn.active {
            background: #ff69b4;
            color: white;
        }

        .item-grid-scroll {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            overflow-y: auto;
        }

        .item-card {
            background: #ffffff;
            border: 2px solid #ffe4e1;
            border-radius: 16px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            position: relative;
        }

        .item-card.active {
            border-color: #ff69b4;
            background: #fff0f5;
        }

        .item-card.locked {
            background: #f5f5f5;
            border-color: #dcdcdc;
            cursor: not-allowed;
        }
        .item-card.locked::after {
            content: '🔒';
            position: absolute;
            top: 30%;
            font-size: 1.3rem;
        }

        .item-thumb {
            font-size: 2.3rem;
            height: 50px;
            display: flex;
            align-items: center;
        }

        .item-name {
            font-size: 0.8rem;
            color: #555;
            margin-top: 5px;
            text-align: center;
        }

        /* --- 2. 알바 화면 (밸런스 하향 조정 파트) --- */
        .work-showcase {
            background: white;
            border: 2px solid #ffb6c1;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
        }

        .work-list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .work-card {
            background: white;
            border: 2px solid #ffe4e1;
            border-radius: 16px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .work-info h3 { font-size: 1.1rem; color: #ff69b4; }
        .work-info p { font-size: 0.8rem; color: #888; margin-top: 3px; }

        .btn-work-start {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
        }
        .btn-work-start:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* --- 3. 의상 상점 화면 --- */
        .shop-banner {
            background: #ff69b4;
            color: white;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            margin-bottom: 15px;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .shop-card {
            background: white;
            border: 2px solid #ffe4e1;
            border-radius: 16px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-buy-item {
            width: 100%;
            background: #ff69b4;
            color: white;
            border: none;
            padding: 6px;
            border-radius: 8px;
            margin-top: 8px;
            cursor: pointer;
        }

        /* --- 4. [복구] 도감(Collection) 화면 --- */
        .collection-header {
            background: #e3f2fd;
            border: 2px solid #90caf9;
            padding: 12px;
            border-radius: 16px;
            color: #1565c0;
            text-align: center;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .collection-slot {
            background: #ffffff;
            border: 2px dashed #ccc;
            border-radius: 12px;
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            position: relative;
            opacity: 0.3;
        }

        .collection-slot.unlocked {
            border: 2px solid #ff69b4;
            background: #fff0f5;
            opacity: 1;
        }

        /* 하단 고정 내비게이션 바 (제공된 사진 형태 레이아웃 참고) */
        .bottom-nav-bar {
            height: 70px;
            background: #ffffff;
            border-top: 2px solid #ffe4e1;
            display: flex;
        }

        .nav-item-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: none;
            border: none;
            cursor: pointer;
            color: #888;
            gap: 2px;
        }

        .nav-item-btn.active {
            color: #ff69b4;
            background: #fff5f7;
        }

        .nav-item-btn .icon { font-size: 1.3rem; }
        .nav-item-btn .label { font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="phone-container">
    
    <div class="login-auth-bar">
        <span id="auth-status-text">🔒 로그인이 필요합니다</span>
        <button class="auth-btn" id="auth-action-btn" onclick="handleAuthClick()">로그인</button>
    </div>

    <div class="top-header">
        <div class="game-title">💖 쁘띠 드레스룸</div>
        <div class="currency-container">
            <div class="currency-badge">💰 <span id="gold-amount">1,000</span></div>
        </div>
    </div>

    <div class="content-body" id="main-content-body">
        
        <div id="view-login" class="screen-view active">
            <div class="login-screen-wrapper">
                <div class="login-logo">✨👗</div>
                <h2 style="color:#ff69b4; margin-bottom:20px;">드레스룸 멤버십 로그인</h2>
                <div class="login-input-group">
                    <input type="text" id="login-username" placeholder="사용자 닉네임 입력">
                </div>
                <button class="btn-login-submit" onclick="executeLogin()">게임 시작하기</button>
            </div>
        </div>

        <div id="view-closet" class="screen-view">
            <div class="avatar-canvas-area">
                <div class="avatar-model">
                    <div class="model-body"></div>
                    <div class="model-neck"></div>
                    <div class="model-head">
                        <div class="model-eyes left"></div>
                        <div class="model-eyes right"></div>
                        <div class="model-blush left"></div>
                        <div class="model-blush right"></div>
                        <div class="model-mouth"></div>
                    </div>
                    
                    <div class="layer-hair" id="layer-hair"></div>
                    <div class="layer-dress" id="layer-dress"></div>
                    <div class="layer-acc" id="layer-acc"></div>
                </div>
            </div>

            <div class="category-tabs">
                <button class="tab-btn active" onclick="setCategory('hair', this)">헤어</button>
                <button class="tab-btn" onclick="setCategory('dress', this)">의상</button>
                <button class="tab-btn" onclick="setCategory('acc', this)">소품</button>
            </div>

            <div class="item-grid-scroll" id="closet-grid">
                </div>
        </div>

        <div id="view-work" class="screen-view">
            <div class="work-showcase">
                <h2 style="color:#ff69b4;">💸 용돈 벌기 아르바이트</h2>
                <p style="font-size:0.85rem; color:#666; margin-top:5px;">
                    무분별한 재화 획득을 방지하기 위해 보상 밸런스가 하향 조정되었습니다. 전략적으로 골드를 모아보세요!
                </p>
            </div>
            
            <div class="work-list-container">
                <div class="work-card">
                    <div class="work-info">
                        <h3>방 청소하기 🧹</h3>
                        <p>소요시간: 3초 • 보상: 💰 150</p>
                    </div>
                    <button class="btn-work-start" id="btn-work-1" onclick="startWork(1, 3000, 150)">알바 시작</button>
                </div>
                <div class="work-card">
                    <div class="work-info">
                        <h3>인형 눈 붙이기 👀</h3>
                        <p>소요시간: 5초 • 보상: 💰 300</p>
                    </div>
                    <button class="btn-work-start" id="btn-work-2" onclick="startWork(2, 5000, 300)">알바 시작</button>
                </div>
                <div class="work-card">
                    <div class="work-info">
                        <h3>옷가게 스태프 👗</h3>
                        <p>소요시간: 10초 • 보상: 💰 700</p>
                    </div>
                    <button class="btn-work-start" id="btn-work-3" onclick="startWork(3, 10000, 700)">알바 시작</button>
                </div>
            </div>
        </div>

        <div id="view-shop" class="screen-view">
            <div class="shop-banner">
                <h3>🛍️ 프리미엄 부티크 shop</h3>
                <p style="font-size:0.8rem; margin-top:3px;">마음에 드는 아이템을 골드로 해금하세요.</p>
            </div>
            <div class="shop-grid" id="shop-grid-items">
                </div>
        </div>

        <div id="view-collection" class="screen-view">
            <div class="collection-header">
                📜 전체 아이템 도감 수집 현황: <b id="collection-count-text">0/12</b>
            </div>
            <div class="collection-grid" id="collection-slots-box">
                </div>
        </div>

    </div>

    <div class="bottom-nav-bar" id="game-navigation-bar" style="display: none;">
        <button class="nav-item-btn active" id="nav-closet" onclick="switchView('closet')">
            <span class="icon">👗</span><span class="label">드레스룸</span>
        </button>
        <button class="nav-item-btn" id="nav-work" onclick="switchView('work')">
            <span class="icon">💸</span><span class="label">알바</span>
        </button>
        <button class="nav-item-btn" id="nav-shop" onclick="switchView('shop')">
            <span class="icon">🛍️</span><span class="label">상점</span>
        </button>
        <button class="nav-item-btn" id="nav-collection" onclick="switchView('collection')">
            <span class="icon">📜</span><span class="label">도감</span>
        </button>
    </div>

</div>

<script>
    // --- 아이템 마스터 데이터 모델 고정 정의 ---
    const GAME_ITEMS = {
        hair: [
            { id: 'h1', name: '핑크 트윈테일', thumb: '🎀', price: 0, style: 'font-size:4.2rem; color:#ff69b4;' },
            { id: 'h2', name: '큐티 노란 단발', thumb: '💇‍♀️', price: 600, style: 'font-size:4.2rem; color:#ffd700;' },
            { id: 'h3', name: '여신 실버 롱', thumb: '👱‍♀️', price: 1500, style: 'font-size:4.2rem; color:#e0e0e0;' },
            { id: 'h4', name: '보라 리본 헤어', thumb: '🍇', price: 3000, style: 'font-size:4.2rem; color:#9c27b0;' }
        ],
        dress: [
            { id: 'd1', name: '기본 데일리 룩', thumb: '👗', price: 0, style: 'font-size:6rem; color:#ffb6c1;' },
            { id: 'd2', name: '고급 블루 드레스', thumb: '💙', price: 1000, style: 'font-size:6rem; color:#2196f3;' },
            { id: 'd3', name: '파티 레드 퀸', thumb: '💃', price: 2500, style: 'font-size:6rem; color:#f44336;' },
            { id: 'd4', name: '우주복 스타일', thumb: '👩‍🚀', price: 5000, style: 'font-size:6rem; color:#4caf50;' }
        ],
        acc: [
            { id: 'a1', name: '체리 귀걸이', thumb: '🍒', price: 0, style: 'font-size:2rem;' },
            { id: 'a2', name: '엔젤 메인 날개', thumb: '👼', price: 800, style: 'font-size:3.5rem;' },
            { id: 'a3', name: '반짝 마법 지팡이', thumb: '🪄', price: 2000, style: 'font-size:3.5rem;' },
            { id: 'a4', name: '스프링 골드 왕관', thumb: '👑', price: 4500, style: 'font-size:3.5rem;' }
        ]
    };

    // --- 유저 상태 관리 전역 모델 ---
    let playerState = {
        isLoggedIn: false,
        username: "",
        gold: 1000,
        unlockedItemIds: ['h1', 'd1', 'a1'], // 초기 기본 지급 템
        equippedIds: {
            hair: 'h1',
            dress: 'd1',
            acc: 'a1'
        }
    };

    let selectedCategory = 'hair';

    // --- 앱 첫 로드 시 구동 엔진 ---
    window.onload = function() {
        loadDataFromLocal();
        syncUIState();
    };

    function saveDataToLocal() {
        localStorage.setItem('PETIT_DRESSROOM_SAVE_2026', JSON.stringify(playerState));
    }

    function loadDataFromLocal() {
        const saved = localStorage.getItem('PETIT_DRESSROOM_SAVE_2026');
        if (saved) {
            try {
                playerState = JSON.parse(saved);
            } catch (e) {
                console.error("데이터 파싱 오류", e);
            }
        }
    }

    // --- 로그인 / 인증 제어부 복구 ---
    function executeLogin() {
        const nameInput = document.getElementById('login-username').value.trim();
        if(!nameInput) {
            alert('닉네임을 입력해주세요!');
            return;
        }
        playerState.username = nameInput;
        playerState.isLoggedIn = true;
        
        saveDataToLocal();
        syncUIState();
        switchView('closet');
    }

    function handleAuthClick() {
        if(playerState.isLoggedIn) {
            if(confirm('로그아웃 하시겠습니까? 데이터는 브라우저에 보존됩니다.')) {
                playerState.isLoggedIn = false;
                saveDataToLocal();
                syncUIState();
                switchView('login');
            }
        } else {
            switchView('login');
        }
    }

    // --- 화면 전환 렌더링 동기화 통제 ---
    function syncUIState() {
        document.getElementById('gold-amount').innerText = playerState.gold.toLocaleString();
        
        const authStatusText = document.getElementById('auth-status-text');
        const authActionBtn = document.getElementById('auth-action-btn');
        const navBar = document.getElementById('game-navigation-bar');

        if(playerState.isLoggedIn) {
            authStatusText.innerText = `👤 ${playerState.username}님 접속중`;
            authActionBtn.innerText = '로그아웃';
            navBar.style.display = 'flex';
        } else {
            authStatusText.innerText = '🔒 로그인이 필요합니다';
            authActionBtn.innerText = '로그인';
            navBar.style.display = 'none';
        }

        refreshAvatarLayer();
    }

    function switchView(viewId) {
        // 비인증 유저 강제 잠금
        if(!playerState.isLoggedIn && viewId !== 'login') {
            alert('로그인 후 이용 가능합니다.');
            viewId = 'login';
        }

        document.querySelectorAll('.screen-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item-btn').forEach(b => b.classList.remove('active'));

        document.getElementById(`view-${viewId}`).classList.add('active');
        
        const targetNav = document.getElementById(`nav-${viewId}`);
        if(targetNav) targetNav.classList.add('active');

        // 뷰 전환에 대응하는 리드로잉 핸들러 분기
        if(viewId === 'closet') renderCloset();
        if(viewId === 'shop') renderShop();
        if(viewId === 'collection') renderCollection();
    }

    // --- 카테고리 탭 선택 인터페이스 ---
    function setCategory(cat, element) {
        document.querySelectorAll('.category-tabs .tab-btn').forEach(b => b.classList.remove('active'));
        element.classList.add('active');
        selectedCategory = cat;
        renderCloset();
    }

    // --- 내 옷장 화면 렌더러 ---
    function renderCloset() {
        const grid = document.getElementById('closet-grid');
        grid.innerHTML = '';

        const currentItems = GAME_ITEMS[selectedCategory];

        currentItems.forEach(item => {
            const hasItem = playerState.unlockedItemIds.includes(item.id);
            const isEquipped = playerState.equippedIds[selectedCategory] === item.id;

            const card = document.createElement('div');
            card.className = `item-card ${!hasItem ? 'locked' : ''} ${isEquipped ? 'active' : ''}`;
            card.innerHTML = `
                <div class="item-thumb">${item.thumb}</div>
                <div class="item-name">${item.name}</div>
            `;

            if(hasItem) {
                card.onclick = () => {
                    playerState.equippedIds[selectedCategory] = item.id;
                    saveDataToLocal();
                    renderCloset();
                    refreshAvatarLayer();
                };
            }
            grid.appendChild(card);
        });
    }

    // 목과 얼굴이 절대 떨어지지 않도록 보장하면서 파츠 렌더링
    function refreshAvatarLayer() {
        ['hair', 'dress', 'acc'].forEach(cat => {
            const currentEquippedId = playerState.equippedIds[cat];
            const item = GAME_ITEMS[cat].find(i => i.id === currentEquippedId);
            const layerDom = document.getElementById(`layer-${cat}`);

            if(item) {
                layerDom.innerHTML = `<div style="${item.style}; display:flex; justify-content:center; align-items:center; width:100%; height:100%;">${item.thumb}</div>`;
            } else {
                layerDom.innerHTML = '';
            }
        });
    }

    // --- 밸런스가 하향 조정된 알바 런타임 제어부 ---
    function startWork(workIndex, duration, reward) {
        const btn = document.getElementById(`btn-work-${workIndex}`);
        const allButtons = document.querySelectorAll('.btn-work-start');

        // 알바 수행 도중 동시 클릭 방지 차단 잠금
        allButtons.forEach(b => b.disabled = true);
        
        let remainingTime = duration / 1000;
        btn.innerText = `${remainingTime}초...`;

        const clockInterval = setInterval(() => {
            remainingTime--;
            if(remainingTime > 0) {
                btn.innerText = `${remainingTime}초...`;
            } else {
                clearInterval(clockInterval);
                
                // 보상 처리
                playerState.gold += reward;
                saveDataToLocal();
                syncUIState();

                alert(`알바가 완료되었습니다! 💰 ${reward} 골드를 획득했습니다.`);
                
                btn.innerText = '알바 시작';
                allButtons.forEach(b => b.disabled = false);
            }
        }, 1000);
    }

    // --- 의상 상점 해금 인터페이스 ---
    function renderShop() {
        const grid = document.getElementById('shop-grid-items');
        grid.innerHTML = '';

        // 모든 아이템군 순회하며 배치
        ['hair', 'dress', 'acc'].forEach(cat => {
            GAME_ITEMS[cat].forEach(item => {
                // 기본 지급 템이 아닌 것만 상점에 배치
                if(item.price > 0) {
                    const alreadyBought = playerState.unlockedItemIds.includes(item.id);
                    const card = document.createElement('div');
                    card.className = 'shop-card';
                    
                    card.innerHTML = `
                        <div class="item-thumb">${item.thumb}</div>
                        <div class="item-name" style="font-weight:bold;">${item.name}</div>
                        <div style="font-size:0.85rem; color:#ff1493; margin-top:3px;">💰 ${item.price.toLocaleString()}</div>
                        <button class="btn-buy-item" ${alreadyBought ? 'style="background:#ccc;" disabled' : ''}>
                            ${alreadyBought ? '보유중' : '구매하기'}
                        </button>
                    `;

                    if(!alreadyBought) {
                        card.querySelector('button').onclick = () => purchaseItem(item.id, item.price);
                    }

                    grid.appendChild(card);
                }
            });
        });
    }

    function purchaseItem(itemId, price) {
        if(playerState.gold < price) {
            alert('골드가 부족합니다! 알바를 통해 골드를 모아보세요.');
            return;
        }

        playerState.gold -= price;
        playerState.unlockedItemIds.push(itemId);
        
        saveDataToLocal();
        syncUIState();
        renderShop();
        
        alert('아이템 구매 성공! 드레스룸에서 확인해 보세요.');
    }

    // --- [복구] 부활한 도감(Collection) 뷰 로직 ---
    function renderCollection() {
        const grid = document.getElementById('collection-slots-box');
        const countText = document.getElementById('collection-count-text');
        grid.innerHTML = '';

        let totalCount = 0;
        let unlockedCount = 0;

        ['hair', 'dress', 'acc'].forEach(cat => {
            GAME_ITEMS[cat].forEach(item => {
                totalCount++;
                const isUnlocked = playerState.unlockedItemIds.includes(item.id);
                if(isUnlocked) unlockedCount++;

                const slot = document.createElement('div');
                slot.className = `collection-slot ${isUnlocked ? 'unlocked' : ''}`;
                
                if(isUnlocked) {
                    slot.innerHTML = `<div>${item.thumb}</div>`;
                } else {
                    slot.innerHTML = `<div>❓</div>`;
                }

                grid.appendChild(slot);
            });
        });

        countText.innerText = `${unlockedCount} / ${totalCount}`;
    }
</script>

</body>
</html>
