<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>확률형 드레스룸 게임</title>
    <style>
        /* 기본 폰트 및 스타일 리셋 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', sans-serif;
        }

        body {
            background-color: #ffeef2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 스마트폰 프레임 디자인 */
        .phone-container {
            width: 400px;
            height: 800px;
            background: #fff;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 12px solid #fff;
            outline: 2px solid #ffb6c1;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* 상단 상태 바 영역 */
        .status-bar {
            height: 40px;
            background-color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px dashed #ffd1dc;
            font-size: 14px;
            font-weight: bold;
            color: #ff5e7e;
        }

        .balance-tag {
            background: #fff0f3;
            padding: 4px 10px;
            border-radius: 15px;
            border: 1px solid #ffccd5;
        }

        /* 스크린 화면 공통 */
        .screen {
            flex: 1;
            display: none;
            flex-direction: column;
            padding: 20px;
            position: relative;
            background-color: #fffafb;
            overflow-y: auto;
        }

        .screen.active {
            display: flex;
        }

        /* 타이틀 스타일 */
        h2 {
            text-align: center;
            color: #ff5e7e;
            margin-bottom: 20px;
            font-size: 22px;
        }

        /* 폼 요소 스타일 */
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 2px solid #ffd1dc;
            border-radius: 10px;
            outline: none;
            transition: 0.2s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #ff5e7e;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #ff5e7e;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 10px;
        }

        button:hover {
            background: #e04866;
        }

        button.sub-btn {
            background: #ffa4b6;
        }

        button.sub-btn:hover {
            background: #ff8c9f;
        }

        /* 성별 선택 화면 */
        .gender-select-box {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }

        .gender-card {
            flex: 1;
            height: 150px;
            border: 2px solid #ffd1dc;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            color: #ff5e7e;
            cursor: pointer;
            background: #fff;
            transition: 0.3s;
        }

        .gender-card:hover {
            background: #fff0f3;
            transform: scale(1.05);
            border-color: #ff5e7e;
        }

        /* ------------------ ★ 인형 및 레이어 최적화 시스템 ★ ------------------ */
        .character-view {
            width: 100%;
            height: 380px;
            background: #fff;
            border: 2px solid #ffd1dc;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 완벽한 신체 비율 레이어 조절 */
        .doll-container {
            position: relative;
            width: 200px;
            height: 320px;
        }

        /* 레이어 번호 기준 ($z-index$)
           10: 뒷머리 (hair-back)
           20: 기본 신체 (body, arm, leg)
           30: 양말 (socks)
           40: 신발 (shoes)
           50: 하의 / 원피스 (bottoms / dress)
           60: 상의 (tops)
           70: 앞머리 및 가발 앞부분 (hair-front)
           80: 얼굴 부품 (눈, 입, 귀걸이)
           90: 가방, 목걸이 (accessories)
        */

        .doll-layer {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* 1. 뒷머리 */
        .doll-hair-back {
            width: 160px;
            height: 200px;
            top: 10px;
            left: 20px;
            z-index: 10;
        }

        /* 2. 신체 요소들 */
        .doll-body-base {
            width: 80px;
            height: 110px;
            top: 50px;
            left: 60px;
            background-color: #ffe0d3;
            border-radius: 40px 40px 15px 15px;
            z-index: 20;
        }

        .doll-head {
            width: 76px;
            height: 76px;
            background-color: #ffe0d3;
            border-radius: 50%;
            position: absolute;
            top: -45px;
            left: 2px;
            z-index: 21;
        }

        /* 얼굴 표정 */
        .doll-face {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 80;
        }
        .doll-eyes {
            position: absolute;
            top: 35px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
        }
        .doll-eyes::before, .doll-eyes::after {
            content: '';
            width: 8px;
            height: 8px;
            background: #222;
            border-radius: 50%;
        }
        .doll-mouth {
            position: absolute;
            bottom: 22px;
            left: 33px;
            width: 10px;
            height: 6px;
            border-bottom: 3px solid #ff5e7e;
            border-radius: 0 0 5px 5px;
        }

        /* 이쑤시개 다리 수정 -> 통통하고 귀여운 다리 */
        .doll-leg {
            width: 16px;
            height: 90px;
            background-color: #ffe0d3;
            position: absolute;
            bottom: -80px;
            border-radius: 0 0 10px 10px;
            z-index: 20;
        }
        .doll-leg.left { left: 18px; }
        .doll-leg.right { right: 18px; }

        /* 자연스러운 팔 */
        .doll-arm {
            width: 14px;
            height: 75px;
            background-color: #ffe0d3;
            position: absolute;
            top: 20px;
            border-radius: 10px;
            z-index: 20;
            transform-origin: top center;
        }
        .doll-arm.left {
            left: -10px;
            transform: rotate(15deg);
        }
        .doll-arm.right {
            right: -10px;
            transform: rotate(-15deg);
        }

        /* 의류 및 악세사리 실시간 반영 레이어 */
        .doll-hair-front {
            width: 90px;
            height: 90px;
            top: 2px;
            left: 55px;
            z-index: 70;
        }

        .doll-tops {
            width: 94px;
            height: 65px;
            top: 95px;
            left: 53px;
            z-index: 60;
        }

        .doll-bottoms {
            width: 90px;
            height: 65px;
            top: 135px;
            left: 55px;
            z-index: 50;
        }

        .doll-shoes {
            width: 110px;
            height: 30px;
            top: 235px;
            left: 45px;
            z-index: 40;
        }

        .doll-socks {
            width: 80px;
            height: 45px;
            top: 210px;
            left: 60px;
            z-index: 30;
        }

        .doll-acc {
            width: 120px;
            height: 120px;
            top: 45px;
            left: 40px;
            z-index: 90;
        }

        /* 하단 메인 네비게이션 */
        .main-nav {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        /* 서브 모달 윈도우 (옷장 / 휴대폰 화면) */
        .modal-view {
            position: absolute;
            top: 40px;
            left: 0;
            width: 100%;
            height: calc(100% - 40px);
            background: #fff6f8;
            z-index: 200;
            display: none;
            flex-direction: column;
            padding: 15px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ffd1dc;
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
            color: #ff5e7e;
        }

        .close-modal-btn {
            background: #aaa;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            width: auto;
            font-size: 12px;
            margin-bottom: 0;
        }

        /* 아이템 그리드 시스템 */
        .item-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            overflow-y: auto;
            flex: 1;
        }

        .item-card {
            background: #fff;
            border: 2px solid #ffd1dc;
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .item-card:hover {
            border-color: #ff5e7e;
        }

        .item-card.equipped {
            background: #ffe3e8;
            border-color: #ff5e7e;
        }

        .item-grade {
            font-weight: bold;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 4px;
            color: white;
            margin-bottom: 4px;
        }

        /* 등급별 색상 테마 */
        .grade-SSS { background: #ff3300; }
        .grade-SS { background: #ff6600; }
        .grade-S { background: #ffcc00; }
        .grade-A { background: #33cc33; }
        .grade-B { background: #3399ff; }
        .grade-C { background: #999999; }

        .item-icon {
            width: 45px;
            height: 45px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin: 5px 0;
        }

        /* 스마트폰 내부 어플 그리드 */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .app-icon {
            background: white;
            border: 2px solid #ffd1dc;
            border-radius: 15px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            color: #555;
            transition: 0.2s;
        }

        .app-icon:hover {
            transform: translateY(-3px);
            border-color: #ff5e7e;
            color: #ff5e7e;
        }

        /* 개별 쇼핑몰/중고 어플 뷰 */
        .app-shop-view {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .gacha-banner {
            background: #fff0f3;
            border: 1px dashed #ff5e7e;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .gacha-result {
            margin-top: 15px;
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            color: #ff5e7e;
            min-height: 24px;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <!-- 상태 표시줄 (잔고 실시간 동기화) -->
    <div class="status-bar">
        <span id="header-title">드레스룸 게임</span>
        <span class="balance-tag">💰 <span id="user-balance">100,000</span>원</span>
    </div>

    <!-- 1. 로그인 화면 -->
    <div id="screen-login" class="screen active">
        <h2>🔑 로그인</h2>
        <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
            <input type="text" id="login-id" placeholder="아이디를 입력하세요">
            <input type="password" id="login-pw" placeholder="비밀번호를 입력하세요">
            <button onclick="handleLogin()">로그인</button>
            <button class="sub-btn" onclick="switchScreen('screen-register')">회원가입하러 가기</button>
        </div>
    </div>

    <!-- 2. 회원가입 화면 -->
    <div id="screen-register" class="screen">
        <h2>📝 회원가입</h2>
        <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
            <input type="text" id="reg-id" placeholder="사용할 아이디 입력">
            <input type="password" id="reg-pw" placeholder="사용할 비밀번호 입력">
            <button onclick="handleRegister()">가입하기</button>
            <button class="sub-btn" onclick="switchScreen('screen-login')">로그인화면으로</button>
        </div>
    </div>

    <!-- 3. 이름 입력 화면 -->
    <div id="screen-name" class="screen">
        <h2>🏷️ 이름 등록</h2>
        <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
            <p style="text-align:center; margin-bottom: 20px; color: #666;">드레스룸 주인의 이름을 정해주세요!</p>
            <input type="text" id="user-name-input" placeholder="이름을 입력하세요">
            <button onclick="handleSaveName()">입력 완료</button>
        </div>
    </div>

    <!-- 4. 성별 선택 화면 -->
    <div id="screen-gender" class="screen">
        <h2>🙋‍♂️ 성별 선택 🙋‍♀️</h2>
        <div class="gender-select-box">
            <div class="gender-card" onclick="handleSelectGender('남자')">🚹 남자</div>
            <div class="gender-card" onclick="handleSelectGender('여자')">🚺 여자</div>
        </div>
    </div>

    <!-- 5. 메인 게임 드레스룸 화면 -->
    <div id="screen-main" class="screen">
        <h3 id="room-title" style="text-align: center; color: #ff5e7e; margin-bottom: 10px;">누구누구의 드레스룸</h3>
        
        <!-- 실시간 아바타 합성 뷰포트 -->
        <div class="character-view">
            <div class="doll-container">
                <!-- 10: 뒷머리 -->
                <div class="doll-layer doll-hair-back" id="layer-hair-back"></div>
                
                <!-- 20: 신체 기본 (몸통, 머리, 얼굴, 팔다리) -->
                <div class="doll-layer doll-body-base">
                    <div class="doll-head">
                        <div class="doll-face">
                            <div class="doll-eyes"></div>
                            <div class="doll-mouth"></div>
                        </div>
                    </div>
                    <div class="doll-arm left"></div>
                    <div class="doll-arm right"></div>
                    <div class="doll-leg left" id="leg-l"></div>
                    <div class="doll-leg right" id="leg-r"></div>
                </div>

                <!-- 30~90: 의류 레이어링 시스템 (완벽 고정) -->
                <div class="doll-layer doll-socks" id="layer-socks"></div>
                <div class="doll-layer doll-shoes" id="layer-shoes"></div>
                <div class="doll-layer doll-bottoms" id="layer-bottoms"></div>
                <div class="doll-layer doll-tops" id="layer-tops"></div>
                <div class="doll-layer doll-hair-front" id="layer-hair-front"></div>
                <div class="doll-layer doll-acc" id="layer-acc"></div>
            </div>
        </div>

        <!-- 하단 메인 내비게이션 -->
        <div class="main-nav">
            <button onclick="openCloset()">🚪 옷장 열기</button>
            <button class="sub-btn" onclick="openPhone()">📱 스마트폰</button>
        </div>
    </div>

    <!-- ==================== [서브 모달 창 영역] ==================== -->
    
    <!-- 1. 옷장 모달 -->
    <div id="modal-closet" class="modal-view">
        <div class="modal-header">
            <span class="modal-title">🚪 나의 옷장</span>
            <button class="close-modal-btn" onclick="closeModal('modal-closet')">닫기</button>
        </div>
        <div class="item-grid" id="closet-grid">
            <!-- 자바스크립트로 소유 아이템 렌더링 -->
        </div>
    </div>

    <!-- 2. 스마트폰 메인 모달 -->
    <div id="modal-phone" class="modal-view" style="background-color: #f0f3f6;">
        <div class="modal-header">
            <span class="modal-title">📱 My Phone</span>
            <button class="close-modal-btn" onclick="closeModal('modal-phone')">홈 화면</button>
        </div>
        
        <!-- 어플리케이션 선택 그리드 -->
        <div id="phone-app-list" class="app-grid">
            <div class="app-icon" onclick="openApp('ably')" style="border-color: #ffccd5;">🌸 에이블리</div>
            <div class="app-icon" onclick="openApp('musinsa')" style="border-color: #d1e7ff;">🕶️ 무신사</div>
            <div class="app-icon" onclick="openApp('kream')" style="border-color: #d1ffd6;">🔥 크림 (KREAM)</div>
            <div class="app-icon" onclick="openApp('joonggo')" style="border-color: #ffe8d1;">🤝 중고나라</div>
        </div>

        <!-- APP: 에이블리 / 무신사 / 크림 공통 쇼핑 템플릿 -->
        <div id="app-shopping" class="app-shop-view">
            <button class="sub-btn" style="align-self: flex-start; width: auto; font-size: 12px; padding: 5px 10px;" onclick="backToPhoneHome()">◀ 앱 종료</button>
            <h3 id="shop-name" style="text-align: center; margin: 15px 0;">쇼핑몰 이름</h3>
            <div class="gacha-banner">
                <p id="shop-desc">앱 컨셉 설명</p>
                <h4 style="margin-top: 10px; color: #ff5e7e;" id="shop-cost">1회 뽑기: 0원</h4>
            </div>
            <button onclick="triggerGacha()" style="height: 60px; font-size: 18px;">🛒 랜덤 뽑기 시작!</button>
            <div class="gacha-result" id="gacha-result-text"></div>
        </div>

        <!-- APP: 중고나라 판매 템플릿 -->
        <div id="app-joonggo" class="app-shop-view">
            <button class="sub-btn" style="align-self: flex-start; width: auto; font-size: 12px; padding: 5px 10px;" onclick="backToPhoneHome()">◀ 앱 종료</button>
            <h3 style="text-align: center; margin: 10px 0; color: #ff8c00;">🤝 중고나라 실시간 장터</h3>
            <p style="font-size: 11px; text-align: center; color: #666; margin-bottom: 10px;">※ 수요에 따라 실시간 시세 변동률(80% ~ 150%)이 자동으로 요동칩니다!</p>
            <div class="item-grid" id="joonggo-grid">
                <!-- 판매 가능한 아이템 리스트가 채워짐 -->
            </div>
        </div>
    </div>
</div>

<script>
    /* ==================== 게임 데이터베이스 정의 ==================== */
    
    // 데이터베이스에 등록된 아이디/비밀번호 정보 저장소 (임시)
    const userDatabase = {
        "admin": "1234"
    };

    // 플레이어 기본 상태 데이터
    const player = {
        name: "",
        gender: "여자",
        money: 100000,
        inventory: [] // 옷장에 소유한 아이템 ID 목록
    };

    // 아이템 종류별 카테고리 정의
    // hair, tops, bottoms, shoes, socks, acc
    const ITEM_DATABASE = {
        // [기본 아이템]
        "basic_hair": { id: "basic_hair", name: "검정 긴생머리", type: "hair", grade: "C", price: 5000, color: "#2d2d2d", backColor: "#2d2d2d" },
        "basic_tops": { id: "basic_tops", name: "흰색 반팔", type: "tops", grade: "C", price: 5000, color: "#ffffff" },

        // [에이블리 뽑기 전용 - 화려하고 큐트한 아이템들]
        "ably_1": { id: "ably_1", name: "러블리 핑크리본 리본헤어", type: "hair", grade: "A", price: 32000, color: "#ff8da1", backColor: "#ff8da1" },
        "ably_2": { id: "ably_2", name: "프릴 공주 롱원피스", type: "tops", grade: "S", price: 68000, color: "#ffe0e6" },
        "ably_3": { id: "ably_3", name: "천사날개 가방", type: "acc", grade: "SS", price: 120000, color: "#ffffff" },
        "ably_4": { id: "ably_4", name: "파스텔 핑크 로퍼", type: "shoes", grade: "B", price: 28000, color: "#ffaec9" },
        "ably_5": { id: "ably_5", name: "프릴 레이스 양말", type: "socks", grade: "B", price: 12000, color: "#fff0f3" },

        // [무신사 뽑기 전용 - 캐주얼 스트릿 아이템들]
        "musinsa_1": { id: "musinsa_1", name: "스트릿 브라운 허쉬컷", type: "hair", grade: "B", price: 25000, color: "#5c4033", backColor: "#5c4033" },
        "musinsa_2": { id: "musinsa_2", name: "오버핏 블랙 맨투맨", type: "tops", grade: "B", price: 39000, color: "#1a1a1a" },
        "musinsa_3": { id: "musinsa_3", name: "와이드 빈티지 데님", type: "bottoms", grade: "A", price: 59000, color: "#4682b4" },
        "musinsa_4": { id: "musinsa_4", name: "클래식 화이트 스니커즈", type: "shoes", grade: "B", price: 45000, color: "#eeeeee" },
        "musinsa_5": { id: "musinsa_5", name: "체커보드 크로스백", type: "acc", grade: "S", price: 79000, color: "#333333" },

        // [크림 뽑기 전용 - 하이엔드 고가 명품/희귀템들]
        "kream_1": { id: "kream_1", name: "실버 플래티넘 블론드 헤어", type: "hair", grade: "S", price: 150000, color: "#e6e8fa", backColor: "#e6e8fa" },
        "kream_2": { id: "kream_2", name: "하이엔드 럭셔리 레더 자켓", type: "tops", grade: "SS", price: 350000, color: "#111111" },
        "kream_3": { id: "kream_3", name: "금박 체인 스커트", type: "bottoms", grade: "SS", price: 290000, color: "#ffd700" },
        "kream_4": { id: "kream_4", name: "한정판 리미티드 레드 슈즈", type: "shoes", grade: "SSS", price: 1200000, color: "#d91414" },
        "kream_5": { id: "kream_5", name: "SSS급 다이아몬드 목걸이", type: "acc", grade: "SSS", price: 3500000, color: "#00ffff" }
    };

    // 현재 입고 있는 장착 아이템 저장소
    const currentEquipped = {
        hair: "basic_hair",
        tops: "basic_tops",
        bottoms: "basic_bottoms",
        shoes: null,
        socks: null,
        acc: null
    };

    // 쇼핑몰 고유 설정 정보
    const SHOPS = {
        ably: {
            name: "🌸 에이블리",
            cost: 30000,
            desc: "러블리, 화려함, 핑크감성 가득한 귀여운 컬렉션!",
            pool: [
                { id: "ably_1", weight: 25 }, // A등급
                { id: "ably_2", weight: 12 }, // S등급
                { id: "ably_3", weight: 3 },  // SS등급
                { id: "ably_4", weight: 30 }, // B등급
                { id: "ably_5", weight: 30 }  // B등급
            ]
        },
        musinsa: {
            name: "🕶️ 무신사",
            cost: 50000,
            desc: "캐주얼, 미니멀, 트렌디한 일상 스트릿 웨어 컬렉션!",
            pool: [
                { id: "musinsa_1", weight: 25 }, // B등급
                { id: "musinsa_2", weight: 30 }, // B등급
                { id: "musinsa_3", weight: 20 }, // A등급
                { id: "musinsa_4", weight: 20 }, // B등급
                { id: "musinsa_5", weight: 5 }   // S등급
            ]
        },
        kream: {
            name: "🔥 크림 (KREAM)",
            cost: 80000,
            desc: "최정상 SSS등급 리미티드 명품 아이템들을 조준하세요!",
            pool: [
                { id: "kream_1", weight: 45 }, // S등급
                { id: "kream_2", weight: 30 }, // SS등급
                { id: "kream_3", weight: 20 }, // SS등급
                { id: "kream_4", weight: 3 },  // SSS등급
                { id: "kream_5", weight: 2 }   // SSS등급
            ]
        }
    };

    let currentOpenShop = null; // 현재 켜져 있는 상점ID 기록
    let joonggoPrices = {}; // 실시간으로 계속 변동되는 아이템별 중고 시세 데이터

    /* ==================== 1. 회원가입 및 로그인 코어 엔진 ==================== */
    
    function updateHeaderBalance() {
        document.getElementById('user-balance').innerText = player.money.toLocaleString();
    }

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(scr => scr.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function handleRegister() {
        const id = document.getElementById('reg-id').value.trim();
        const pw = document.getElementById('reg-pw').value.trim();

        if(!id || !pw) {
            alert('아이디와 비밀번호를 빠짐없이 적어주세요!');
            return;
        }
        if(userDatabase[id]) {
            alert('이미 같은 아이디가 존재합니다.');
            return;
        }

        userDatabase[id] = pw;
        alert('🎉 성공적으로 가입되었습니다! 로그인해 주세요.');
        switchScreen('screen-login');
    }

    function handleLogin() {
        const id = document.getElementById('login-id').value.trim();
        const pw = document.getElementById('login-pw').value.trim();

        if(userDatabase[id] && userDatabase[id] === pw) {
            alert('🔓 인증 완료! 환영합니다.');
            switchScreen('screen-name');
        } else {
            alert('❌ 비밀번호 혹은 아이디가 일치하지 않습니다.');
        }
    }

    function handleSaveName() {
        const name = document.getElementById('user-name-input').value.trim();
        if(!name) {
            alert('이름을 한 글자 이상 입력해 주세요!');
            return;
        }
        player.name = name;
        document.getElementById('room-title').innerText = `✨ ${player.name}의 드레스룸`;
        switchScreen('screen-gender');
    }

    function handleSelectGender(gender) {
        player.gender = gender;
        alert(`선택하신 성별: [${gender}] 캐릭터가 생성되었습니다!`);
        
        // 기본 보급 지급 아이템 설정 및 자동 장착
        player.inventory = ["basic_hair", "basic_tops", "basic_bottoms"];
        currentEquipped.hair = "basic_hair";
        currentEquipped.tops = "basic_tops";
        currentEquipped.bottoms = "basic_bottoms";
        currentEquipped.shoes = null;
        currentEquipped.socks = null;
        currentEquipped.acc = null;

        // 성별 특이점에 따른 다리 두께 조절 서비스 적용
        const legL = document.getElementById('leg-l');
        const legr = document.getElementById('leg-r');
        if (gender === '남자') {
            legL.style.width = '18px';
            legr.style.width = '18px';
        } else {
            legL.style.width = '14px';
            legr.style.width = '14px';
        }

        updateHeaderBalance();
        renderAvatar();
        switchScreen('screen-main');
    }

    /* ==================== 2. 그래픽 아바타 실시간 렌더링 엔진 ==================== */
    
    function renderAvatar() {
        // 머리 세팅
        const hairItem = ITEM_DATABASE[currentEquipped.hair];
        const layerHairFront = document.getElementById('layer-hair-front');
        const layerHairBack = document.getElementById('layer-hair-back');

        if(hairItem) {
            // 앞머리 (동그란 느낌의 볼륨 헤어 스타일 가이드라인)
            layerHairFront.style.background = `radial-gradient(circle at 50% 30%, ${hairItem.color} 70%, transparent 72%)`;
            layerHairFront.style.borderRadius = "50% 50% 30% 30%";
            // 뒷머리 (목 뒤로 깔끔하게 떨어지는 스타일 라인)
            layerHairBack.style.background = `linear-gradient(${hairItem.backColor}, ${hairItem.backColor})`;
            layerHairBack.style.borderRadius = "50% 50% 20% 20%";
        } else {
            layerHairFront.style.background = 'none';
            layerHairBack.style.background = 'none';
        }

        // 상의 세팅
        const topsItem = ITEM_DATABASE[currentEquipped.tops];
        const layerTops = document.getElementById('layer-tops');
        if(topsItem) {
            layerTops.style.background = `linear-gradient(to bottom, ${topsItem.color} 90%, #eee 10%)`;
            layerTops.style.borderRadius = "15px 15px 5px 5px";
        } else {
            layerTops.style.background = 'none';
        }

        // 하의 세팅
        const bottomsItem = ITEM_DATABASE[currentEquipped.bottoms];
        const layerBottoms = document.getElementById('layer-bottoms');
        if(bottomsItem) {
            layerBottoms.style.background = bottomsItem.color;
            layerBottoms.style.borderRadius = "3px 3px 10px 10px";
        } else {
            layerBottoms.style.background = 'none';
        }

        // 양말 세팅
        const socksItem = ITEM_DATABASE[currentEquipped.socks];
        const layerSocks = document.getElementById('layer-socks');
        if(socksItem) {
            layerSocks.style.background = `linear-gradient(to bottom, ${socksItem.color} 80%, transparent 20%)`;
        } else {
            layerSocks.style.background = 'none';
        }

        // 신발 세팅
        const shoesItem = ITEM_DATABASE[currentEquipped.shoes];
        const layerShoes = document.getElementById('layer-shoes');
        if(shoesItem) {
            layerShoes.style.background = `radial-gradient(circle, ${shoesItem.color} 60%, #333 90%)`;
            layerShoes.style.borderRadius = "8px 8px 12px 12px";
        } else {
            layerShoes.style.background = 'none';
        }

        // 악세사리 세팅 (포인트 장식 백 등)
        const accItem = ITEM_DATABASE[currentEquipped.acc];
        const layerAcc = document.getElementById('layer-acc');
        if(accItem) {
            layerAcc.style.border = `4px solid ${accItem.color}`;
            layerAcc.style.borderRadius = "50%";
        } else {
            layerAcc.style.border = 'none';
        }
    }

    /* ==================== 3. 실시간 변동 중고 마켓 엔진 (시뮬레이터) ==================== */
    
    // 2초마다 모든 옷의 중고 시세를 임의 변동 (기준가의 80% ~ 150%)
    function startJoonggoTicker() {
        setInterval(() => {
            Object.keys(ITEM_DATABASE).forEach(itemId => {
                const basePrice = ITEM_DATABASE[itemId].price;
                // 확률 가중치 변동 부여 (정규 변동성 적용)
                const fluctuation = 0.8 + (Math.random() * 0.7); 
                joonggoPrices[itemId] = Math.floor(basePrice * fluctuation);
            });
            // 만약 중고거래 화면을 보고 있다면 그리드 재갱신
            if(document.getElementById('app-joonggo').style.display === 'flex') {
                renderJoonggoMarket();
            }
        }, 2000);
    }
    
    // 초기화 가격 로드
    Object.keys(ITEM_DATABASE).forEach(itemId => {
        joonggoPrices[itemId] = ITEM_DATABASE[itemId].price;
    });
    startJoonggoTicker();

    /* ==================== 4. UI 팝업 모달 관리 ==================== */
    
    function openCloset() {
        document.getElementById('modal-closet').style.display = 'flex';
        renderClosetItems();
    }

    function openPhone() {
        document.getElementById('modal-phone').style.display = 'flex';
        backToPhoneHome();
    }

    function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
    }

    /* ==================== 5. 드레스룸 인벤토리 착용 로직 ==================== */
    
    function renderClosetItems() {
        const grid = document.getElementById('closet-grid');
        grid.innerHTML = '';

        if(player.inventory.length === 0) {
            grid.innerHTML = `<div style="grid-column: 1/4; text-align:center; padding: 40px 0; color:#888;">보유한 아이템이 없습니다.</div>`;
            return;
        }

        player.inventory.forEach((uniqueId, index) => {
            const item = ITEM_DATABASE[uniqueId];
            if(!item) return;

            const isEquipped = currentEquipped[item.type] === uniqueId;
            const card = document.createElement('div');
            card.className = `item-card ${isEquipped ? 'equipped' : ''}`;
            card.onclick = () => toggleEquip(item.type, uniqueId);

            card.innerHTML = `
                <span class="item-grade grade-${item.grade}">${item.grade}</span>
                <div class="item-icon" style="background-color: ${item.color || '#ccc'}; border-radius: 8px;"></div>
                <div style="font-weight:bold; margin-top:5px;">${item.name}</div>
                <div style="font-size:10px; color:#777;">[${translateType(item.type)}]</div>
            `;
            grid.appendChild(card);
        });
    }

    function translateType(type) {
        const mapping = { hair: "헤어", tops: "상의", bottoms: "하의", shoes: "신발", socks: "양말", acc: "악세사리" };
        return mapping[type] || "장식";
    }

    function toggleEquip(type, itemId) {
        if(currentEquipped[type] === itemId) {
            // 이미 착용 중인 것을 해제하려는 경우 (기본 부위는 맨몸 방지 위해 막아둘 수 있습니다.)
            if(["hair", "tops", "bottoms"].includes(type)) {
                alert("이 파츠는 완전히 해제할 수 없습니다. 다른 옷으로 변경해 주세요!");
                return;
            }
            currentEquipped[type] = null;
        } else {
            currentEquipped[type] = itemId;
        }
        renderAvatar();
        renderClosetItems();
    }

    /* ==================== 6. 스마트폰 상점 & 가차 드로우 시스템 ==================== */
    
    function openApp(appId) {
        document.getElementById('phone-app-list').style.display = 'none';
        
        if (appId === 'joonggo') {
            document.getElementById('app-joonggo').style.display = 'flex';
            renderJoonggoMarket();
        } else {
            currentOpenShop = appId;
            const shopData = SHOPS[appId];
            document.getElementById('shop-name').innerText = shopData.name;
            document.getElementById('shop-desc').innerText = shopData.desc;
            document.getElementById('shop-cost').innerText = `1회 뽑기 비용: ${shopData.cost.toLocaleString()}원`;
            document.getElementById('gacha-result-text').innerText = '';
            document.getElementById('app-shopping').style.display = 'flex';
        }
    }

    function backToPhoneHome() {
        document.getElementById('app-shopping').style.display = 'none';
        document.getElementById('app-joonggo').style.display = 'none';
        document.getElementById('phone-app-list').style.display = 'grid';
        currentOpenShop = null;
    }

    // 누적 가중치 확률 기반 뽑기 함수
    function triggerGacha() {
        if (!currentOpenShop) return;
        const shopData = SHOPS[currentOpenShop];

        if (player.money < shopData.cost) {
            alert("💸 잔액이 부족하여 가차를 이용할 수 없습니다! 중고나라에서 입지 않는 의류를 팔아보세요.");
            return;
        }

        // 잔고 차감
        player.money -= shopData.cost;
        updateHeaderBalance();

        // 뽑기 확률 계산
        const pool = shopData.pool;
        const totalWeight = pool.reduce((acc, curr) => acc + curr.weight, 0);
        let randomNum = Math.random() * totalWeight;
        
        let selectedItemKey = null;
        for (let i = 0; i < pool.length; i++) {
            randomNum -= pool[i].weight;
            if (randomNum <= 0) {
                selectedItemKey = pool[i].id;
                break;
            }
        }

        if(selectedItemKey) {
            const wonItem = ITEM_DATABASE[selectedItemKey];
            player.inventory.push(selectedItemKey); // 옷장에 삽입
            
            // 결과 이펙트 연출
            const resDiv = document.getElementById('gacha-result-text');
            resDiv.innerHTML = `🎉 축하합니다! <span class="item-grade grade-${wonItem.grade}">${wonItem.grade}</span> [${wonItem.name}] 획득!`;
        }
    }

    /* ==================== 7. 실시간 중고나라 판매 시스템 ==================== */
    
    function renderJoonggoMarket() {
        const grid = document.getElementById('joonggo-grid');
        grid.innerHTML = '';

        // 판매용 리스트 빌드 (단, 착용중인 것은 경고 및 우선 보류 조치)
        if(player.inventory.length === 0) {
            grid.innerHTML = `<div style="grid-column: 1/4; text-align:center; padding: 40px 0; color:#888;">판매 가능한 옷이 옷장에 존재하지 않습니다.</div>`;
            return;
        }

        player.inventory.forEach((itemId, idx) => {
            const item = ITEM_DATABASE[itemId];
            if(!item) return;

            const isEquipped = Object.values(currentEquipped).includes(itemId);
            const livePrice = joonggoPrices[itemId] || item.price;

            const card = document.createElement('div');
            card.className = 'item-card';
            card.style.border = isEquipped ? '2px dashed #bbb' : '2px solid #ffd1dc';
            
            card.innerHTML = `
                <span class="item-grade grade-${item.grade}">${item.grade}</span>
                <div class="item-icon" style="background-color: ${item.color || '#ccc'}; border-radius: 8px;"></div>
                <div style="font-weight:bold; margin: 3px 0;">${item.name}</div>
                <div style="color: #d2143a; font-weight: bold; font-size:12px;">📈 ${livePrice.toLocaleString()}원</div>
                <button style="margin-top: 5px; padding: 5px; font-size: 11px; background: ${isEquipped ? '#ccc' : '#ff8c00'}" 
                        ${isEquipped ? 'disabled' : ''} 
                        onclick="sellItem(${idx}, '${itemId}', ${livePrice})">
                    ${isEquipped ? '착용중' : '즉시 판매'}
                </button>
            `;
            grid.appendChild(card);
        });
    }

    function sellItem(inventoryIndex, itemId, soldPrice) {
        // 인벤토리 목록에서 index 기준으로 해당 인스턴스 정밀 제거
        player.inventory.splice(inventoryIndex, 1);
        
        // 유저 잔고에 중고 가격 추가
        player.money += soldPrice;
        
        alert(`🤝 중고 거래가 완료되었습니다!\n판매 대금 ${soldPrice.toLocaleString()}원이 입금되었습니다.`);
        
        updateHeaderBalance();
        renderJoonggoMarket();
    }
</script>
