    function formatMoney(num) {
      return Number(num).toLocaleString('ko-KR');
    }

    function initMarketPrices() {
      for (let key in ITEM_DATABASE) {
        AppState.marketPrices[key] = {
          current: ITEM_DATABASE[key].basePrice,
          change: 0,
          trend: 'flat'
        };
      }
    }

    function handleLogin() {
      const id = document.getElementById('login-id').value;
      if (!id) return alert("아이디를 입력해주세요.");
      AppState.user.id = id;
      document.getElementById('screen-login').classList.add('hidden');
      document.getElementById('screen-name').classList.remove('hidden');
    }

    function handleSaveName() {
      const name = document.getElementById('user-nickname').value.trim();
      if (!name) return alert("닉네임을 지정해주세요.");
      AppState.user.name = name;
      document.getElementById('screen-name').classList.add('hidden');
      document.getElementById('screen-gender').classList.remove('hidden');
    }

    function handleSelectGender(gender) {
      AppState.user.gender = gender;
      document.getElementById('display-name').innerText = AppState.user.name;
      document.getElementById('display-gender').innerText = gender === 'female' ? '여' : '남';
      updateUIBalance();

      const defaultHair = spawnItem('hair_c_black');
      const defaultTop = spawnItem('top_c_white');
      const defaultBottom = spawnItem('bottom_c_pants');
      
      equipItem(defaultHair);
      equipItem(defaultTop);
      equipItem(defaultBottom);

      document.getElementById('screen-gender').classList.add('hidden');
      initMarketPrices();
      setInterval(runMarketTicker, 1000);
    }

    function spawnItem(itemId) {
      const baseItem = ITEM_DATABASE[itemId];
      const instanceId = 'inst_' + Math.random().toString(36).substr(2, 9);
      const newInstance = {
        instanceId: instanceId,
        id: itemId,
        purchasePrice: baseItem.basePrice
      };
      AppState.user.inventory.push(newInstance);
      return newInstance;
    }

    function updateUIBalance() {
      document.getElementById('display-balance').innerText = formatMoney(AppState.user.balance);
    }

    // --- 5. Pure CSS 캐릭터 옷장 장착 엔진 ---
    function equipItem(itemInstance) {
      const itemData = ITEM_DATABASE[itemInstance.id];
      const category = itemData.category;

      if (category === 'dress') {
        AppState.user.equipped.top = null;
        AppState.user.equipped.bottom = null;
        AppState.user.equipped.dress = itemInstance;
      } else if (category === 'top' || category === 'bottom') {
        AppState.user.equipped.dress = null;
        AppState.user.equipped[category] = itemInstance;
      } else {
        AppState.user.equipped[category] = itemInstance;
      }
      renderAvatar();
    }

    function unequipItem(category) {
      AppState.user.equipped[category] = null;
      renderAvatar();
    }

    function renderAvatar() {
      const eq = AppState.user.equipped;

      const layerHairBack = document.getElementById('layer-hair-back');
      const layerHairFront = document.getElementById('layer-hair-front');
      if (eq.hair) {
        const hData = ITEM_DATABASE[eq.hair.id];
        layerHairBack.innerHTML = hData.renderBack();
        layerHairFront.innerHTML = hData.renderFront();
      } else {
        layerHairBack.innerHTML = '';
        layerHairFront.innerHTML = '';
      }

      const layerTop = document.getElementById('layer-top');
      if (eq.top) {
        layerTop.innerHTML = ITEM_DATABASE[eq.top.id].render();
      } else {
        layerTop.innerHTML = '';
      }

      const layerBottom = document.getElementById('layer-bottom');
      if (eq.bottom) {
        layerBottom.innerHTML = ITEM_DATABASE[eq.bottom.id].render();
      } else {
        layerBottom.innerHTML = '';
      }

      const layerDress = document.getElementById('layer-dress');
      if (eq.dress) {
        layerDress.innerHTML = ITEM_DATABASE[eq.dress.id].render();
      } else {
        layerDress.innerHTML = '';
      }

      const layerShoes = document.getElementById('layer-shoes');

        layerShoes.innerHTML = ITEM_DATABASE[eq.shoes.id].render();
      } else {
        layerShoes.innerHTML = '';
      }

      const layerAccessory = document.getElementById('layer-accessory');
      if (eq.accessory) {
        layerAccessory.innerHTML = ITEM_DATABASE[eq.accessory.id].render();
      } else {
        layerAccessory.innerHTML = '';
      }

      const layerBag = document.getElementById('layer-bag');

    // --- 6. 옷장 모달 렌더링 시스템 ---
    function openWardrobe() {
      document.getElementById('modal-wardrobe').classList.remove('translate-y-full');
      filterWardrobe(AppState.currentWardrobeTab);
    }

    function closeWardrobe() {
      document.getElementById('modal-wardrobe').classList.add('translate-y-full');
    }

    function filterWardrobe(category) {
      AppState.currentWardrobeTab = category;
      const tabs = document.querySelectorAll('#wardrobe-tabs button');
      tabs.forEach(btn => {
        btn.classList.replace('bg-brandPink', 'bg-pink-50');
        btn.classList.replace('text-white', 'text-gray-500');
      });
      event.target.classList.replace('bg-pink-50', 'bg-brandPink');
      event.target.classList.replace('text-gray-500', 'text-white');
      renderWardrobeList();
    }

    function renderWardrobeList() {
      const listContainer = document.getElementById('wardrobe-list');
      listContainer.innerHTML = '';

      const filtered = AppState.user.inventory.filter(inst => {
        const item = ITEM_DATABASE[inst.id];
        if (AppState.currentWardrobeTab === 'all') return true;
        if (AppState.currentWardrobeTab === 'accessory') {
          return item.category === 'accessory' || item.category === 'bag';
        }
        return item.category === AppState.currentWardrobeTab;
      });

      if (filtered.length === 0) {
        listContainer.innerHTML = `<div class="col-span-3 text-center py-12 text-xs text-gray-400">아이템이 없어요. 쇼핑몰에서 구매해보세요!</div>`;
        return;
      }

      filtered.forEach(inst => {
        const item = ITEM_DATABASE[inst.id];
        const isEquipped = checkEquipped(inst.instanceId);
        const gradeStyle = GRADE_COLORS[item.grade];

        const card = document.createElement('div');
        card.className = `p-2 bg-pink-50 rounded-2xl flex flex-col items-center border ${isEquipped ? 'border-brandPink bg-pink-100/50' : 'border-pink-200'} relative cursor-pointer hover:scale-[1.03] transition-transform`;
        card.onclick = () => {
          if (isEquipped) {
            unequipItem(item.category);
          } else {
            equipItem(inst);
          }
          renderWardrobeList();
        };

        card.innerHTML = `
          <div class="w-14 h-14 bg-white rounded-xl border border-pink-100 flex items-center justify-center relative overflow-hidden mb-1">
            <span class="absolute top-1 right-1 text-[8px] font-black ${gradeStyle.text}">${item.grade}</span>
            <span class="text-2xl">${item.category === 'hair' ? '💇' : item.category === 'top' ? '👕' : item.category === 'bottom' ? '👖' : item.category === 'dress' ? '👗' : item.category === 'shoes' ? '👟' : '🎁'}</span>
          </div>
          <span class="text-[9px] font-bold text-gray-700 truncate w-full text-center">${item.name}</span>
          ${isEquipped ? '<span class="absolute top-1 left-1 bg-brandPink text-white text-[8px] font-bold px-1.5 py-0.5 rounded-full">착용중</span>' : ''}
        `;
        listContainer.appendChild(card);
      });
    }

    function checkEquipped(instanceId) {
      for (let cat in AppState.user.equipped) {
        if (AppState.user.equipped[cat] && AppState.user.equipped[cat].instanceId === instanceId) {
          return true;
        }
      }
      return false;
    }

    // --- 7. 스마트폰 핸들러 및 3대 뽑기 쇼핑몰 엔진 ---
    function openSmartPhone() {

    function openApp(appName) {
      const container = document.getElementById('phone-app-container');
      const title = document.getElementById('app-title');
      const body = document.getElementById('app-body');
      
      container.classList.remove('hidden');

      if (appName === 'ably') {
        title.innerText = '🛍️ 에이블리 뽑기';
        body.innerHTML = renderShoppingAppHtml('에이블리', 30000, { 'SSS': 0.5, 'SS': 2.5, 'S': 7.0, 'A': 15.0, 'B': 35.0, 'C': 40.0 }, 'bg-pink-500');
      } else if (appName === 'musinsa') {
        title.innerText = '🎩 무신사 셀렉트';
        body.innerHTML = renderShoppingAppHtml('무신사', 50000, { 'SSS': 1.5, 'SS': 4.5, 'S': 10.0, 'A': 24.0, 'B': 40.0, 'C': 20.0 }, 'bg-black');
      } else if (appName === 'kream') {
        title.innerText = '⚡ 크림 KREAM 한정판';
        body.innerHTML = renderShoppingAppHtml('크림(KREAM)', 80000, { 'SSS': 5.0, 'SS': 15.0, 'S': 30.0, 'A': 30.0, 'B': 15.0, 'C': 5.0 }, 'bg-emerald-800');
      } else if (appName === 'joonggo') {
        title.innerText = '🤝 중고나라 실시간 매각';
        renderJoonggoApp();
      }
    }

    function backToHome() {
      document.getElementById('phone-app-container').classList.add('hidden');
    }

    function renderShoppingAppHtml(name, price, odds, themeClass) {
      return `
        <div class="text-white text-center flex flex-col items-center py-6 h-full justify-between">
          <div>
            <h4 class="text-xl font-extrabold text-pink-200 mb-1">${name}</h4>
            <p class="text-xs text-neutral-400">매우 희귀한 템들을 획득해보세요!</p>
          </div>
          
          <div class="my-6 bg-neutral-800/80 p-4 rounded-2xl w-full border border-neutral-700 max-w-[280px]">
            <span class="text-xs font-bold block text-neutral-400 mb-2">획득 등급 확률 정보</span>
            <div class="grid grid-cols-3 gap-2 text-[10px]">
              ${Object.entries(odds).map(([g, o]) => `
                <div class="bg-neutral-900 rounded-lg p-1.5 border border-neutral-700">
                  <span class="font-bold">${g}등급</span> : <span class="text-pink-400 font-mono">${o}%</span>
                </div>
              `).join('')}
            </div>
          </div>

          <div class="w-full max-w-[280px]">
            <div class="text-xs text-yellow-300 mb-2">내 계좌 잔고: ${formatMoney(AppState.user.balance)}원</div>
            <button onclick="handleGacha('${name}', ${price}, ${JSON.stringify(odds).replace(/"/g, '&quot;')})" class="w-full ${themeClass} hover:brightness-110 active:scale-95 transition-all text-white font-black py-4 rounded-2xl shadow-lg text-sm">
              ${formatMoney(price)}원 결제하고 뽑기
            </button>
          </div>
        </div>
      `;
    }

    function handleGacha(appName, cost, odds) {
      if (AppState.user.balance < cost) {
        return alert("돈이 부족합니다! 중고나라에 소지품을 판매해보세요.");
      }
      
      AppState.user.balance -= cost;
      updateUIBalance();

      const rand = Math.random() * 100;
      let sum = 0;
      let selectedGrade = 'C';

      for (let [g, rate] of Object.entries(odds)) {
        sum += rate;
        if (rand <= sum) {
          selectedGrade = g;
          break;
        }
      }

      const candidateItems = Object.values(ITEM_DATABASE).filter(i => i.grade === selectedGrade);
      const randomItem = candidateItems.length > 0 
        ? candidateItems[Math.floor(Math.random() * candidateItems.length)]
        : ITEM_DATABASE['hair_c_black'];

      const newInst = spawnItem(randomItem.id);
      triggerGachaResultModal(randomItem, newInst);
      openApp(appName === '에이블리' ? 'ably' : appName === '무신사' ? 'musinsa' : 'kream');
    }

    // --- 📌 [신규 추가] 가챠 결과 가상 아바타 실루엣 렌더링 엔진 ---

      let accessoryHtml = '';
      let bagHtml = '';

        topHtml = itemData.render();
      } else if (itemData.category === 'bottom') {
        bottomHtml = itemData.render();
      } else if (itemData.category === 'dress') {
        dressHtml = itemData.render();
      } else if (itemData.category === 'shoes') {
        shoesHtml = itemData.render();
      } else if (itemData.category === 'accessory') {
        accessoryHtml = itemData.render();
      } else if (itemData.category === 'bag') {
        bagHtml = itemData.render();
      }

      return `
        <div class="relative w-[180px] h-[280px] scale-[0.55] origin-center -my-14 pointer-events-none">
          ${hairBackHtml}
          <div class="absolute inset-0 opacity-20">
            <div class="absolute top-[40px] left-[40px] w-[100px] h-[100px] bg-neutral-400 rounded-full"></div>

            <div class="absolute top-[194px] left-[72px] w-[14px] h-[50px] bg-neutral-400 rounded-b-full"></div>
            <div class="absolute top-[194px] left-[94px] w-[14px] h-[50px] bg-neutral-400 rounded-b-full"></div>
          </div>
          ${shoesHtml}
          ${bottomHtml}
          ${topHtml}
          ${dressHtml}
          ${hairFrontHtml}
          ${accessoryHtml}
          ${bagHtml}
        </div>
      `;
    }

    function triggerGachaResultModal(itemData, inst) {
      const modal = document.getElementById('gacha-result-modal');
      const card = document.getElementById('gacha-card');
      const preview = document.getElementById('gacha-item-preview');
      const nameTxt = document.getElementById('gacha-item-name');
      const gradeTxt = document.getElementById('gacha-item-grade');
      const priceTxt = document.getElementById('gacha-item-price');

      const gradeColor = GRADE_COLORS[itemData.grade];
      gradeTxt.className = `px-3 py-1 rounded-full text-xs font-black text-white mr-1 ${gradeColor.bg}`;
      gradeTxt.innerText = itemData.grade + " GRADE";

      nameTxt.innerText = itemData.name;
      priceTxt.innerText = formatMoney(itemData.basePrice);

      // 실루엣 뷰어 출력
      preview.innerHTML = renderPreviewAvatar(itemData.id);

      modal.classList.remove('hidden');
      setTimeout(() => {
        card.classList.replace('scale-90', 'scale-100');
      }, 50);
    }

    function closeGachaResult() {
      const modal = document.getElementById('gacha-result-modal');
      const card = document.getElementById('gacha-card');
      card.classList.replace('scale-100', 'scale-90');
      modal.classList.add('hidden');
    }

    // --- 8. 중고나라 경제 시스템 및 1초 변동 알고리즘 (Random Walk) ---
    function runMarketTicker() {
      const banner = document.getElementById('ticker-banner');
      const itemKeys = Object.keys(ITEM_DATABASE);
      const pickedKey = itemKeys[Math.floor(Math.random() * itemKeys.length)];
      
      for (let key in AppState.marketPrices) {
        const itemData = ITEM_DATABASE[key];
        const oldPrice = AppState.marketPrices[key].current;
        
        const r = (Math.random() * 0.3) - 0.15;
        let newPrice = oldPrice * (1 + r);

        const minPrice = itemData.basePrice * 0.4;
        const maxPrice = itemData.basePrice * 2.5;

        if (newPrice < minPrice) newPrice = minPrice;
        if (newPrice > maxPrice) newPrice = maxPrice;

        AppState.marketPrices[key].current = Math.round(newPrice);
        AppState.marketPrices[key].change = Math.round(newPrice - oldPrice);
        AppState.marketPrices[key].trend = newPrice >= oldPrice ? 'up' : 'down';
      }

      const tickerData = AppState.marketPrices[pickedKey];
      const tickerItem = ITEM_DATABASE[pickedKey];
      document.getElementById('ticker-item-name').innerText = `📈 [시세변동] ${tickerItem.name}`;
      document.getElementById('ticker-item-price').innerHTML = `
        ${formatMoney(tickerData.current)}원 
        <span class="${tickerData.trend === 'up' ? 'text-red-400' : 'text-blue-400'}">
          ${tickerData.trend === 'up' ? '▲' : '▼'}${formatMoney(Math.abs(tickerData.change))}
        </span>
      `;
      banner.classList.replace('opacity-0', 'opacity-100');
      
      const appContainer = document.getElementById('phone-app-container');
      const appTitle = document.getElementById('app-title');
      if (!appContainer.classList.contains('hidden') && appTitle.innerText.includes('중고나라')) {
        renderJoonggoApp();
      }
    }

    function renderJoonggoApp() {
      const body = document.getElementById('app-body');
      body.innerHTML = '';

      const items = AppState.user.inventory;
      if (items.length === 0) {
        body.innerHTML = `<div class="text-center py-20 text-xs text-neutral-500">인벤토리에 옷이 없네요...</div>`;
        return;
      }

      const wrapper = document.createElement('div');
      wrapper.className = "space-y-3";

      items.forEach(inst => {
        const item = ITEM_DATABASE[inst.id];
        const mData = AppState.marketPrices[inst.id];
        const isEquipped = checkEquipped(inst.instanceId);
        const gradeStyle = GRADE_COLORS[item.grade];

        const row = document.createElement('div');
        row.className = "bg-neutral-800 p-3 rounded-xl border border-neutral-700 flex justify-between items-center";
        
        row.innerHTML = `
          <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-neutral-900 rounded-lg flex items-center justify-center text-xl relative">
              <span class="absolute top-0.5 right-0.5 text-[6px] ${gradeStyle.text}">${item.grade}</span>
              ${item.category === 'hair' ? '💇' : item.category === 'top' ? '👕' : item.category === 'bottom' ? '👖' : item.category === 'dress' ? '👗' : item.category === 'shoes' ? '👟' : '🎁'}
            </div>
            <div>
              <div class="text-xs font-bold text-white flex items-center">
                ${item.name}
                ${isEquipped ? '<span class="ml-1 bg-pink-600 text-[8px] px-1 rounded">착용중</span>' : ''}
              </div>
              <div class="text-[10px] text-neutral-400 font-mono">구매가: ${formatMoney(inst.purchasePrice)}원</div>
            </div>
          </div>
          <div class="text-right flex items-center space-x-3">
            <div>
              <div class="text-xs font-black text-amber-300 font-mono">${formatMoney(mData.current)}원</div>
              <div class="text-[9px] font-bold ${mData.trend === 'up' ? 'text-red-400' : 'text-blue-400'} font-mono">
                ${mData.trend === 'up' ? '▲' : '▼'} ${formatMoney(Math.abs(mData.change))}
              </div>
            </div>
            <button onclick="handleSellItem('${inst.instanceId}')" class="bg-orange-500 hover:bg-orange-600 text-white font-bold text-xs px-3 py-2 rounded-lg transition-transform active:scale-95">
              판매
            </button>
          </div>
        `;
        wrapper.appendChild(row);
      });

      body.appendChild(wrapper);
    }

    function handleSellItem(instanceId) {
      const idx = AppState.user.inventory.findIndex(i => i.instanceId === instanceId);
      if (idx === -1) return;

      const inst = AppState.user.inventory[idx];
      const mData = AppState.marketPrices[inst.id];
      const itemData = ITEM_DATABASE[inst.id];

      AppState.user.balance += mData.current;
      
      if (checkEquipped(instanceId)) {
        unequipItem(itemData.category);
      }

      AppState.user.inventory.splice(idx, 1);
      updateUIBalance();
      renderJoonggoApp();
    }
  </script>
</body>
