<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 드레스룸 & 마켓 게임</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Jua', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: #ffe3ec;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 사진의 스마트폰 UI 비율과 라운딩 디테일 반영 */
        .phone-container {
            width: 420px;
            height: 860px;
            background: #ffffff;
            border: 12px solid #ffb6c1;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(255, 182, 193, 0.5);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 상단 네비게이션 및 재화 정보 바 */
        .top-header {
            background: #ffffff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed #ffc0cb;
        }

        .game-title {
            color: #ff69b4;
            font-size: 1.3rem;
        }

        .currency-badge {
            background: #fff0f5;
            border: 2px solid #ff69b4;
            padding: 5px 12px;
            border-radius: 20px;
            color: #ff1493;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* 메인 가변 스크린 */
        .content-body {
            flex: 1;
            overflow-y: auto;
            background: linear-gradient(to bottom, #ffffff, #fff0f5);
            padding: 15px;
            position: relative;
        }

        .screen-view {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }

        .screen-view.active {
            display: flex;
        }

        /* --- 로그인 및 회원가입 화면 양식 --- */
        .auth-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 20px;
        }

        .auth-logo {
            font-size: 3.5rem;
            margin-bottom: 15px;
        }

        .auth-box {
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #ffb6c1;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .auth-title {
            color: #ff69b4;
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.4rem;
        }

        .input-field {
            width: 100%;
            padding: 10px 15px;
            margin-bottom: 10px;
            border: 2px solid #ffe4e1;
            border-radius: 12px;
            outline: none;
            font-size: 0.95rem;
        }

        .input-field:focus {
            border-color: #ff69b4;
        }

        .auth-btn-group {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .btn-auth {
            flex: 1;
            background: #ff69b4;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
        }

        .btn-auth.secondary {
            background: #ffb6c1;
        }

        /* --- 1. 옷장 (드레스룸) 스크린 --- */
        .avatar-canvas-area {
            width: 100%;
            height: 360px;
            background: #fff;
            border: 3px solid #ffe4e1;
            border-radius: 24px;
            position: relative;
            box-shadow: 0 8px 16px rgba(255, 182, 193, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 목분리 현상 해결: 절대적 묶음 골격 구조 설계 */
        .avatar-model {
            width: 200px;
            height: 320px;
            position: relative;
        }

        /* 몸체 고정 */
        .model-body {
            width: 54px;
            height: 120px;
            background: #ffe4e1;
            position: absolute;
            left: 73px;
            top: 135px;
            border-radius: 20px;
            border: 2px solid #ffc0cb;
            z-index: 2;
        }

        /* 목 고정: 몸과 얼굴의 유기적 겹침을 고정하여 절대 분리 안됨 */
        .model-neck {
            width: 18px;
            height: 30px;
            background: #ffe4e1;
            position: absolute;
            left: 91px;
            top: 115px;
            border-left: 2px solid #ffc0cb;
            border-right: 2px solid #ffc0cb;
            z-index: 3;
        }

        /* 얼굴 고정 */
        .model-head {
            width: 100px;
            height: 96px;
            background: #ffe4e1;
            position: absolute;
            left: 50px;
            top: 30px;
            border-radius: 50%;
            border: 2px solid #ffc0cb;
            z-index: 4;
        }

        .model-eyes {
            width: 14px;
            height: 18px;
            background: #5c3a21;
            position: absolute;
            border-radius: 50%;
            top: 45px;
        }
        .model-eyes.left { left: 25px; }
        .model-eyes.right { right: 59px; }
        .model-mouth {
            width: 12px;
            height: 8px;
            background: #ff69b4;
            position: absolute;
            left: 44px;
            top: 70px;
            border-radius: 0 0 10px 10px;
        }

        /* 옷장 파츠 오버레이 레이어 */
        .layer-hair { position: absolute; width: 160px; height: 160px; left: 20px; top: 0px; z-index: 5; pointer-events: none; }
        .layer-dress { position: absolute; width: 140px; height: 160px; left: 30px; top: 115px; z-index: 6; pointer-events: none; }
        .layer-acc { position: absolute; width: 120px; height: 120px; left: 40px; top: 5px; z-index: 7; pointer-events: none; }

        /* 카테고리 탭 (사진의 UI 감성 반영) */
        .category-tabs {
            display: flex;
            gap: 6px;
            margin: 15px 0 10px 0;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #ffe4e1;
            border: none;
            border-radius: 12px;
            color: #db7093;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #ff69b4;
            color: white;
        }

        .item-grid-scroll {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            overflow-y: auto;
        }

        .item-card {
            background: #ffffff;
            border: 2px solid #ffe4e1;
            border-radius: 16px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .item-card.active {
            border-color: #ff69b4;
            background: #fff0f5;
        }

        .item-thumb { font-size: 2.2rem; height: 48px; display: flex; align-items: center; }
        .item-name { font-size: 0.8rem; color: #555; margin-top: 4px; text-align: center; }

        /* --- 2. 뽑기 스크린 --- */
        .gacha-container {
            text-align: center;
            padding: 20px 10px;
        }

        .gacha-machine {
            font-size: 6rem;
            margin: 20px 0;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .btn-gacha-trigger {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
        }

        /* --- 3. 중고 마켓 및 실시간 변동 가격 스크린 --- */
        .market-header-alert {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 12px;
        }

        .market-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        .market-card {
            background: white;
            border: 2px solid #ffe4e1;
            border-radius: 16px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .market-item-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .price-trend {
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: bold;
        }
        .trend-up { background: #fde8e8; color: #e53e3e; }
        .trend-down { background: #ebf8ff; color: #3182ce; }

        .btn-market-action {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
        }
        .btn-market-action.sell {
            background: #4caf50;
        }

        /* --- 4. 도감 스크린 --- */
        .collection-summary {
            background: #e3f2fd;
            border: 2px solid #90caf9;
            padding: 12px;
            border-radius: 16px;
            color: #1565c0;
            text-align: center;
            margin-bottom: 15px;
        }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .collection-slot {
            background: #ffffff;
            border: 2px dashed #ccc;
            border-radius: 12px;
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            position: relative;
            opacity: 0.3;
        }

        .collection-slot.unlocked {
            border: 2px solid #ff69b4;
            background: #fff0f5;
            opacity: 1;
        }

        /* 하단 고정 탭바 내비게이션 */
        .bottom-nav-bar {
            height: 70px;
            background: #ffffff;
            border-top: 2px solid #ffe4e1;
            display: flex;
        }

        .nav-item-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: none;
            border: none;
            cursor: pointer;
            color: #888;
            gap: 2px;
        }

        .nav-item-btn.active {
            color: #ff69b4;
            background: #fff5f7;
        }

        .nav-item-btn .icon { font-size: 1.3rem; }
        .nav-item-btn .label { font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="phone-container">
    
    <div class="top-header">
        <div class="game-title">💖 쁘띠 드레스룸</div>
        <div class="currency-badge">💰 <span id="global-gold">1,500</span></div>
    </div>

    <div class="content-body">
        
        <div id="view-auth" class="screen-view active">
            <div class="auth-container">
                <div class="auth-logo">✨👗✨</div>
                <div class="auth-box" id="auth-box-login">
                    <div class="auth-title">로그인</div>
                    <input type="text" id="login-id" class="input-field" placeholder="아이디 입력">
                    <input type="password" id="login-pw" class="input-field" placeholder="비밀번호 입력">
                    <div class="auth-btn-group">
                        <button class="btn-auth" onclick="tryLogin()">로그인</button>
                        <button class="btn-auth secondary" onclick="toggleAuthMode('join')">회원가입 이동</button>
                    </div>
                </div>
                
                <div class="auth-box" id="auth-box-join" style="display: none;">
                    <div class="auth-title">회원가입</div>
                    <input type="text" id="join-id" class="input-field" placeholder="새 아이디 입력">
                    <input type="password" id="join-pw" class="input-field" placeholder="새 비밀번호 입력">
                    <div class="auth-btn-group">
                        <button class="btn-auth" onclick="tryRegister()">가입완료</button>
                        <button class="btn-auth secondary" onclick="toggleAuthMode('login')">로그인 이동</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-closet" class="screen-view">
            <div class="avatar-canvas-area">
                <div class="avatar-model">
                    <div class="model-body"></div>
                    <div class="model-neck"></div>
                    <div class="model-head">
                        <div class="model-eyes left"></div>
                        <div class="model-eyes right"></div>
                        <div class="model-mouth"></div>
                    </div>
                    
                    <div class="layer-hair" id="layer-hair"></div>
                    <div class="layer-dress" id="layer-dress"></div>
                    <div class="layer-acc" id="layer-acc"></div>
                </div>
            </div>

            <div class="category-tabs">
                <button class="tab-btn active" onclick="switchCategory('hair', this)">헤어</button>
                <button class="tab-btn" onclick="switchCategory('dress', this)">의상</button>
                <button class="tab-btn" onclick="switchCategory('acc', this)">소품</button>
            </div>

            <div class="item-grid-scroll" id="closet-grid-box">
                </div>
        </div>

        <div id="view-gacha" class="screen-view">
            <div class="gacha-container">
                <h2 style="color:#ff69b4;">🎁 랜덤 캡슐 의상 뽑기</h2>
                <p style="font-size:0.85rem; color:#666; margin-top:5px;">1회 뽑기당 💰 600 골드가 소모됩니다.</p>
                <div class="gacha-machine">🕹️</div>
                <button class="btn-gacha-trigger" onclick="executeGachaCapsule()">캡슐 뽑기</button>
            </div>
        </div>

        <div id="view-market" class="screen-view">
            <div class="market-header-alert">
                📊 안내: 시장 의상 가격이 3초마다 실시간으로 변동합니다!
            </div>
            <h3 style="color:#ff69b4; margin-bottom:10px;">🛍️ 실시간 중고 마켓 거래소</h3>
            <div class="market-list" id="market-list-box">
                </div>
        </div>

        <div id="view-collection" class="screen-view">
            <div class="collection-summary">
                📜 의상 도감 수집률: <span id="collect-ratio-text">0 / 12</span>
            </div>
            <div class="collection-grid" id="collection-grid-box">
                </div>
        </div>

    </div>

    <div class="bottom-nav-bar" id="game-nav-bar" style="display: none;">
        <button class="nav-item-btn active" id="nav-closet" onclick="switchScreen('closet')">
            <span class="icon">👗</span><span class="label">옷장</span>
        </button>
        <button class="nav-item-btn" id="nav-gacha" onclick="switchScreen('gacha')">
            <span class="icon">🎁</span><span class="label">뽑기</span>
        </button>
        <button class="nav-item-btn" id="nav-market" onclick="switchScreen('market')">
            <span class="icon">🛍️</span><span class="label">중고마켓</span>
        </button>
        <button class="nav-item-btn" id="nav-collection" onclick="switchScreen('collection')">
            <span class="icon">📜</span><span class="label">도감</span>
        </button>
    </div>

</div>

<script>
    // --- 시스템 전체 의상 데이터 명세 베이스 모델 ---
    const POOL_ITEMS = {
        hair: [
            { id: 'h1', name: '트윈 리본 헤어', thumb: '🎀', basePrice: 500, style: 'font-size:4.2rem; color:#ff69b4;' },
            { id: 'h2', name: '금빛 포니테일', thumb: '👱‍♀️', basePrice: 1200, style: 'font-size:4.2rem; color:#ffd700;' },
            { id: 'h3', name: '단발 웨이브 헤어', thumb: '💇‍♀️', basePrice: 2000, style: 'font-size:4.2rem; color:#8b4513;' },
            { id: 'h4', name: '사이버 네온 헤어', thumb: '🧬', basePrice: 4500, style: 'font-size:4.2rem; color:#00ffcc;' }
        ],
        dress: [
            { id: 'd1', name: '데일리 스커트', thumb: '👗', basePrice: 700, style: 'font-size:6rem; color:#ffb6c1;' },
            { id: 'd2', name: '블루밍 롱 드레스', thumb: '💙', basePrice: 1600, style: 'font-size:6rem; color:#2196f3;' },
            { id: 'd3', name: '정열의 이브닝 퀸', thumb: '💃', basePrice: 3200, style: 'font-size:6rem; color:#e53e3e;' },
            { id: 'd4', name: '프레시 멜론 슈트', thumb: '🟢', basePrice: 6000, style: 'font-size:6rem; color:#4caf50;' }
        ],
        acc: [
            { id: 'a1', name: '체리 귀걸이 파츠', thumb: '🍒', basePrice: 300, style: 'font-size:2rem;' },
            { id: 'a2', name: '엔젤 버터 플라이', thumb: '👼', basePrice: 900, style: 'font-size:3.5rem;' },
            { id: 'a3', name: '루미너스 매직봉', thumb: '🪄', basePrice: 2400, style: 'font-size:3.5rem;' },
            { id: 'a4', name: '로열 골드 크라운', thumb: '👑', basePrice: 5500, style: 'font-size:3.5rem;' }
        ]
    };

    // --- 가변 시세 시장 가격 저장소 객체 ---
    let MARKET_PRICES = {};
    let MARKET_TRENDS = {}; // 'up' or 'down'

    // --- 유저 데이터 인메모리 관리 스토어 ---
    let appState = {
        registeredUsers: {}, // 로컬 회원가입용 { id: pw } 계정 스토리지
        currentUser: null,
        gold: 1500,
        ownedItems: ['h1', 'd1', 'a1'], // 가입 시 기본 획득 아이템 목록
        equipped: { hair: 'h1', dress: 'd1', acc: 'a1' }
    };

    let activeCategory = 'hair';

    window.onload = function() {
        initMarketPrices();
        loadSystemData();
        updateGoldInterface();
        
        // 가격 변동 3초 주기 트리거 구동
        setInterval(fluctuatePrices, 3000);
    };

    function saveSystemData() {
        localStorage.setItem('DRESSROOM_ACCOUNT_STORAGE_2026', JSON.stringify(appState));
    }

    function loadSystemData() {
        const stored = localStorage.getItem('DRESSROOM_ACCOUNT_STORAGE_2026');
        if(stored) {
            try {
                const parsed = JSON.parse(stored);
                appState.registeredUsers = parsed.registeredUsers || {};
                // 로그인 유지 처리는 하지 않고 항상 처음엔 로그인 화면이 뜨도록 명시
            } catch(e) {
                console.error(e);
            }
        }
    }

    // --- 회원가입 및 로그인 비즈니스 폼 제어 로직 ---
    function toggleAuthMode(mode) {
        if(mode === 'join') {
            document.getElementById('auth-box-login').style.display = 'none';
            document.getElementById('auth-box-join').style.display = 'block';
        } else {
            document.getElementById('auth-box-login').style.display = 'block';
            document.getElementById('auth-box-join').style.display = 'none';
        }
    }

    function tryRegister() {
        const id = document.getElementById('join-id').value.trim();
        const pw = document.getElementById('join-pw').value.trim();

        if(!id || !pw) {
            alert('가입할 아이디와 비밀번호를 빠짐없이 입력하세요.');
            return;
        }
        if(appState.registeredUsers[id]) {
            alert('이미 존재하는 아이디입니다.');
            return;
        }

        appState.registeredUsers[id] = pw;
        saveSystemData();
        alert('회원가입이 완료되었습니다! 로그인해 주세요.');
        toggleAuthMode('login');
        
        document.getElementById('join-id').value = '';
        document.getElementById('join-pw').value = '';
    }

    function tryLogin() {
        const id = document.getElementById('login-id').value.trim();
        const pw = document.getElementById('login-pw').value.trim();

        if(!appState.registeredUsers[id] || appState.registeredUsers[id] !== pw) {
            alert('아이디 또는 비밀번호가 일치하지 않습니다.');
            return;
        }

        // 로그인 인증 인가 승인 성공
        appState.currentUser = id;
        document.getElementById('view-auth').classList.remove('active');
        document.getElementById('game-nav-bar').style.display = 'flex';
        
        switchScreen('closet');
    }

    function updateGoldInterface() {
        document.getElementById('global-gold').innerText = appState.gold.toLocaleString();
    }

    // --- 스크린 라우터 내비게이션 ---
    function switchScreen(viewId) {
        if(!appState.currentUser) return;

        document.querySelectorAll('.screen-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item-btn').forEach(b => b.classList.remove('active'));

        document.getElementById(`view-${viewId}`).classList.add('active');
        document.getElementById(`nav-${viewId}`).classList.add('active');

        if(viewId === 'closet') renderClosetGrid();
        if(viewId === 'market') renderMarketList();
        if(viewId === 'collection') renderCollectionGrid();
    }

    function switchCategory(cat, element) {
        document.querySelectorAll('.category-tabs .tab-btn').forEach(b => b.classList.remove('active'));
        element.classList.add('active');
        activeCategory = cat;
        renderClosetGrid();
    }

    // --- 옷장 코디 시스템 그리드 빌더 ---
    function renderClosetGrid() {
        const box = document.getElementById('closet-grid-box');
        box.innerHTML = '';

        POOL_ITEMS[activeCategory].forEach(item => {
            const isOwned = appState.ownedItems.includes(item.id);
            if(!isOwned) return; // 옷장에는 소유한 아이템만 출력

            const isEquipped = appState.equipped[activeCategory] === item.id;
            const card = document.createElement('div');
            card.className = `item-card ${isEquipped ? 'active' : ''}`;
            card.innerHTML = `
                <div class="item-thumb">${item.thumb}</div>
                <div class="item-name">${item.name}</div>
            `;
            
            card.onclick = () => {
                appState.equipped[activeCategory] = item.id;
                saveSystemData();
                renderClosetGrid();
                applyAvatarVisualLayers();
            };

            box.appendChild(card);
        });
        applyAvatarVisualLayers();
    }

    function applyAvatarVisualLayers() {
        ['hair', 'dress', 'acc'].forEach(cat => {
            const eqId = appState.equipped[cat];
            const item = POOL_ITEMS[cat].find(i => i.id === eqId);
            const layer = document.getElementById(`layer-${cat}`);
            
            if(item) {
                layer.innerHTML = `<div style="${item.style}; display:flex; justify-content:center; align-items:center; width:100%; height:100%;">${item.thumb}</div>`;
            } else {
                layer.innerHTML = '';
            }
        });
    }

    // --- 가챠 뽑기 시스템 엔진 ---
    function executeGachaCapsule() {
        const GACHA_COST = 600;
        if(appState.gold < GACHA_COST) {
            alert('골드가 부족합니다! 마켓 거래를 통해 시세 차익으로 돈을 벌어보세요.');
            return;
        }

        appState.gold -= GACHA_COST;
        updateGoldInterface();

        // 전체 아이템 풀 일원화 병합
        let allItems = [];
        ['hair', 'dress', 'acc'].forEach(cat => {
            POOL_ITEMS[cat].forEach(i => allItems.push(i));
        });

        // 완전 균등 무작위 추첨 추출
        const rolledItem = allItems[Math.floor(Math.random() * allItems.length)];

        if(!appState.ownedItems.includes(rolledItem.id)) {
            appState.ownedItems.push(rolledItem.id);
        }
        
        saveSystemData();
        alert(`🎉 캡슐 오픈 결과!\n[ ${rolledItem.name} ] 의상을 획득했습니다! 도감 및 옷장을 확인하세요.`);
    }

    // --- [중요] 실시간 변동 가격 주식형 중고 마켓 엔진 ---
    function initMarketPrices() {
        ['hair', 'dress', 'acc'].forEach(cat => {
            POOL_ITEMS[cat].forEach(item => {
                MARKET_PRICES[item.id] = item.basePrice;
                MARKET_TRENDS[item.id] = 'up';
            });
        });
    }

    function fluctuatePrices() {
        ['hair', 'dress', 'acc'].forEach(cat => {
            POOL_ITEMS[cat].forEach(item => {
                // 등락폭 결정 알고리즘 (-20% ~ +25% 내외 무작위 가중치 반영)
                const changePercent = (Math.random() * 45 - 20) / 100;
                let newPrice = Math.round(MARKET_PRICES[item.id] * (1 + changePercent));
                
                // 최저 안전선 방어 및 최고가 제한 방어
                if(newPrice < 150) newPrice = 150;
                if(newPrice > 15000) newPrice = 15000;

                MARKET_TRENDS[item.id] = newPrice >= MARKET_PRICES[item.id] ? 'up' : 'down';
                MARKET_PRICES[item.id] = newPrice;
            });
        });

        // 마켓 스크린 활성화 상태일 경우 DOM 리프레시 동기화
        if(document.getElementById('view-market').classList.contains('active')) {
            renderMarketList();
        }
    }

    function renderMarketList() {
        const list = document.getElementById('market-list-box');
        list.innerHTML = '';

        ['hair', 'dress', 'acc'].forEach(cat => {
            POOL_ITEMS[cat].forEach(item => {
                const isOwned = appState.ownedItems.includes(item.id);
                const currentPrice = MARKET_PRICES[item.id];
                const trend = MARKET_TRENDS[item.id];

                const card = document.createElement('div');
                card.className = 'market-card';

                card.innerHTML = `
                    <div class="market-item-info">
                        <span style="font-size:2rem;">${item.thumb}</span>
                        <div>
                            <div style="font-size:0.9rem; font-weight:bold;">${item.name}</div>
                            <div style="font-size:0.85rem; color:#ff1493; margin-top:2px;">
                                💰 ${currentPrice.toLocaleString()} 
                                <span class="price-trend ${trend === 'up' ? 'trend-up' : 'trend-down'}">
                                    ${trend === 'up' ? '▲ 상승' : '▼ 하락'}
                                </span>
                            </div>
                        </div>
                    </div>
                    <div>
                        ${isOwned ? 
                            `<button class="btn-market-action sell" onclick="sellMarketItem('${item.id}', ${currentPrice}, '${cat}')">중고판매</button>` : 
                            `<button class="btn-market-action" onclick="buyMarketItem('${item.id}', ${currentPrice})">중고구매</button>`
                        }
                    </div>
                `;
                list.appendChild(card);
            });
        });
    }

    function buyMarketItem(itemId, price) {
        if(appState.gold < price) {
            alert('보유 골드가 매입하려는 가격보다 부족합니다.');
            return;
        }
        appState.gold -= price;
        appState.ownedItems.push(itemId);
        
        saveSystemData();
        updateGoldInterface();
        renderMarketList();
        alert('중고 거래 구매 성공! 옷장에 입고되었습니다.');
    }

    function sellMarketItem(itemId, price, cat) {
        // 기본 시작 템 단 한 개만 갖고 있을 때는 판매 금지 안전장치 예외 조치
        if(appState.ownedItems.length <= 1) {
            alert('최소 1개 이상의 의상을 보유해야 판매할 수 있습니다.');
            return;
        }

        // 현재 착용 중인 옷이면 탈의 처리 후 판매 진행
        if(appState.equipped[cat] === itemId) {
            appState.equipped[cat] = null;
        }

        appState.gold += price;
        appState.ownedItems = appState.ownedItems.filter(id => id !== itemId);

        saveSystemData();
        updateGoldInterface();
        renderMarketList();
        alert(`의상을 성공적으로 중고 마켓에 정리하고 💰 ${price.toLocaleString()} 골드를 정산받았습니다.`);
    }

    // --- 도감(Collection) 아카이브 그리드 시스템 ---
    function renderCollectionGrid() {
        const grid = document.getElementById('collection-grid-box');
        const ratioText = document.getElementById('collect-ratio-text');
        grid.innerHTML = '';

        let total = 0;
        let owned = 0;

        ['hair', 'dress', 'acc'].forEach(cat => {
            POOL_ITEMS[cat].forEach(item => {
                total++;
                const hasIt = appState.ownedItems.includes(item.id);
                if(hasIt) owned++;

                const slot = document.createElement('div');
                slot.className = `collection-slot ${hasIt ? 'unlocked' : ''}`;
                slot.innerHTML = hasIt ? `<div>${item.thumb}</div>` : `<div>❓</div>`;
                
                grid.appendChild(slot);
            });
        });

        ratioText.innerText = `${owned} / ${total} (${Math.round((owned/total)*100)}%)`;
    }
</script>

</body>
</html>
