<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium OOTD Room</title>
    <style>
        :root {
            --bg-base: #fdf8f5;
            --card-bg: #ffffff;
            --accent-soft: #ff6b8b;
            --accent-hover: #e04d70;
            --text-dark: #2d3748;
            --text-muted: #718096;
            --border-soft: #edf2f7;

            --color-sss: #ff0055;
            --color-ss: #ff9900;
            --color-s: #a855f7;
            --color-a: #3b82f6;
            --color-b: #10b981;
            --color-c: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        body { background-color: #f0e5de; color: var(--text-dark); display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .app-container {
            width: 420px;
            height: 840px;
            background: var(--bg-base);
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            border: 8px solid #ffffff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; padding: 20px; flex-direction: column; }
        .screen.active { display: flex; }

        button {
            background: var(--accent-soft); color: white; border: none; padding: 12px 20px; border-radius: 20px;
            font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(255, 107, 139, 0.2);
        }
        button:hover { background: var(--accent-hover); transform: translateY(-1px); }
        input { background: #ffffff; border: 1.5px solid #cbd5e1; padding: 12px; border-radius: 16px; margin-bottom: 10px; outline: none; }
        input:focus { border-color: var(--accent-soft); }

        #screen-login { justify-content: center; background: linear-gradient(180deg, #fff5f6 0%, #ffe3e7 100%); }
        .brand-logo { text-align: center; margin-bottom: 40px; }
        .brand-logo h1 { font-size: 2.2rem; font-weight: 900; color: #ff4d6d; }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1.5px solid var(--border-soft); padding-bottom: 12px; }
        .balance-tag { background: #fffbeb; padding: 6px 14px; border-radius: 16px; font-weight: 800; color: #b45309; font-size: 0.85rem; }

        .character-view {
            flex: 1; position: relative; display: flex; justify-content: center; align-items: center;
            background: #ffffff; margin: 12px 0; border-radius: 28px; border: 1.5px solid #ffe3e7; overflow: hidden;
        }
        .canvas-container { position: relative; width: 280px; height: 420px; }
        .layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; justify-content: center; align-items: center; }
        .layer svg { width: 100%; height: 100%; }

        .main-controls { display: flex; gap: 10px; }
        .main-controls button { flex: 1; padding: 14px; border-radius: 20px; }

        .overlay-view {
            display: none; position: absolute; top: 60px; left: 0; width: 100%; height: calc(100% - 60px);
            background: var(--card-bg); z-index: 10; padding: 20px; flex-direction: column;
            border-top-left-radius: 28px; border-top-right-radius: 28px;
            box-shadow: 0 -8px 24px rgba(0,0,0,0.05); animation: slideUp 0.3s ease-out forwards;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .overlay-view.active { display: flex; }
        .overlay-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

        .item-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; overflow-y: auto; flex: 1; padding-bottom: 20px; }
        .item-card { background: #fffcfc; border: 1px solid #f7e6e8; border-radius: 18px; padding: 8px; text-align: center; cursor: pointer; position: relative; transition: all 0.2s; }
        .item-card.equipped { border: 2.5px solid var(--accent-soft); background: #fff0f3; }
        
        .item-grade-tag { position: absolute; top: 4px; left: 4px; font-size: 0.6rem; font-weight: 900; padding: 1px 5px; border-radius: 8px; color: #ffffff; }
        .item-preview-svg { width: 80px; height: 80px; margin: 6px auto; display: flex; justify-content: center; align-items: center; }

        .phone-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 10px; }
        .app-icon-btn {
            background: #ffffff; border: 1.5px solid #edf2f7; border-radius: 22px; padding: 18px;
            display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: all 0.2s;
        }
        .app-icon-btn:hover { transform: scale(1.03); box-shadow: 0 6px 15px rgba(0,0,0,0.05); }

        .used-list { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex: 1; }
        .used-item { display: flex; justify-content: space-between; align-items: center; background: #fffcfc; padding: 12px; border-radius: 18px; border: 1px solid #ffe3e7; }
        .price-up { color: #ef4444; font-weight: 900; }
        .price-down { color: #3b82f6; font-weight: 900; }
        
        .probability-info { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 14px; padding: 10px; margin-bottom: 15px; font-size: 0.75rem; max-height: 150px; overflow-y: auto; }
        .prob-row { display: flex; justify-content: space-between; margin-bottom: 4px; }

        .grade-SSS { color: var(--color-sss); font-weight: 900; }
        .grade-SS { color: var(--color-ss); font-weight: 900; }
        .grade-S { color: var(--color-s); font-weight: 900; }
        .grade-A { color: var(--color-a); font-weight: 700; }
        .grade-B { color: var(--color-b); font-weight: 700; }
        .grade-C { color: var(--color-c); }

        .grade-bg-SSS { background: var(--color-sss); }
        .grade-bg-SS { background: var(--color-ss); }
        .grade-bg-S { background: var(--color-s); }
        .grade-bg-A { background: var(--color-a); }
        .grade-bg-B { background: var(--color-b); }
        .grade-bg-C { background: var(--color-c); }

        .gacha-popup {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #ffffff; border: 3px solid var(--accent-soft); padding: 25px; border-radius: 28px;
            z-index: 100; text-align: center; width: 85%; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- 로그인 화면 -->
    <div id="screen-login" class="screen active">
        <div class="brand-logo">
            <h1>OOTD Atelier</h1>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 4px;">확률형 럭셔리 스타일 시뮬레이터</p>
        </div>
        <div class="auth-box" style="display:flex; flex-direction:column;">
            <input type="text" id="login-id" placeholder="아이디">
            <input type="password" id="login-pw" placeholder="비밀번호">
            <button onclick="handleLogin()" style="margin-bottom: 8px;">로그인</button>
            <button onclick="handleRegister()" style="background: #ffffff; border: 1.5px solid #cbd5e1; color: var(--text-muted); box-shadow: none;">회원가입</button>
        </div>
    </div>

    <!-- 성별 및 이름 프로필 설정 -->
    <div id="screen-setup" class="screen" style="background: #ffffff; justify-content: center;">
        <h2 style="font-size: 1.3rem; font-weight: 900; margin-bottom: 20px; text-align:center;">디자이너 셋업</h2>
        <input type="text" id="user-name" placeholder="닉네임을 입력하세요">
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button id="g-male" style="flex:1; background:#fff; border:2px solid #e2e8f0; color:#334155;" onclick="selectGender('male')">남자 캐릭터</button>
            <button id="g-female" style="flex:1; background:#fff; border:2px solid #e2e8f0; color:#334155;" onclick="selectGender('female')">여자 캐릭터</button>
        </div>
        <button onclick="completeSetup()" style="margin-top: 25px;">드레스룸 입장</button>
    </div>

    <!-- 메인 메인 보드 -->
    <div id="screen-main" class="screen">
        <div class="header">
            <div style="font-weight: 900; font-size: 1rem;"><span id="display-username" style="color:var(--accent-soft);">플레어</span>의 드레스룸</div>
            <div class="balance-tag">💎 <span id="user-money">100,000</span>원</div>
        </div>

        <!-- 눈코입이 완벽히 정교해진 인형 체형 아바타 로드 벨트 -->
        <div class="character-view">
            <div class="canvas-container">
                <div class="layer" id="layer-hair-back" style="z-index: 1;"></div>
                <div class="layer" id="layer-body" style="z-index: 2;"></div>
                <div class="layer" id="layer-socks" style="z-index: 3;"></div>
                <div class="layer" id="layer-shoes" style="z-index: 4;"></div>
                <div class="layer" id="layer-bottom" style="z-index: 5;"></div>
                <div class="layer" id="layer-top" style="z-index: 6;"></div>
                <div class="layer" id="layer-onepiece" style="z-index: 7;"></div>
                <div class="layer" id="layer-hair-front" style="z-index: 8;"></div>
                <div class="layer" id="layer-necklace" style="z-index: 9;"></div>
                <div class="layer" id="layer-earring" style="z-index: 10;"></div>
                <div class="layer" id="layer-hat" style="z-index: 11;"></div>
                <div class="layer" id="layer-bag" style="z-index: 12;"></div>
            </div>
        </div>

        <div class="main-controls">
            <button onclick="toggleOverlay('closet')" style="background: #475569; box-shadow: none;">🚪 옷장 열기</button>
            <button onclick="toggleOverlay('phone')">📱 핸드폰</button>
        </div>

        <!-- 옷장 모달 -->
        <div id="overlay-closet" class="overlay-view">
            <div class="overlay-header">
                <h3 style="font-weight:900;">MY WARDROBE</h3>
                <button onclick="toggleOverlay('closet')" style="background:#64748b; padding:4px 10px; font-size:0.8rem;">닫기</button>
            </div>
            <div class="item-grid" id="closet-grid"></div>
        </div>

        <!-- 핸드폰 메인 홈 화면 -->
        <div id="overlay-phone" class="overlay-view" style="background:#f8fafc;">
            <div class="overlay-header">
                <h3 style="color:#0f172a; font-weight:900;">SMART PHONE</h3>
                <button onclick="toggleOverlay('phone')" style="background:#ef4444; padding:4px 10px; font-size:0.8rem;">X</button>
            </div>
            <div class="phone-grid">
                <div class="app-icon-btn" onclick="openApp('ably')"><span style="font-size:2rem;">✨</span><span>에이블리</span></div>
                <div class="app-icon-btn" onclick="openApp('musinsa')"><span style="font-size:2rem;">🛹</span><span>무신사</span></div>
                <div class="app-icon-btn" onclick="openApp('kream')"><span style="font-size:2rem;">🔥</span><span>크림 (KREAM)</span></div>
                <div class="app-icon-btn" onclick="openApp('junggonara')" style="background:#f0fdf4; border-color:#bbf7d0;"><span style="font-size:2rem;">🤝</span><span style="color:#16a34a; font-weight:bold;">중고나라</span></div>
            </div>
        </div>

        <!-- 쇼핑 어플 가챠 상점 모달 -->
        <div id="overlay-shop" class="overlay-view" style="z-index:20;">
            <div class="overlay-header">
                <h3 id="shop-title" style="font-weight:900;">SHOP</h3>
                <button onclick="closeApp('shop')" style="background:#64748b; padding:4px 10px; font-size:0.8rem;">뒤로</button>
            </div>
            <div style="background:#fff5f6; padding:14px; border-radius:18px; text-align:center; margin-bottom:12px;">
                <p id="shop-desc" style="font-size:0.8rem; color:var(--text-muted);"></p>
                <h4 id="shop-cost" style="color:var(--accent-soft); font-size:1.25rem; font-weight:900; margin-top:4px;"></h4>
            </div>
            <h5 style="margin-bottom:4px; font-size:0.75rem;">확률 리스트</h5>
            <div class="probability-info" id="shop-prob-list"></div>
            <button onclick="triggerGacha()" style="width:100%; padding:14px; border-radius:20px;">아이템 뽑기</button>
        </div>

        <!-- 실시간 요동치는 중고나라 라이브 모달 -->
        <div id="overlay-junggo" class="overlay-view" style="z-index:20;">
            <div class="overlay-header">
                <h3 style="color:#16a34a; font-weight:900;">🤝 중고나라 실시간 시세</h3>
                <button onclick="closeApp('junggo')" style="background:#64748b; padding:4px 10px; font-size:0.8rem;">뒤로</button>
            </div>
            <p style="font-size:0.75rem; color:var(--text-muted); margin-bottom:10px;">
                ⚡ 0.8초마다 시세가 바뀝니다! 폭등 기회를 잡거나 파산을 회피하세요!
            </p>
            <div class="used-list" id="junggonara-list"></div>
        </div>

    </div>

    <!-- 획득 팝업 -->
    <div class="gacha-popup" id="gacha-popup">
        <h3 style="margin-bottom:6px; font-size:1.2rem; color:var(--accent-soft);">🎉 ITEM GET!</h3>
        <div id="gacha-result-name" style="font-size:1.1rem; font-weight:900; margin-bottom:4px;"></div>
        <div id="gacha-result-grade" style="font-size:1.2rem; margin-bottom:16px;"></div>
        <button onclick="closeGachaPopup()" style="width:100%;">옷장 확인</button>
    </div>

</div>

<script>
    /* ========================================================
       1. 레퍼런스 완벽 추종형 벡터 드로잉 패스 (스커트 라인/이중 헤어)
       ======================================================== */
    const VECTOR_DRAW = {
        'hair-back': (c) => `<path d="M 25,40 C 15,70 12,115 28,125 C 33,95 67,95 72,125 C 88,115 85,70 75,40 Z" fill="${c}" />`,
        'hair-front': (c) => `<path d="M 23,36 C 26,10 74,10 77,36 C 81,46 76,58 73,66 C 71,46 66,32 50,34 C 34,32 29,46 27,66 C 24,58 19,46 23,36 Z" fill="${c}" />`,
        
        'top': (c, grade) => {
            let add = (grade==="SSS" || grade==="SS") ? `<path d="M 36,74 L 50,86 L 64,74" stroke="#fff" stroke-width="2" fill="none"/><circle cx="50" cy="90" r="3" fill="#ffe3e7"/>` : '';
            return `<path d="M 26,64 L 74,64 L 70,104 L 30,104 Z" fill="${c}" /><path d="M 26,64 L 14,80 L 22,86 L 30,74 Z" fill="${c}" /><path d="M 74,64 L 86,80 L 78,86 L 70,74 Z" fill="${c}" />${add}`;
        },
        
        // 치마 가랑이 벌어짐 절대 없음 - 매끄럽고 부드러운 A라인 프릴 치마 완벽 구현
        'bottom': (c, grade) => {
            let core = `<path d="M 30,102 L 70,102 L 77,136 C 65,140 35,140 23,136 Z" fill="${c}" />`;
            if (grade === "SSS" || grade === "SS" || grade === "S") {
                core += `<path d="M 36,102 L 32,137 M 50,102 L 50,139 M 64,102 L 68,137" stroke="rgba(0,0,0,0.15)" stroke-width="1.5"/>`;
            }
            return core;
        },
        
        'onepiece': (c, grade) => {
            let decor = (grade === "SSS") ? `<path d="M 20,135 Q 35,141 50,135 Q 65,141 80,135 L 80,138 Q 65,144 50,138 Q 35,144 20,138 Z" fill="#ffffff" />` : '';
            return `<path d="M 26,64 L 74,64 L 79,105 L 82,138 L 18,138 L 21,105 Z" fill="${c}" />${decor}`;
        },
        
        'socks': (c) => `<path d="M 33,124 L 45,124 L 45,142 L 33,142 Z M 55,124 L 67,124 L 67,142 L 55,142 Z" fill="${c}" />`,
        'shoes': (c) => `<path d="M 30,140 Q 38,136 46,140 L 46,146 L 30,146 Z M 54,140 Q 62,136 70,140 L 70,146 L 54,146 Z" fill="${c}" /><rect x="32" y="145" width="12" height="2" fill="#1e293b"/><rect x="56" y="145" width="12" height="2" fill="#1e293b"/>`,
        'hat': (c) => `<path d="M 20,28 C 20,0 80,0 80,28 C 86,32 14,32 20,28 Z" fill="${c}" />`,
        'bag': (c) => `<path d="M 12,85 L 28,85 L 28,106 L 12,106 Z" fill="${c}" /><path d="M 20,60 C 4,60 8,85 12,85" stroke="#475569" stroke-width="2" fill="none"/>`,
        'necklace': (c) => `<path d="M 38,65 Q 50,78 62,65" stroke="${c}" stroke-width="2" fill="none" /><circle cx="50" cy="78" r="3.5" fill="#ff4d6d"/>`,
        'earring': (c) => `<circle cx="30" cy="46" r="3" fill="${c}" /><circle cx="70" cy="46" r="3" fill="${c}" />`
    };

    /* ========================================================
       2. 대규모 36종 분량의 고유 아이템 풀 데이터베이스 보충
       ======================================================== */
    const ITEM_DATABASE = {

            { id: "a1", name: "딸기 마카롱 리본 드레스", category: "onepiece", grade: "SSS", originalPrice: 280000, color: "#ffb3c6" },

            { id: "a4", name: "체리 블러썸 에이프런 스커트", category: "bottom", grade: "S", originalPrice: 75000, color: "#ffccd5" },
            { id: "a5", name: "엔젤 윙 셔링 블라우스", category: "top", grade: "A", originalPrice: 52000, color: "#fff0f3" },

            { id: "a9", name: "핑키 메리제인 구두", category: "shoes", grade: "B", originalPrice: 35000, color: "#ff4d6d" },
            { id: "a10", name: "피치 에이드 레이어 크롭", category: "top", grade: "C", originalPrice: 15000, color: "#ffb3c6" },

            { id: "m9", name: "테크니컬 웜업 카고 오버올 드레스", category: "onepiece", grade: "B", originalPrice: 95000, color: "#4a5568" },
            { id: "m10", name: "그레이 미니멀 베직 후드", category: "top", grade: "C", originalPrice: 28000, color: "#a0aec0" },

            { id: "m12", name: "데일리 베직 슬림 크루 삭스", category: "socks", grade: "C", originalPrice: 8000, color: "#e2e8f0" }
        ],
        kream: [
            { id: "k1", name: "다이아몬드 드롭 골드 이어링", category: "earring", grade: "SSS", originalPrice: 1500000, color: "#ffb703" },
            { id: "k2", name: "명품 벨벳 로즈 아틀리에 토트백", category: "bag", grade: "SS", originalPrice: 890000, color: "#6b0504" },
            { id: "k3", name: "프렌치 에메랄드 로열 보네 햇", category: "hat", grade: "S", originalPrice: 380000, color: "#005f73" },
            { id: "k4", name: "사토리얼 실크 트위드 롱 드레스", category: "onepiece", grade: "S", originalPrice: 420000, color: "#22223b" },
            { id: "k5", name: "스페셜 골디 클래식 링 체인", category: "necklace", grade: "A", originalPrice: 190000, color: "#d4af37" },
            { id: "k6", name: "럭셔리 옥스퍼드 플래티넘 로퍼", category: "shoes", grade: "A", originalPrice: 270000, color: "#1e1b4b" },
            { id: "k7", name: "모노그램 파우치 레이어 상의", category: "top", grade: "B", originalPrice: 140000, color: "#3f2305" },
            { id: "k8", name: "하이엔드 벨벳 자카드 스커트", category: "bottom", grade: "B", originalPrice: 160000, color: "#283618" },
            { id: "k9", name: "골드 글리터 플리스 테크 삭스", category: "socks", grade: "B", originalPrice: 45000, color: "#ffddd2" },
            { id: "k10", name: "럭셔리 카멜 레더 크롭 탑", category: "top", grade: "C", originalPrice: 75000, color: "#b58282" },
            { id: "k11", name: "플레인 새틴 실크 스커트", category: "bottom", grade: "C", originalPrice: 68000, color: "#ccd5ae" },
            { id: "k12", name: "로고 에센셜 화이트 스니커즈", category: "shoes", grade: "C", originalPrice: 89000, color: "#ffffff" }
        ]
    };

    const DEFAULT_ITEMS = [
        { id: "def_hair", name: "검정색 긴 생머리", category: "hair", grade: "C", originalPrice: 10000, color: "#1a1c23" },
        { id: "def_top", name: "흰색 반팔", category: "top", grade: "C", originalPrice: 10000, color: "#ffffff" },
        { id: "def_bottom", name: "회색 츄리닝 바지", category: "bottom", grade: "C", originalPrice: 10000, color: "#a0aec0" }
    ];

    const SHOP_META = {
        ably: { cost: 30000, title: "✨ 에이블리", desc: "귀엽고 화려한 무드의 유니크 룩 코디 스타일", probs: { SSS: 2, SS: 6, S: 14, A: 20, B: 28, C: 30 } },
        musinsa: { cost: 50000, title: "🛹 무신사", desc: "힙하고 캐주얼한 정석 레이어드 스트릿 코디 스타일", probs: { SSS: 3, SS: 7, S: 15, A: 25, B: 25, C: 25 } },
        kream: { cost: 80000, title: "🔥 크림 (KREAM)", desc: "한정판 명품 및 하이엔드 럭셔리 컬렉션", probs: { SSS: 5, SS: 10, S: 20, A: 25, B: 20, C: 20 } }
    };

    let usersDb = JSON.parse(localStorage.getItem("ootd_v4_users")) || {};
    let currentUser = null;
    let selectedGender = "male";
    let activeShop = null;
    let marketPrices = {};

    /* ========================================================
       3. 0.8초 주기 고속 중고나라 시세 변동 엔진
       ======================================================== */
    function initMarketPrices() {
        const list = [...ITEM_DATABASE.ably, ...ITEM_DATABASE.musinsa, ...ITEM_DATABASE.kream, ...DEFAULT_ITEMS];
        list.forEach(item => { marketPrices[item.id] = (Math.random() * 0.4) + 0.8; });

        setInterval(() => {
            list.forEach(item => {
                let vol = 0.12;
                if(item.grade === "SSS") vol = 0.40;
                else if(item.grade === "SS") vol = 0.28;
                else if(item.grade === "S") vol = 0.20;

                const isUp = Math.random() > 0.42;
                let delta = Math.random() * vol * (isUp ? 1 : -1);
                
                let next = marketPrices[item.id] + delta;
                if(next < 0.25) next = 0.25;
                if(next > 2.40) next = 2.40;

                marketPrices[item.id] = next;
            });
            updateJunggonaraUI();
        }, 800);
    }

    /* ========================================================
       4. 회원가입 / 로그인 / 인증 모듈
       ======================================================== */
    function handleRegister() {
        const id = document.getElementById("login-id").value.trim();
        const pw = document.getElementById("login-pw").value.trim();
        if(!id || !pw) return alert("아이디와 비밀번호를 모두 채워주세요.");
        if(usersDb[id]) return alert("이미 가입된 계정입니다.");

        usersDb[id] = { password: pw, setupCompleted: false };
        localStorage.setItem("ootd_v4_users", JSON.stringify(usersDb));
        alert("회원가입이 완료되었습니다!");
    }

    function handleLogin() {
        const id = document.getElementById("login-id").value.trim();
        const pw = document.getElementById("login-pw").value.trim();
        if(!usersDb[id] || usersDb[id].password !== pw) return alert("잘못된 정보입니다.");

        currentUser = id;
        if(usersDb[currentUser].setupCompleted) startGame();
        else showScreen("screen-setup");
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function selectGender(g) {
        selectedGender = g;
        document.getElementById("g-male").style.borderColor = (g==='male') ? 'var(--accent-soft)' : '#e2e8f0';
        document.getElementById("g-female").style.borderColor = (g==='female') ? 'var(--accent-soft)' : '#e2e8f0';
    }

    function completeSetup() {
        const name = document.getElementById("user-name").value.trim();
        if(!name) return alert("이름을 꼭 입력해야 합니다.");

        usersDb[currentUser] = {
            ...usersDb[currentUser],
            nickname: name,
            gender: selectedGender,
            money: 100000,
            closet: [...DEFAULT_ITEMS].map(i => ({...i, instanceId: i.id})),
            equipped: { hair: "def_hair", top: "def_top", bottom: "def_bottom", onepiece: null, socks: null, shoes: null, hat: null, bag: null, necklace: null, earring: null },
            setupCompleted: true
        };
        localStorage.setItem("ootd_v4_users", JSON.stringify(usersDb));
        startGame();
    }

    function startGame() {
        initMarketPrices();
        showScreen("screen-main");
        refreshMainUI();
    }

    function refreshMainUI() {
        const d = usersDb[currentUser];
        document.getElementById("display-username").innerText = d.nickname;
        document.getElementById("user-money").innerText = d.money.toLocaleString();
        renderCharacterCanvas();
    }

    /* ========================================================
       5. 완벽한 눈코입 얼굴 디테일 + 레퍼런스 체형 그래픽스 엔진
       ======================================================== */
    function renderCharacterCanvas() {
        const d = usersDb[currentUser];
        const eq = d.equipped;

        // 동그랗고 큰 눈망울, 하이라이트 스타, 코, 발그레한 치크 포함 완전체 바디
        const bodyLayer = document.getElementById("layer-body");
        bodyLayer.innerHTML = `
            <svg viewBox="0 0 100 150">
                <!-- 헤드 볼륨 및 피부톤 -->
                <circle cx="50" cy="36" r="14" fill="#fff0ed" stroke="#fcd5ce" stroke-width="0.8" />
                <path d="M 46,49 L 54,49 L 53,60 L 47,60 Z" fill="#fff0ed" />
                
                <!-- 레퍼런스 스타일 2.5등신 가녀린 몸통 바디 패스 -->
                <path d="M 32,60 L 68,60 L 62,106 L 38,106 Z" fill="#fff0ed" stroke="#fcd5ce" stroke-width="0.8" />
                <line x1="31" y1="62" x2="21" y2="102" stroke="#fff0ed" stroke-width="4.8" stroke-linecap="round" />
                <line x1="69" y1="62" x2="79" y2="102" stroke="#fff0ed" stroke-width="4.8" stroke-linecap="round" />
                <line x1="42" y1="106" x2="42" y2="145" stroke="#fff0ed" stroke-width="6" stroke-linecap="round" />
                <line x1="58" y1="106" x2="58" y2="145" stroke="#fff0ed" stroke-width="6" stroke-linecap="round" />
                
                <!-- 눈코입 디테일 묘사 (코와 스마일 입 완벽 내장) -->
                <!-- 큰 눈망울 -->
                <circle cx="44" cy="35" r="3.2" fill="#2d3748" />
                <circle cx="56" cy="35" r="3.2" fill="#2d3748" />
                <!-- 하이라이트 생기 -->
                <circle cx="45.2" cy="33.8" r="1" fill="#ffffff" />
                <circle cx="57.2" cy="33.8" r="1" fill="#ffffff" />
                <!-- 눈썹 -->
                <path d="M 39,30 Q 44,29 47,31" stroke="#4a5568" stroke-width="1.2" fill="none" stroke-linecap="round"/>
                <path d="M 61,30 Q 56,29 53,31" stroke="#4a5568" stroke-width="1.2" fill="none" stroke-linecap="round"/>
                <!-- 코 디테일 -->
                <path d="M 50,36 L 50,38" stroke="#f4a261" stroke-width="1" stroke-linecap="round" />
                <!-- 앵두 같은 입 디테일 -->
                <path d="M 47,42 Q 50,44 53,42" stroke="#e63946" stroke-width="1.5" fill="none" stroke-linecap="round" />
                <!-- 뺨 볼터치 홍조 -->
                <circle cx="41" cy="39" r="2.8" fill="#ff4d6d" opacity="0.38" />
                <circle cx="59" cy="39" r="2.8" fill="#ff4d6d" opacity="0.38" />
            </svg>
        `;

        // 고유 인스턴스 ID 혹은 기본 ID 기반 정합성 서치 함수 (헤어 오류 완전 해결)
        const findItem = (targetInstId) => {
            if(!targetInstId) return null;
            return d.closet.find(i => i.instanceId === targetInstId);
        };

        const draw = (layerId, item) => {
            const el = document.getElementById(layerId);
            if(!item) { el.innerHTML = ""; return; }
            let code = (item.category === "hair") ? VECTOR_DRAW[layerId](item.color) : VECTOR_DRAW[item.category](item.color, item.grade);
            el.innerHTML = `<svg viewBox="0 0 100 150">${code}</svg>`;
        };

        const currentHair = findItem(eq.hair);
        draw("layer-hair-back", currentHair);
        draw("layer-hair-front", currentHair);

        draw("layer-socks", findItem(eq.socks));
        draw("layer-shoes", findItem(eq.shoes));
        draw("layer-bottom", findItem(eq.bottom));
        draw("layer-top", findItem(eq.top));

        const op = findItem(eq.onepiece);
        if(op) {
            document.getElementById("layer-top").innerHTML = "";
            document.getElementById("layer-bottom").innerHTML = "";
            draw("layer-onepiece", op);
        } else {
            document.getElementById("layer-onepiece").innerHTML = "";
        }

        draw("layer-hat", findItem(eq.hat));
        draw("layer-bag", findItem(eq.bag));
        draw("layer-necklace", findItem(eq.necklace));
        draw("layer-earring", findItem(eq.earring));
    }

    /* ========================================================
       6. 옷장 인터페이스 렌더링 및 탈부착 제어
       ======================================================== */
    function renderCloset() {
        const grid = document.getElementById("closet-grid");
        grid.innerHTML = "";
        const d = usersDb[currentUser];

        d.closet.forEach(item => {
            const isEq = Object.values(d.equipped).includes(item.instanceId);
            const card = document.createElement("div");
            card.className = `item-card ${isEq ? 'equipped' : ''}`;
            card.onclick = () => toggleEquip(item);

            let previewSvg = "";
            if (item.category === 'hair') {
                previewSvg = `<svg viewBox="20 10 60 130" style="width:100%;height:100%;">${VECTOR_DRAW['hair-back'](item.color)}${VECTOR_DRAW['hair-front'](item.color)}</svg>`;
            } else if (VECTOR_DRAW[item.category]) {
                previewSvg = `<svg viewBox="10 10 80 130" style="width:100%;height:100%;">${VECTOR_DRAW[item.category](item.color, item.grade)}</svg>`;
            }

            card.innerHTML = `
                <div class="item-grade-tag grade-bg-${item.grade}">${item.grade}</div>
                <div class="item-preview-svg">${previewSvg}</div>
                <p style="font-size:0.75rem; font-weight:800; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.name}</p>
            `;
            grid.appendChild(card);
        });
    }

    function toggleEquip(item) {
        const d = usersDb[currentUser];
        const eq = d.equipped;
        const targetId = item.instanceId;

        if(item.category === "onepiece") {
            if(eq.onepiece === targetId) eq.onepiece = null;
            else { eq.onepiece = targetId; eq.top = null; eq.bottom = null; }
        } else if(item.category === "top" || item.category === "bottom") {
            eq.onepiece = null;
            eq[item.category] = (eq[item.category] === targetId) ? null : targetId;
        } else {
            eq[item.category] = (eq[item.category] === targetId) ? null : targetId;
        }

        localStorage.setItem("ootd_v4_users", JSON.stringify(usersDb));
        refreshMainUI();
        renderCloset();
    }

    /* ========================================================
       7. 모바일 허브 및 상점 가챠 구동
       ======================================================== */
    function toggleOverlay(id) {
        const ov = document.getElementById("overlay-" + id);
        if(ov.classList.contains("active")) ov.classList.remove("active");
        else {
            document.querySelectorAll(".overlay-view").forEach(o => o.classList.remove("active"));
            ov.classList.add("active");
            if(id === "closet") renderCloset();
        }
    }

    function openApp(app) {
        if(app === "junggonara") { document.getElementById("overlay-junggo").classList.add("active"); updateJunggonaraUI(); return; }

        activeShop = app;
        const meta = SHOP_META[app];
        document.getElementById("shop-title").innerText = meta.title;
        document.getElementById("shop-desc").innerText = meta.desc;
        document.getElementById("shop-cost").innerText = `1회 뽑기비용: ${meta.cost.toLocaleString()}원`;

        const pBox = document.getElementById("shop-prob-list");
        pBox.innerHTML = "";
        ITEM_DATABASE[app].forEach(i => {
            pBox.innerHTML += `<div class="prob-row"><span class="grade-${i.grade}">[${i.grade}] ${i.name}</span><span style="font-weight:700;">${meta.probs[i.grade]}%</span></div>`;
        });
        document.getElementById("overlay-shop").classList.add("active");
    }

    function closeApp(app) {
        document.getElementById("overlay-" + app).classList.remove("active");
    }

    function triggerGacha() {
        const meta = SHOP_META[activeShop];
        const d = usersDb[currentUser];
        if(d.money < meta.cost) return alert("잔고가 부족합니다. 중고나라에서 의류를 실시간 처분하여 복구하세요!");

        d.money -= meta.cost;
        const roll = Math.random() * 100;
        let acc = 0, pickGrade = "C";
        const grades = ["SSS", "SS", "S", "A", "B", "C"];

        for(let g of grades) {
            acc += meta.probs[g];
            if(roll <= acc) { pickGrade = g; break; }
        }

        const pool = ITEM_DATABASE[activeShop].filter(i => i.grade === pickGrade);
        const rolled = pool[Math.floor(Math.random() * pool.length)];

        // 복사 생성 시 고유 인스턴스 코드 부여 (탈부착 및 중고나라 연동 오류 완전 방지)
        const inst = { ...rolled, instanceId: activeShop + "_" + rolled.id + "_" + Date.now() };
        d.closet.push(inst);

        localStorage.setItem("ootd_v4_users", JSON.stringify(usersDb));
        refreshMainUI();

        document.getElementById("gacha-result-name").innerText = rolled.name;
        const rGrade = document.getElementById("gacha-result-grade");
        rGrade.className = "grade-" + rolled.grade;
        rGrade.innerText = `[${rolled.grade} 등급]`;
        document.getElementById("gacha-popup").style.display = "block";
    }

    function closeGachaPopup() { document.getElementById("gacha-popup").style.display = "none"; }

    /* ========================================================
       8. 리얼타임 초고속 0.8초 변동 중고마켓 매도 인터페이스
       ======================================================== */
    function updateJunggonaraUI() {
        const box = document.getElementById("junggonara-list");
        if(!box || !currentUser || !document.getElementById("overlay-junggo").classList.contains("active")) return;
        
        box.innerHTML = "";
        const d = usersDb[currentUser];
        // 기본 제공 의상 3종은 판매 불가 처리
        const items = d.closet.filter(i => !i.id.startsWith("def_"));

        if(items.length === 0) {
            box.innerHTML = `<p style="text-align:center; color:var(--text-muted); margin-top:20px;">중고로 판매할 가챠 획득 의류가 없습니다.</p>`;
            return;
        }

        items.forEach(item => {
            const mult = marketPrices[item.id] || 1.0;
            const livePrice = Math.floor(item.originalPrice * mult);
            const isHigh = mult >= 1.2;

            const div = document.createElement("div");
            div.className = "used-item";
            div.innerHTML = `
                <div style="max-width: 65%;">
                    <span class="grade-${item.grade}" style="font-size:0.85rem;">[${item.grade}] ${item.name}</span>
                    <div style="font-size:0.7rem; color:var(--text-muted); margin-top:2px;">
                        정가: ${item.originalPrice.toLocaleString()}원 (${(mult*100).toFixed(0)}%)
                    </div>
                </div>
                <div style="text-align:right;">
                    <div class="${isHigh ? 'price-up' : 'price-down'}" style="font-size:0.95rem; font-weight:900; margin-bottom:4px;">
                        ${isHigh ? '📈' : '📉'} ${livePrice.toLocaleString()}원
                    </div>
                    <button onclick="sellItem('${item.instanceId}', ${livePrice})" style="background:#16a34a; padding:5px 10px; font-size:0.75rem; border-radius:10px; box-shadow:none;">즉시 판매</button>
                </div>
            `;
            box.appendChild(div);
        });
    }

    function sellItem(instId, price) {
        const d = usersDb[currentUser];
        const idx = d.closet.findIndex(i => i.instanceId === instId);
        if(idx === -1) return;

        // 착용중인 옷이면 해제 조치
        for(let k in d.equipped) { if(d.equipped[k] === instId) d.equipped[k] = null; }

        d.closet.splice(idx, 1);
        d.money += price;

        localStorage.setItem("ootd_v4_users", JSON.stringify(usersDb));
        refreshMainUI();
        updateJunggonaraUI();
    }
</script>
</body>
</html>
