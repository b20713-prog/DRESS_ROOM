<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiffon Atelier Premium - High-End</title>
    <style>
        :root {
            --bg-base: #fff0f3;
            --card-bg: #ffffff;
            --accent-pink: #ffb3c1;
            --accent-hot: #ff4d6d;
            --border-soft: #ffe5ec;
            --text-dark: #3c2f31;
            --text-muted: #8a7a7c;
            --panel-round: 30px;

            --color-sss: #ff0a54;
            --color-ss: #ff7096;
            --color-s: #ff85a1;
            --color-a: #f72585;
            --color-b: #7209b7;
            --color-c: #9b5de5;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Pretendard', -apple-system, sans-serif; 
        }
        
        body { 
            background-color: #ffe5ec; 
            color: var(--text-dark); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .app-container {
            width: 430px;
            height: 900px;
            background: var(--bg-base);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(255, 77, 109, 0.2);
            border: 10px solid #ffffff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen { 
            display: none; 
            width: 100%; 
            height: 100%; 
            position: absolute; 
            top: 0; 
            left: 0; 
            padding: 24px; 
            flex-direction: column; 
        }
        
        .screen.active { 
            display: flex; 
        }

        button {
            background: var(--accent-hot); 
            color: white; 
            border: none; 
            padding: 15px 22px; 
            border-radius: 22px;
            font-weight: 800; 
            font-size: 1rem; 
            cursor: pointer; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 6px 15px rgba(255, 77, 109, 0.3);
        }
        
        button:hover { 
            background: #ff0a54; 
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4);
        }

        input { 
            background: #ffffff; 
            border: 2.5px solid #ffe5ec; 
            padding: 15px; 
            border-radius: 18px; 
            margin-bottom: 12px; 
            outline: none; 
            font-size: 0.95rem;
            color: var(--text-dark);
            text-align: center;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent-hot);
        }

        #screen-login { 
            justify-content: center; 
            background: linear-gradient(180deg, #ffffff 0%, #fff0f3 100%); 
        }
        
        .brand-logo { 
            text-align: center; 
            margin-bottom: 45px; 
        }
        
        .brand-logo h1 { 
            font-size: 2.8rem; 
            font-weight: 900; 
            color: var(--accent-hot); 
            text-shadow: 0 4px 10px rgba(255, 77, 109, 0.2);
            letter-spacing: -1px;
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px dashed #ffccd5; 
            padding-bottom: 14px; 
        }
        
        .balance-tag { 
            background: #fff; 
            padding: 8px 18px; 
            border-radius: 18px; 
            font-weight: 900; 
            color: var(--accent-hot); 
            font-size: 0.95rem; 
            border: 2px solid #ffccd5;
            box-shadow: 0 4px 8px rgba(255, 77, 109, 0.05);
        }

        .character-view {
            flex: 1; 
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            background: #ffffff; 
            margin: 16px 0; 
            border-radius: 32px; 
            border: 2.5px solid #ffccd5; 
            overflow: hidden;
            box-shadow: inset 0 4px 16px rgba(255, 179, 193, 0.15);
        }
        
        .canvas-container { 
            position: relative; 
            width: 320px; 
            height: 520px; 
        }
        
        .layer { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        .layer svg { 
            width: 100%; 
            height: 100%; 
        }

        .main-controls { 
            display: flex; 
            gap: 12px; 
        }
        
        .main-controls button { 
            flex: 1; 
            padding: 18px; 
            border-radius: 24px; 
        }

        .overlay-view {
            display: none; 
            position: absolute; 
            top: 70px; 
            left: 0; 
            width: 100%; 
            height: calc(100% - 70px);
            background: var(--card-bg); 
            z-index: 10; 
            padding: 24px; 
            flex-direction: column;
            border-top-left-radius: 36px; 
            border-top-right-radius: 36px;
            box-shadow: 0 -15px 35px rgba(255, 77, 109, 0.15); 
            border-top: 3px solid #ffccd5;
        }
        
        .overlay-view.active { 
            display: flex; 
        }
        
        .overlay-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
        }

        .item-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            overflow-y: auto; 
            flex: 1; 
            padding-right: 4px;
        }
        
        .item-card { 
            background: #fffcfc; 
            border: 2px solid #ffe5ec; 
            border-radius: 22px; 
            padding: 10px; 
            text-align: center; 
            cursor: pointer; 
            position: relative; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .item-card:hover {
            transform: scale(1.03);
            border-color: var(--accent-pink);
        }
        
        .item-card.equipped { 
            border: 3.5px solid var(--accent-hot); 
            background: #fff0f3; 
            transform: scale(0.97);
        }
        
        .item-grade-tag { 
            position: absolute; 
            top: 8px; 
            left: 8px; 
            font-size: 0.65rem; 
            font-weight: 900; 
            padding: 2px 7px; 
            border-radius: 9px; 
            color: #ffffff; 
            z-index: 2;
        }
        
        .item-preview-svg { 
            width: 86px; 
            height: 86px; 
            margin: 4px auto; 
        }

        .phone-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 16px; 
            margin-top: 15px; 
        }
        
        .app-icon-btn {
            background: #ffffff; 
            border: 2.5px solid #ffe5ec; 
            border-radius: 26px; 
            padding: 24px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 12px; 
            cursor: pointer; 
            box-shadow: 0 6px 12px rgba(255, 77, 109, 0.04);
            transition: transform 0.25s, border-color 0.25s;
        }

        .app-icon-btn:hover {
            transform: translateY(-4px);
            border-color: var(--accent-hot);
        }

        .used-list { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            overflow-y: auto; 
            flex: 1; 
        }
        
        .used-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #fffcfc; 
            padding: 16px; 
            border-radius: 22px; 
            border: 2px solid #ffe5ec; 
        }
        
        .price-up { color: #ff0a54; font-weight: 900; }
        .price-down { color: #3a86c8; font-weight: 900; }
        
        .probability-info { 
            background: #fff9fa; 
            border: 2px solid #ffe5ec; 
            border-radius: 20px; 
            padding: 16px; 
            margin-bottom: 20px; 
            font-size: 0.8rem; 
            max-height: 200px; 
            overflow-y: auto; 
        }
        
        .grade-SSS { color: var(--color-sss); font-weight: 950; }
        .grade-SS { color: var(--color-ss); font-weight: 950; }
        .grade-S { color: var(--color-s); font-weight: 900; }
        .grade-A { color: var(--color-a); font-weight: 800; }
        .grade-B { color: var(--color-b); font-weight: 800; }
        .grade-C { color: var(--color-c); font-weight: 700; }

        .grade-bg-SSS { background: var(--color-sss); }
        .grade-bg-SS { background: var(--color-ss); }
        .grade-bg-S { background: var(--color-s); }
        .grade-bg-A { background: var(--color-a); }
        .grade-bg-B { background: var(--color-b); }
        .grade-bg-C { background: var(--color-c); }

        .gacha-popup {
            display: none; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            background: #ffffff; 
            border: 5px solid var(--accent-hot); 
            padding: 26px; 
            border-radius: 36px;
            z-index: 100; 
            text-align: center; 
            width: 90%; 
            box-shadow: 0 25px 60px rgba(255, 10, 84, 0.35);
        }

        .gacha-image-container {
            width: 150px;
            height: 150px;
            margin: 18px auto;
            border: 2.5px dashed #ffccd5;
            border-radius: 24px;
            background: #fffcfc;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #fff0f3;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #ffccd5;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="screen-login" class="screen active">
        <div class="brand-logo">
            <h1>Chiffon</h1>
            <p style="color: var(--text-muted); font-size: 0.95rem; margin-top: 8px; font-weight: 700; letter-spacing: 1.5px;">PREMIUM DRESSUP ATELIER</p>
        </div>
        <div class="auth-box" style="display:flex; flex-direction:column;">
            <input type="text" id="login-id" placeholder="아이디">
            <input type="password" id="login-pw" placeholder="비밀번호">
            <button onclick="handleRegister()" style="background: #ffffff; border: 2.5px solid #ffe5ec; color: var(--text-muted); box-shadow: none; margin-bottom: 8px;">회원가입</button>
            <button onclick="handleLogin()">로그인</button>
        </div>
    </div>

    <div id="screen-setup" class="screen" style="background: #ffffff; justify-content: center;">
        <h2 style="font-size: 1.7rem; font-weight: 900; margin-bottom: 20px; text-align:center; color: var(--accent-hot);">아틀리에 등록</h2>
        <p style="text-align:center; font-size:0.85rem; color: var(--text-muted); margin-bottom: 24px;">디자이너 이름과 희망하는 바디 룸을 설정해 주세요.</p>
        <input type="text" id="user-name" placeholder="디자이너 이름 입력">
        <div style="display: flex; gap: 12px; margin-top: 10px;">
            <button id="g-male" style="flex:1; background:#fff; border:2.5px solid #cbd5e1; color:#475569;" onclick="selectGender('male')">보이 룸</button>
            <button id="g-female" style="flex:1; background:#fff; border:2.5px solid #cbd5e1; color:#475569;" onclick="selectGender('female')">걸 룸</button>
        </div>
        <button onclick="completeSetup()" style="margin-top: 32px; padding:16px;">부티크 입장하기</button>
    </div>

    <div id="screen-main" class="screen">
        <div class="header">
            <div style="font-weight: 900; font-size: 1.15rem; color: var(--text-dark);"><span id="display-username" style="color:var(--accent-hot);">디자이너</span> 룸</div>
            <div class="balance-tag">💖 <span id="user-money">100,000</span>원</div>
        </div>

        <div class="character-view">
            <div class="canvas-container">
                <div class="layer" id="layer-hair-back" style="z-index: 1;"></div>
                <div class="layer" id="layer-body" style="z-index: 2;"></div>
                <div class="layer" id="layer-socks" style="z-index: 3;"></div>
                <div class="layer" id="layer-shoes" style="z-index: 4;"></div>
                <div class="layer" id="layer-bottom" style="z-index: 5;"></div>
                <div class="layer" id="layer-top" style="z-index: 6;"></div>
                <div class="layer" id="layer-onepiece" style="z-index: 7;"></div>
                <div class="layer" id="layer-hair-front" style="z-index: 8;"></div>
                <div class="layer" id="layer-necklace" style="z-index: 9;"></div>
                <div class="layer" id="layer-earring" style="z-index: 10;"></div>
                <div class="layer" id="layer-hat" style="z-index: 11;"></div>
                <div class="layer" id="layer-bag" style="z-index: 12;"></div>
            </div>
        </div>

        <div class="main-controls">
            <button onclick="toggleOverlay('closet')" style="background: #4a3e40; box-shadow: none;">👗 마이 드레스룸</button>
            <button onclick="toggleOverlay('phone')">📱 스마트 스토어</button>
        </div>

        <div id="overlay-closet" class="overlay-view">
            <div class="overlay-header">
                <h3 style="font-weight:900; color:var(--accent-hot); font-size:1.2rem;">🎀 내 옷장</h3>
                <button onclick="toggleOverlay('closet')" style="background:#8a7a7c; padding:6px 14px; font-size:0.85rem; box-shadow: none; border-radius:12px;">닫기</button>
            </div>
            <div class="item-grid" id="closet-grid"></div>
        </div>

        <div id="overlay-phone" class="overlay-view" style="background:#fffafb;">
            <div class="overlay-header">
                <h3 style="color:var(--text-dark); font-weight:900;">🛒 마켓 플레이스</h3>
                <button onclick="toggleOverlay('phone')" style="background:#ff4d6d; padding:6px 14px; font-size:0.85rem; box-shadow: none; border-radius:12px;">끄기</button>
            </div>
            <div class="phone-grid">
                <div class="app-icon-btn" onclick="openApp('ably')"><span style="font-size:2.4rem;">🧸</span><span style="font-weight:800; font-size:0.9rem; color:var(--text-dark);">에이블리</span></div>
                <div class="app-icon-btn" onclick="openApp('musinsa')"><span style="font-size:2.4rem;">👒</span><span style="font-weight:800; font-size:0.9rem; color:var(--text-dark);">무신사</span></div>
                <div class="app-icon-btn" onclick="openApp('kream')"><span style="font-size:2.4rem;">🎀</span><span style="font-weight:800; font-size:0.9rem; color:var(--text-dark);">크림</span></div>
                <div class="app-icon-btn" onclick="openApp('junggonara')" style="background:#fdf4f5; border-color:#ffccd5;"><span style="font-size:2.4rem;">🤝</span><span style="color:var(--accent-hot); font-weight:900; font-size:0.9rem;">중고나라</span></div>
            </div>
        </div>

        <div id="overlay-shop" class="overlay-view" style="z-index:20;">
            <div class="overlay-header">
                <h3 id="shop-title" style="font-weight:900;">SHOP</h3>
                <button onclick="closeApp('shop')" style="background:#8a7a7c; padding:6px 14px; font-size:0.85rem; box-shadow:none; border-radius:12px;">뒤로</button>
            </div>
            <div style="background:#fff5f6; padding:16px; border-radius:22px; text-align:center; margin-bottom:16px; border:1.5px solid #ffe5ec;">
                <p id="shop-desc" style="font-size:0.85rem; color:var(--text-muted); font-weight:600;"></p>
                <h4 id="shop-cost" style="color:var(--accent-hot); font-size:1.3rem; font-weight:900; margin-top:6px;"></h4>
            </div>
            <h5 style="margin-bottom:8px; font-size:0.85rem; font-weight:800; color:#3c2f31;">획득 가능한 브랜드 전용 아이템</h5>
            <div class="probability-info" id="shop-prob-list"></div>
            <button onclick="triggerGacha()" style="width:100%; padding:16px; border-radius:22px;">디자이너 박스 오픈하기</button>
        </div>

        <div id="overlay-junggo" class="overlay-view" style="z-index:20;">
            <div class="overlay-header">
                <h3 style="color:var(--accent-hot); font-weight:900; font-size:1.1rem;">🤝 중고 패션 리셀 시장 (실시간 0.8초 변동)</h3>
                <button onclick="closeApp('junggo')" style="background:#8a7a7c; padding:6px 14px; font-size:0.85rem; box-shadow:none; border-radius:12px;">뒤로</button>
            </div>
            <p style="font-size:0.8rem; color:var(--text-muted); font-weight:600; margin-bottom:14px; background:#fff0f3; padding:10px; border-radius:12px; border: 1.5px dashed #ffccd5;">
                📈 시세가 최고점(%)에 달했을 때 수집 아이템을 리셀하여 이득을 챙기세요!
            </p>
            <div class="used-list" id="junggonara-list"></div>
        </div>

    </div>

    <div class="gacha-popup" id="gacha-popup">
        <h3 style="margin-bottom:4px; font-size:1.4rem; color:var(--accent-hot); font-weight:900;">🎉 NEW ITEM GET!</h3>
        <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:10px;">스토어 한정판 프리미엄 디자이너 아이템 획득!</p>
        <div class="gacha-image-container" id="gacha-preview-container"></div>
        <div id="gacha-result-name" style="font-size:1.2rem; font-weight:900; margin-bottom:4px; color:var(--text-dark);"></div>
        <div id="gacha-result-grade" style="font-size:1.1rem; margin-bottom:20px;"></div>
        <button onclick="closeGachaPopup()" style="width:100%; padding:15px; border-radius:18px;">옷장으로 이동하기</button>
    </div>

</div>

<script>
    /* ========================================================
       1. 프리미엄 명품 드로잉 데이터 (얼굴침범 해결 & 리얼인체화)
       ======================================================== */
    const VECTOR_DRAW = {
        // [수정 핵심] 앞머리가 절대 이목구비(눈, 눈썹, 볼터치)를 덮지 않도록 아치형 곡선으로 완벽 개조!
        'hair-front': (c, type) => {
            // 이마 끝 위에서 둥글게 가르마를 타고 양쪽으로 풍성하게 흐르는 고정 레이아웃
            let baseFront = `
                <path d="M 23,38 Q 48,15 50,30 Q 38,36 28,45 Z" fill="${c}" />
                <path d="M 77,38 Q 52,15 50,30 Q 62,36 72,45 Z" fill="${c}" />
                <path d="M 33,31 Q 50,22 67,31 Q 50,26 33,31 Z" fill="${c}" opacity="0.9" />
            `;
            
            if (type === 'ribbon') {
                return baseFront + `
                    <path d="M 32,23 C 40,16 60,16 68,23" stroke="#ff4d6d" stroke-width="4.5" fill="none" stroke-linecap="round"/>
                    <path d="M 28,15 Q 38,10 38,22 Q 28,24 28,15 Z" fill="#ff4d6d"/>
                    <path d="M 72,15 Q 62,10 62,22 Q 72,24 72,15 Z" fill="#ff4d6d"/>
                    <circle cx="50" cy="18" r="4.5" fill="#ffffff" />
                `;
            }
            if (type === 'bang') { 
                // 시스루 느낌을 살린 가벼운 이마라인. 눈썹선을 절대 가리지 않고 끝만 살짝 흘러내립니다.
                return `
                    <path d="M 23,38 Q 48,15 50,30 Q 38,36 28,45 Z" fill="${c}" />
                    <path d="M 77,38 Q 52,15 50,30 Q 62,36 72,45 Z" fill="${c}" />
                    <path d="M 43,30 Q 46,36 44,40 Q 45,30 43,30 Z" fill="${c}" opacity="0.95"/>
                    <path d="M 57,30 Q 54,36 56,40 Q 55,30 57,30 Z" fill="${c}" opacity="0.95"/>
                `;
            }
            if (type === 'pure') { 
                // 이마 정중앙을 환하게 드러내 이목구비를 최대로 화사하게 살리는 청순 헤어라인
                return `
                    <path d="M 22,35 Q 34,18 45,26 Q 30,34 24,48 Z" fill="${c}" />
                    <path d="M 78,35 Q 66,18 55,26 Q 70,34 76,48 Z" fill="${c}" />
                `;
            }
            return baseFront;
        },

        // 풍성하고 아름답게 캐릭터의 뒤쪽을 감싸 대머리처럼 보이지 않게 설계한 뒷머리
        'hair-back': (c, type) => {
            if (type === 'twin') {
                return `
                    <path d="M 24,35 Q -3,45 6,95 Q 22,95 28,52 Z" fill="${c}" />
                    <path d="M 76,35 Q 103,45 94,95 Q 78,95 72,52 Z" fill="${c}" />
                    <circle cx="21" cy="40" r="10.5" fill="${c}"/>
                    <circle cx="79" cy="40" r="10.5" fill="${c}"/>
                    <path d="M 11,31 Q 21,37 21,43 Q 10,43 11,31 Z" fill="#ff4d6d" />
                    <path d="M 89,31 Q 79,37 79,43 Q 90,43 89,31 Z" fill="#ff4d6d" />
                `;
            }
            if (type === 'wave') {
                return `
                    <path d="M 24,40 C 4,72 12,128 32,138 C 26,112 30,82 34,52 Z" fill="${c}" />
                    <path d="M 76,40 C 96,72 88,128 68,138 C 74,112 70,82 66,52 Z" fill="${c}" />
                    <path d="M 30,28 Q 50,18 70,28 Q 82,60 76,82 Q 24,82 30,28 Z" fill="${c}" />
                `;
            }
            if (type === 'short') {
                return `
                    <path d="M 22,35 C 10,60 14,92 32,96 C 34,72 32,58 35,48 Z" fill="${c}" />
                    <path d="M 78,35 C 90,60 86,92 68,96 C 66,72 68,58 65,48 Z" fill="${c}" />
                `;
            }
            return `<path d="M 23,38 C 10,65 8,130 25,142 C 32,112 68,112 75,142 C 92,130 90,65 77,38 Z" fill="${c}" />`;
        },
        
        // 프릴 셔링 어깨장식 및 봉봉 소매가 가득한 고품질 상의
        'top': (c, grade) => {
            let detail = (grade==="SSS" || grade==="SS") ? `

    function initMarketPrices() {
        const fullList = [...ITEM_DATABASE.ably, ...ITEM_DATABASE.musinsa, ...ITEM_DATABASE.kream, ...DEFAULT_ITEMS];
        fullList.forEach(item => { marketPrices[item.id] = 1.0; });

        setInterval(() => {
            fullList.forEach(item => {
                let vol = 0.15; 
                if(item.grade === "SSS") vol = 0.45;
                else if(item.grade === "SS") vol = 0.30;
                
                const isUp = Math.random() > 0.46;
                let delta = Math.random() * vol * (isUp ? 1 : -1);
                let next = (marketPrices[item.id] || 1.0) + delta;
                
                if(next < 0.3) next = 0.3;
                if(next > 2.3) next = 2.3;
                marketPrices[item.id] = next;
            });
            updateJunggonaraUI();
        }, 800);
    }

    function handleRegister() {
        const id = document.getElementById("login-id").value.trim();

        if(!id || !pw) return alert("아이디와 비밀번호를 제대로 입력해 주세요.");
        if(usersDb[id]) return alert("이미 존재해 사용하는 아이디입니다.");

        usersDb[id] = { password: pw, setupCompleted: false };
        localStorage.setItem("chiffon_core_v8", JSON.stringify(usersDb));
        alert("성공적으로 회원가입 완료! 등록하신 계정으로 접속해 주세요.");
    }

    function handleLogin() {
        const id = document.getElementById("login-id").value.trim();
        const pw = document.getElementById("login-pw").value.trim();
        if(!usersDb[id] || usersDb[id].password !== pw) return alert("입력하신 회원 정보가 올바르지 않습니다.");

        currentUser = id;
        if(usersDb[currentUser].setupCompleted) {
            startGame();
        } else {
            showScreen("screen-setup");
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

    }

        const baseCloset = [

            { ...DEFAULT_ITEMS[1], instanceId: "def_top_inst" },
            { ...DEFAULT_ITEMS[2], instanceId: "def_bottom_inst" }

        };
        usersDb[currentUser].setupCompleted = true;
        localStorage.setItem("chiffon_core_v8", JSON.stringify(usersDb));
        startGame();
    }

        draw("layer-hair-back", activeHair);
        draw("layer-hair-front", activeHair);

        draw("layer-socks", getClothedItem(eq.socks));
        draw("layer-shoes", getClothedItem(eq.shoes));
        draw("layer-bottom", getClothedItem(eq.bottom));
        draw("layer-top", getClothedItem(eq.top));

        const activeOnePiece = getClothedItem(eq.onepiece);
        if (activeOnePiece) {
            document.getElementById("layer-top").innerHTML = "";
            document.getElementById("layer-bottom").innerHTML = "";
            draw("layer-onepiece", activeOnePiece);
        } else {
            document.getElementById("layer-onepiece").innerHTML = "";
        }

        draw("layer-hat", getClothedItem(eq.hat));
        draw("layer-bag", getClothedItem(eq.bag));
        draw("layer-necklace", getClothedItem(eq.necklace));
        draw("layer-earring", getClothedItem(eq.earring));
    }

    /* ========================================================
       6. 마이 드레스룸 리스트 출력 및 아이템 착용 조작
       ======================================================== */
    function renderCloset() {
        const grid = document.getElementById("closet-grid");
        grid.innerHTML = "";
        const d = usersDb[currentUser];

        d.closet.forEach(item => {
            const isEquipped = Object.values(d.equipped).includes(item.instanceId);
            const card = document.createElement("div");
            card.className = `item-card ${isEquipped ? 'equipped' : ''}`;
            card.onclick = () => toggleEquip(item);

            let previewSvg = "";
            if (item.category === 'hair') {
                previewSvg = `<svg viewBox="15 10 70 130" style="width:100%;height:100%;">${VECTOR_DRAW['hair-back'](item.color, item.subType)}${VECTOR_DRAW['hair-front'](item.color, item.subType)}</svg>`;
            } else if (VECTOR_DRAW[item.category]) {
                previewSvg = `<svg viewBox="10 10 80 130" style="width:100%;height:100%;">${VECTOR_DRAW[item.category](item.color, item.grade)}</svg>`;
            }

            card.innerHTML = `
                <div class="item-grade-tag grade-bg-${item.grade}">${item.grade}</div>
                <div class="item-preview-svg">${previewSvg}</div>
                <p style="font-size:0.75rem; font-weight:800; color:var(--text-dark); text-overflow:ellipsis; overflow:hidden; white-space:nowrap; margin-top:4px;">${item.name}</p>
            `;
            grid.appendChild(card);
        });
    }

    function toggleEquip(item) {
        const d = usersDb[currentUser];
        const eq = d.equipped;
        const target = item.instanceId;
        const cat = item.category;

        if (eq[cat] === target) {
            eq[cat] = null;
        } else {
            if (cat === "onepiece") {
                eq.onepiece = target; eq.top = null; eq.bottom = null;
            } else if (cat === "top" || cat === "bottom") {
                eq.onepiece = null; eq[cat] = target;
            } else {
                eq[cat] = target;
            }
        }

        localStorage.setItem("chiffon_core_v8", JSON.stringify(usersDb));
        refreshMainUI();
        renderCloset();
    }

    /* ========================================================
       7. 오버레이 패널 핸들링 및 프리미엄 상점 구매 시스템
       ======================================================== */
    function toggleOverlay(id) {
        const overlay = document.getElementById("overlay-" + id);
        if(overlay.classList.contains("active")) {
            overlay.classList.remove("active");
        } else {
            document.querySelectorAll(".overlay-view").forEach(o => o.classList.remove("active"));
            overlay.classList.add("active");
            if(id === "closet") renderCloset();
        }
    }

    function openApp(appName) {
        if(appName === "junggonara") { 
            document.getElementById("overlay-junggo").classList.add("active"); 
            updateJunggonaraUI(); 
            return; 
        }

        activeShop = appName;
        const meta = SHOP_META[appName];
        document.getElementById("shop-title").innerText = meta.title;
        document.getElementById("shop-desc").innerText = meta.desc;
        document.getElementById("shop-cost").innerText = `1회 제작 비용: ${meta.cost.toLocaleString()}원`;

        const pBox = document.getElementById("shop-prob-list");
        pBox.innerHTML = "";
        
        ITEM_DATABASE[appName].forEach(item => {
            pBox.innerHTML += `
                <div class="prob-row" style="display:flex; justify-content:space-between; margin-bottom:6px;">
                    <span class="grade-${item.grade}">[${item.grade}] ${item.name}</span>
                    <span style="font-weight:800; color:var(--text-dark);">${meta.probs[item.grade]}%</span>
                </div>`;
        });
        document.getElementById("overlay-shop").classList.add("active");
    }

    function closeApp(appName) {
        document.getElementById("overlay-" + appName).classList.remove("active");
    }

    function triggerGacha() {
        const meta = SHOP_META[activeShop];
        const d = usersDb[currentUser];
        if(d.money < meta.cost) return alert("자금이 부족합니다! 옷장에 수집한 미착용 의류를 중고나라에 리셀하여 자본금을 충당하세요.");

        d.money -= meta.cost;
        const rand = Math.random() * 100;
        let cumulative = 0;
        let selectedGrade = "C";
        const gradeList = ["SSS", "SS", "S", "A", "B", "C"];

        for(let g of gradeList) {
            cumulative += meta.probs[g];
            if(rand <= cumulative) { selectedGrade = g; break; }
        }

        const pool = ITEM_DATABASE[activeShop].filter(item => item.grade === selectedGrade);
        const template = pool[Math.floor(Math.random() * pool.length)];

        const newGachaItem = { 
            ...template, 
            instanceId: `${activeShop}_${template.id}_${Date.now()}` 
        };
        d.closet.push(newGachaItem);

        localStorage.setItem("chiffon_core_v8", JSON.stringify(usersDb));
        refreshMainUI();

        const previewContainer = document.getElementById("gacha-preview-container");
        let previewSvg = "";
        if (template.category === 'hair') {
            previewSvg = `<svg viewBox="15 10 70 130" style="width:100%;height:100%;">${VECTOR_DRAW['hair-back'](template.color, template.subType)}${VECTOR_DRAW['hair-front'](template.color, template.subType)}</svg>`;
        } else if (VECTOR_DRAW[template.category]) {
            previewSvg = `<svg viewBox="10 10 80 130" style="width:100%;height:100%;">${VECTOR_DRAW[template.category](template.color, template.grade)}</svg>`;
        }
        previewContainer.innerHTML = previewSvg;

        document.getElementById("gacha-result-name").innerText = template.name;
        const rGrade = document.getElementById("gacha-result-grade");
        rGrade.className = "grade-" + template.grade;
        rGrade.innerText = `[${template.grade} GRADE]`;
        
        document.getElementById("gacha-popup").style.display = "block";
    }

    function closeGachaPopup() { 
        document.getElementById("gacha-popup").style.display = "none"; 
        toggleOverlay('closet');
    }

    /* ========================================================
       8. 중고나라 실시간 마켓 리셀 매각 시스템
       ======================================================== */
    function updateJunggonaraUI() {
        const container = document.getElementById("junggonara-list");
        if(!container || !currentUser || !document.getElementById("overlay-junggo").classList.contains("active")) return;
        
        container.innerHTML = "";
        const d = usersDb[currentUser];
        const sellableItems = d.closet.filter(item => !item.instanceId.startsWith("def_"));

        if(sellableItems.length === 0) {
            container.innerHTML = `<p style="text-align:center; color:var(--text-muted); padding:40px 0; font-weight:700;">중고로 매각할 수 있는 브랜드 아이템이 옷장에 없습니다.</p>`;
            return;
        }

        sellableItems.forEach(item => {
            const scale = marketPrices[item.id] || 1.0;
            const livePrice = Math.floor(item.originalPrice * scale);

            const row = document.createElement("div");
            row.className = "used-item";
            row.innerHTML = `
                <div style="max-width:65%;">
                    <span class="grade-${item.grade}" style="font-size:0.85rem; font-weight:800;">[${item.grade}] ${item.name}</span>
                    <div style="font-size:0.75rem; color:var(--text-muted); margin-top:3px;">
                        구입 원가: ${item.originalPrice.toLocaleString()}원 (${(scale*100).toFixed(0)}%)
                    </div>
                </div>
                <div style="text-align:right;">
                    <div class="${scale >= 1.0 ? 'price-up' : 'price-down'}" style="font-size:0.95rem; font-weight:900; margin-bottom:4px;">
                        ${scale >= 1.0 ? '📈' : '📉'} ${livePrice.toLocaleString()}원
                    </div>
                    <button onclick="sellItemToMarket('${item.instanceId}', ${livePrice})" style="background:var(--accent-hot); padding:6px 12px; font-size:0.8rem; border-radius:12px; box-shadow:none;">리셀 판매</button>
                </div>
            `;
            container.appendChild(row);
        });
    }

    function sellItemToMarket(instId, price) {
        const d = usersDb[currentUser];
        const idx = d.closet.findIndex(i => i.instanceId === instId);
        if(idx === -1) return;

        for (let key in d.equipped) {
            if (d.equipped[key] === instId) d.equipped[key] = null;
        }

        d.closet.splice(idx, 1);
        d.money += price;

        localStorage.setItem("chiffon_core_v8", JSON.stringify(usersDb));
        refreshMainUI();
        updateJunggonaraUI();
    }
</script>
</body>
</html>
