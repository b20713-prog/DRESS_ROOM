    // --- [수정] 회원가입 / 로그인 탭 교체 기능 ---
    function switchAuthTab(mode) {
      const tabLogin = document.getElementById('tab-login');
      const tabSignup = document.getElementById('tab-signup');
      const formLogin = document.getElementById('form-login');
      const formSignup = document.getElementById('form-signup');

      if (mode === 'login') {
        tabLogin.className = "flex-1 py-2.5 text-sm font-bold text-brandPink bg-white border-b-2 border-brandPink";
        tabSignup.className = "flex-1 py-2.5 text-sm font-bold text-gray-400 bg-pink-50/50 border-b border-pink-100";
        formLogin.classList.remove('hidden');
        formSignup.classList.add('hidden');
      } else {
        tabSignup.className = "flex-1 py-2.5 text-sm font-bold text-brandPink bg-white border-b-2 border-brandPink";
        tabLogin.className = "flex-1 py-2.5 text-sm font-bold text-gray-400 bg-pink-50/50 border-b border-pink-100";
        formSignup.classList.remove('hidden');
        formLogin.classList.add('hidden');
      }
    }

    // --- [신규 기능] 회원가입 핸들러 ---
    function handleSignup() {
      const id = document.getElementById('signup-id').value.trim();
      const pw = document.getElementById('signup-pw').value.trim();

      if (!id || !pw) return alert("아이디와 비밀번호를 모두 입력해주세요.");

      const users = JSON.parse(localStorage.getItem('pastel_users_db') || '{}');

      if (users[id]) {
        return alert("이미 가입된 아이디입니다.");
      }

      // 유저 정보 가입 처리
      users[id] = {
        password: pw,
        name: "",
        gender: "female",
        balance: 100000,
        inventory: [],
        equipped: {
          hair: null, top: null, bottom: null, dress: null,
          shoes: null, accessory: null, bag: null
        }
      };

      localStorage.setItem('pastel_users_db', JSON.stringify(users));
      alert("회원가입이 완료되었습니다! 로그인하여 플레이해 보세요.");
      
      // 가입 정보 폼 자동 세팅 및 로그인 탭 전환
      document.getElementById('login-id').value = id;
      document.getElementById('login-pw').value = pw;
      document.getElementById('signup-id').value = "";
      document.getElementById('signup-pw').value = "";
      switchAuthTab('login');
    }

    // --- [수정] 로그인 핸들러 (회원가입 로컬 DB 연계) ---
    function handleLogin() {
      const id = document.getElementById('login-id').value.trim();
      const pw = document.getElementById('login-pw').value.trim();

      if (!id || !pw) return alert("아이디와 비밀번호를 입력해주세요.");

      // 기본 디폴트 계정(chibi_love / 1234) 호환 처리
      const users = JSON.parse(localStorage.getItem('pastel_users_db') || '{}');
      if (!users['chibi_love']) {
        users['chibi_love'] = {
          password: '1234',
          name: '러블리치비',
          gender: 'female',
          balance: 100000,
          inventory: [],
          equipped: {
            hair: null, top: null, bottom: null, dress: null,
            shoes: null, accessory: null, bag: null
          }
        };
        localStorage.setItem('pastel_users_db', JSON.stringify(users));
      }

      const matchedUser = users[id];
      if (matchedUser && matchedUser.password === pw) {
        AppState.user.id = id;
        
        // 가입 완료된 계정 정보 로드
        if (matchedUser.name) {
          // 기존 유저 정보가 이미 등록된 경우 바로 메인화면으로 이동
          AppState.user.name = matchedUser.name;
          AppState.user.gender = matchedUser.gender;
          AppState.user.balance = matchedUser.balance;
          AppState.user.inventory = matchedUser.inventory;
          AppState.user.equipped = matchedUser.equipped;

          document.getElementById('screen-login').classList.add('hidden');
          document.getElementById('screen-main').classList.remove('hidden');
          
          document.getElementById('display-name').innerText = AppState.user.name;
          document.getElementById('display-gender').innerText = AppState.user.gender === 'female' ? '여' : '남';
          updateUIBalance();
          initMarketPrices();
          renderAvatar();
          
          // 주식 및 상점 흐름 시작
          setInterval(runMarketTicker, 1000);
        } else {
          // 닉네임 설정이 없는 신규 회원은 설정 프로세스 적용
          document.getElementById('screen-login').classList.add('hidden');
          document.getElementById('screen-name').classList.remove('hidden');
        }
      } else {
        alert("아이디 또는 비밀번호가 일치하지 않습니다.");
      }
    }

    function handleSaveName() {
      const name = document.getElementById('user-nickname').value.trim();
      if (!name) return alert("닉네임을 지정해주세요.");
      AppState.user.name = name;
      document.getElementById('screen-name').classList.add('hidden');
      document.getElementById('screen-gender').classList.remove('hidden');
    }

    function handleSelectGender(gender) {
      AppState.user.gender = gender;
      document.getElementById('display-name').innerText = AppState.user.name;
      document.getElementById('display-gender').innerText = gender === 'female' ? '여' : '남';
      updateUIBalance();

      const defaultHair = spawnItem('hair_c_black');
      const defaultTop = spawnItem('top_c_white');
      const defaultBottom = spawnItem('bottom_c_pants');
      
      equipItem(defaultHair);
      equipItem(defaultTop);
      equipItem(defaultBottom);

      // 회원 데이터 저장소 동기화
      const users = JSON.parse(localStorage.getItem('pastel_users_db') || '{}');
      if (users[AppState.user.id]) {
        users[AppState.user.id].name = AppState.user.name;
        users[AppState.user.id].gender = AppState.user.gender;
        users[AppState.user.id].balance = AppState.user.balance;
        users[AppState.user.id].inventory = AppState.user.inventory;
        users[AppState.user.id].equipped = AppState.user.equipped;
        localStorage.setItem('pastel_users_db', JSON.stringify(users));
      }

      document.getElementById('screen-gender').classList.add('hidden');
      initMarketPrices();
      setInterval(runMarketTicker, 1000);
    }

    function syncUserDatabase() {
      if (!AppState.user.id) return;
      const users = JSON.parse(localStorage.getItem('pastel_users_db') || '{}');
      if (users[AppState.user.id]) {
        users[AppState.user.id].balance = AppState.user.balance;
        users[AppState.user.id].inventory = AppState.user.inventory;
        users[AppState.user.id].equipped = AppState.user.equipped;
        localStorage.setItem('pastel_users_db', JSON.stringify(users));
      }
    }

    function spawnItem(itemId) {
      const baseItem = ITEM_DATABASE[itemId];
      const instanceId = 'inst_' + Math.random().toString(36).substr(2, 9);
      const newInstance = {
        instanceId: instanceId,
        id: itemId,
        purchasePrice: baseItem.basePrice
      };
      AppState.user.inventory.push(newInstance);
      syncUserDatabase();
      return newInstance;
    }

    function updateUIBalance() {
      document.getElementById('display-balance').innerText = formatMoney(AppState.user.balance);
    }

    // --- 5. Pure CSS 캐릭터 옷장 장착 엔진 ---
    function equipItem(itemInstance) {
      const itemData = ITEM_DATABASE[itemInstance.id];
      const category = itemData.category;

      if (category === 'dress') {
        AppState.user.equipped.top = null;
        AppState.user.equipped.bottom = null;
        AppState.user.equipped.dress = itemInstance;
      } else if (category === 'top' || category === 'bottom') {
        AppState.user.equipped.dress = null;
        AppState.user.equipped[category] = itemInstance;
      } else {
        AppState.user.equipped[category] = itemInstance;
      }
      syncUserDatabase();
      renderAvatar();
    }

    function unequipItem(category) {
      AppState.user.equipped[category] = null;
      syncUserDatabase();
      renderAvatar();
    }

    function renderAvatar() {
      const eq = AppState.user.equipped;

      const layerHairBack = document.getElementById('layer-hair-back');
      const layerHairFront = document.getElementById('layer-hair-front');
      if (eq.hair) {
        const hData = ITEM_DATABASE[eq.hair.id];
        layerHairBack.innerHTML = hData.renderBack();
        layerHairFront.innerHTML = hData.renderFront();
      } else {
        layerHairBack.innerHTML = '';
        layerHairFront.innerHTML = '';
      }

      const layerTop = document.getElementById('layer-top');
      if (eq.top) {
        layerTop.innerHTML = ITEM_DATABASE[eq.top.id].render();
      } else {
        layerTop.innerHTML = '';
      }

      const layerBottom = document.getElementById('layer-bottom');
      if (eq.bottom) {
        layerBottom.innerHTML = ITEM_DATABASE[eq.bottom.id].render();

        layerBottom.innerHTML = '';
      }

        layerDress.innerHTML = ITEM_DATABASE[eq.dress.id].render();

    // --- 옷장 오픈 / 해제 및 UI 구현 ---
    function openWardrobe() {
      document.getElementById('modal-wardrobe').classList.remove('translate-y-full');
      filterWardrobe(AppState.currentWardrobeTab);
    }

    function closeWardrobe() {
      document.getElementById('modal-wardrobe').classList.add('translate-y-full');
    }

    function filterWardrobe(tab) {
      AppState.currentWardrobeTab = tab;
      const tabs = document.getElementById('wardrobe-tabs').children;
      const categories = ['all', 'hair', 'top', 'bottom', 'dress', 'shoes', 'accessory'];
      
      for (let i = 0; i < tabs.length; i++) {
        if (categories[i] === tab) {
          tabs[i].className = "px-3 py-1 bg-brandPink text-white text-xs font-bold rounded-full whitespace-nowrap";
        } else {
          tabs[i].className = "px-3 py-1 bg-pink-50 text-gray-500 text-xs font-bold rounded-full whitespace-nowrap";
        }
      }

      renderWardrobeList();
    }

    function renderWardrobeList() {
      const listContainer = document.getElementById('wardrobe-list');
      listContainer.innerHTML = '';

      let items = AppState.user.inventory;
      if (AppState.currentWardrobeTab !== 'all') {
        items = items.filter(inst => ITEM_DATABASE[inst.id].category === AppState.currentWardrobeTab);
      }

      if (items.length === 0) {
        listContainer.innerHTML = `<div class="col-span-3 text-center text-gray-400 py-12 text-xs">아이템이 없습니다.</div>`;
        return;
      }

      items.forEach(inst => {
        const itemData = ITEM_DATABASE[inst.id];
        const isEquipped = Object.values(AppState.user.equipped).some(eq => eq && eq.instanceId === inst.instanceId);
        const card = document.createElement('div');
        card.className = `p-2 bg-pink-50/50 rounded-2xl border-2 ${isEquipped ? 'border-brandPink bg-pink-50' : 'border-transparent'} flex flex-col items-center justify-between cursor-pointer active:scale-95 transition-all`;
        card.onclick = () => {
          if (isEquipped) {
            unequipItem(itemData.category);
          } else {
            equipItem(inst);
          }
          renderWardrobeList();
        };

        const gradeStyle = GRADE_COLORS[itemData.grade];
        card.innerHTML = `
          <span class="text-[10px] font-bold ${gradeStyle.text}">${itemData.grade}</span>
          <span class="text-xs font-bold text-gray-700 text-center truncate w-full">${itemData.name}</span>
          <span class="text-[9px] text-gray-400 mt-1">${isEquipped ? '장착 중' : '대기'}</span>
        `;
        listContainer.appendChild(card);
      });
    }

    function sellToKream(instanceId) {
      const idx = AppState.user.inventory.findIndex(inst => inst.instanceId === instanceId);
      if (idx === -1) return;

      const inst = AppState.user.inventory[idx];
      const livePrice = AppState.marketPrices[inst.id].current;

      AppState.user.balance += livePrice;
      
      // 장착 해제 대응
      for (let slot in AppState.user.equipped) {
        if (AppState.user.equipped[slot] && AppState.user.equipped[slot].instanceId === instanceId) {
          AppState.user.equipped[slot] = null;
        }
      }

      AppState.user.inventory.splice(idx, 1);
      updateUIBalance();
      syncUserDatabase();
      renderAvatar();

      alert("리셀 체결 완료! 수익금이 정산되었습니다.");
      if (activePhoneApp === 'kream') openApp('kream');
    }

    // --- [수정] 주식 가격 변동 엔진 (기존 대비 대폭 향상된 시세 등락 적용) ---
    function runMarketTicker() {
      const keys = Object.keys(ITEM_DATABASE);
      const chosenKey = keys[Math.floor(Math.random() * keys.length)];
      const item = ITEM_DATABASE[chosenKey];
      const priceObj = AppState.marketPrices[chosenKey];

      // [변동 폭 대폭 확장 및 다이내믹 이벤트 적용]
      // 기존의 좁은 바운더리 대신 최소 -15% ~ 최대 +18% 범위에서 역동적으로 변동하도록 처리합니다.
      let changePercent = (Math.random() * 33 - 15) / 100;

      // 5%의 초급락/초급등 대박 특이 케이스 이벤트 설정
      if (Math.random() < 0.05) {
        changePercent = Math.random() > 0.4 ? 0.50 : -0.40; // +50% 폭등 또는 -40% 폭락
      }

      const delta = Math.round(priceObj.current * changePercent);
      priceObj.current = Math.max(1000, priceObj.current + delta); // 최소 1,000G 방어막
      priceObj.change = changePercent;
      priceObj.trend = changePercent > 0 ? 'up' : (changePercent < 0 ? 'down' : 'flat');

      // 중고나라 앱 실시간 드로잉 갱신
      if (activePhoneApp === 'joonggo') {
        openApp('joonggo');
      }

      // 상단 배너 전광판 표시
      showTickerBanner(item, priceObj);
    }
